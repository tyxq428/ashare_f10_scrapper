name: Codex Thin Worker

description: Emergency circuit breaker preventing model invocation.

inputs:
  api-key:
    description: Private API key supplied by the caller.
    required: true
  model:
    description: Private model identifier supplied by the caller.
    required: true
  prompt-file:
    description: Trusted task descriptor.
    required: true

outputs:
  final-message:
    description: Structured blocked result.
    value: ${{ steps.circuit-breaker.outputs.final-message }}

runs:
  using: composite
  steps:
    - id: circuit-breaker
      name: Stop before Codex model invocation
      shell: bash
      run: |
        set -euo pipefail
        delimiter="CODEX_RESULT_$(date +%s)_${RANDOM}"
        {
          echo "final-message<<${delimiter}"
          echo '{"status":"BLOCKED","changed_files":[],"commands_run":[],"tests_passed":false,"summary":"Codex execution is disabled.","blocking_reason":"CODEX_CIRCUIT_BREAKER_OPEN"}'
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"
        echo "CODEX_MODEL_INVOCATION=DISABLED" >> "$GITHUB_STEP_SUMMARY"
