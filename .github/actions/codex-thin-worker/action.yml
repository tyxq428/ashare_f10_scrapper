name: Codex Thin Worker
description: Repository-wide disabled-mode circuit breaker; never invokes a model while the policy is frozen.

inputs:
  api-key:
    description: Unused while the repository Codex policy is disabled.
    required: true
  model:
    description: Unused while the repository Codex policy is disabled.
    required: true
  prompt-file:
    description: Trusted task descriptor retained only for a safe blocked result.
    required: true

outputs:
  final-message:
    description: Structured BLOCKED result emitted before any model invocation.
    value: ${{ steps.policy.outputs.final-message }}

runs:
  using: composite
  steps:
    - id: policy
      name: Stop before Codex model invocation
      shell: bash
      run: |
        set -euo pipefail
        delimiter="CODEX_POLICY_RESULT_${RANDOM}_${RANDOM}"
        {
          echo "final-message<<${delimiter}"
          echo '{"status":"BLOCKED","changed_files":[],"commands_run":[],"tests_passed":false,"summary":"Codex is disabled by repository policy.","blocking_reason":"CODEX_POLICY_DISABLED"}'
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"
        echo "CODEX_MODEL_INVOCATION=DISABLED" >> "$GITHUB_STEP_SUMMARY"
