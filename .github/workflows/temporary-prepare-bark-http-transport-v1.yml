name: Prepare Bark HTTP Transport v1

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/temporary-prepare-bark-http-transport-v1.yml
      - scripts/devflow/prepare_bark_http_transport_v1.py

permissions:
  contents: write

concurrency:
  group: prepare-bark-http-transport-v1
  cancel-in-progress: false

jobs:
  prepare:
    if: >-
      github.run_attempt == 1 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/devflow-bark-http-transport-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-bark-http-transport-v1
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deterministic validation dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Prepare and validate HTTP-or-HTTPS Bark transport
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/devflow/prepare_bark_http_transport_v1.py')
          text = path.read_text(encoding='utf-8')
          replacements = (
              (
                  '        "BARK_ENDPOINT=\\"${BARK_ENDPOINT%/}\\"",\n',
                  '        \'BARK_ENDPOINT="${BARK_ENDPOINT%/}"\',\n',
              ),
              (
                  '    assert "BARK_ENDPOINT=\\"${BARK_ENDPOINT%/}\\"" in text\n',
                  '    assert \'BARK_ENDPOINT="${BARK_ENDPOINT%/}"\' in text\n',
              ),
          )
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit('PREPARER_QUOTE_PATCH_COUNT_MISMATCH')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          python scripts/devflow/prepare_bark_http_transport_v1.py \
            2>&1 | tee /tmp/bark-http-preparer.log
          rm -f \
            .github/workflows/temporary-prepare-bark-http-transport-v1.yml \
            scripts/devflow/prepare_bark_http_transport_v1.py

          python -m compileall -q scripts/devflow \
            2>&1 | tee -a /tmp/bark-http-preparer.log
          python scripts/devflow/validate_notification_channels.py \
            2>&1 | tee -a /tmp/bark-http-preparer.log
          python scripts/devflow/validate_workflows.py \
            2>&1 | tee -a /tmp/bark-http-preparer.log
          ruff check scripts/devflow tests/test_devflow*.py --output-format=concise \
            2>&1 | tee -a /tmp/bark-http-preparer.log
          pytest -q tests/test_devflow*.py \
            2>&1 | tee -a /tmp/bark-http-preparer.log
          git diff --check 2>&1 | tee -a /tmp/bark-http-preparer.log

          git restore .github/workflows/temporary-prepare-bark-http-transport-v1.yml

      - name: Upload preparer diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bark-http-preparer-diagnostics-${{ github.run_id }}
          path: /tmp/bark-http-preparer.log
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload the validated workflow files
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bark-http-transport-workflow-files-${{ github.run_id }}
          path: |
            .github/workflows/bark-all-status-live-retest-v2.yml
            .github/workflows/devflow-incident.yml
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Persist only validated non-workflow files
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .devflow/notification-channels.yaml \
            docs/process/policies/notification-policy.md \
            docs/process/runbooks/handle-incident.md \
            scripts/devflow/bark_delivery_result.py \
            scripts/devflow/validate_notification_channels.py \
            scripts/devflow/validate_workflows.py \
            tests/test_devflow_bark_delivery_result.py \
            tests/test_devflow_bark_workflow.py
          git add -A scripts/devflow/prepare_bark_http_transport_v1.py
          git commit -m 'Prepare HTTP or HTTPS Bark transport policy and tests'
          git push origin HEAD:feature/devflow-bark-http-transport-v1
          echo 'BARK_HTTP_NON_WORKFLOW_FILES=PERSISTED' >> "$GITHUB_STEP_SUMMARY"
          echo 'WORKFLOW_FILES=VALIDATED_ARTIFACT_ONLY' >> "$GITHUB_STEP_SUMMARY"
          echo 'CODEX_CALLS=0' >> "$GITHUB_STEP_SUMMARY"
          echo 'RESPONSES_PAID_PROBES=0' >> "$GITHUB_STEP_SUMMARY"
          echo 'RELAY_SECRET_READS=0' >> "$GITHUB_STEP_SUMMARY"
          echo 'BARK_REQUESTS_IN_PREPARER=0' >> "$GITHUB_STEP_SUMMARY"
