name: Temporary Visual Review Status Patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-visual-review-status-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply product status patch and regression tests
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/ashare_f10/api/visual_jobs_v2.py")
          source = source_path.read_text(encoding="utf-8")
          old = '''    needs_review = bool(result.get("manual_review_required")) or acceptance.startswith("FAIL")
              scope_label = str(OFFICIAL_VALIDATION_SCOPES[scope]["label"])
              if needs_review:
                  message = (
                      f"{scope_label}验证完成：{document_count}份官方报告、{fact_count}条官方事实；"
                      f"发现{conflict_count}项来源差异，需要复核"
                  )
              else:
                  message = (
                      f"{scope_label}验证完成：{document_count}份官方报告、{fact_count}条官方事实、"
                      f"{comparison_count}条对账记录"
                  )
          '''
          new = '''    has_conflicts = conflict_count > 0 or bool(result.get("manual_review_required"))
              coverage_gap = acceptance == "PASS_WITH_COVERAGE_GAPS"
              partial_source = acceptance.startswith("PARTIAL")
              needs_review = has_conflicts or coverage_gap or partial_source or acceptance != "PASS"
              scope_label = str(OFFICIAL_VALIDATION_SCOPES[scope]["label"])
              if has_conflicts:
                  message = (
                      f"{scope_label}验证完成：{document_count}份官方报告、{fact_count}条官方事实；"
                      f"发现{conflict_count}项来源差异，需要复核"
                  )
              elif coverage_gap:
                  message = (
                      f"{scope_label}验证完成：{document_count}份官方报告、{fact_count}条官方事实；"
                      "存在官方覆盖缺口，请查看报告期生命周期和状态说明"
                  )
              elif partial_source:
                  message = (
                      f"{scope_label}验证完成：{document_count}份官方报告、{fact_count}条官方事实；"
                      "官方来源部分不可用，请查看来源状态"
                  )
              elif needs_review:
                  message = (
                      f"{scope_label}验证完成：验收状态{acceptance}，需要复核"
                  )
              else:
                  message = (
                      f"{scope_label}验证完成：{document_count}份官方报告、{fact_count}条官方事实、"
                      f"{comparison_count}条对账记录"
                  )
          '''
          if old not in source:
              raise SystemExit("target official_stage_outcome block not found")
          source_path.write_text(source.replace(old, new), encoding="utf-8")

          test_path = Path("tests/test_visual_execution.py")
          tests = test_path.read_text(encoding="utf-8")
          addition = '''

          def test_official_coverage_gap_is_completed_with_review() -> None:
              outcome = official_stage_outcome(
                  {
                      "acceptance_status": "PASS_WITH_COVERAGE_GAPS",
                      "manual_review_required": False,
                      "true_conflict_count": 0,
                      "official_fact_count": 1200,
                      "comparison_count": 4000,
                      "official_source_status": {"document_count": 18},
                  },
                  "full_history",
              )
              assert outcome["stored_status"] == "COMPLETED"
              assert outcome["display_status"] == "COMPLETED_WITH_REVIEW"
              assert outcome["warning_delta"] == 1
              assert "覆盖缺口" in outcome["message"]


          def test_partial_official_source_is_completed_with_review() -> None:
              outcome = official_stage_outcome(
                  {
                      "acceptance_status": "PARTIAL_OFFICIAL_SOURCE_UNAVAILABLE",
                      "manual_review_required": False,
                      "true_conflict_count": 0,
                      "official_fact_count": 0,
                      "comparison_count": 0,
                      "official_source_status": {"document_count": 0},
                  },
                  "latest",
              )
              assert outcome["stored_status"] == "COMPLETED"
              assert outcome["display_status"] == "COMPLETED_WITH_REVIEW"
              assert outcome["warning_delta"] == 1
              assert "官方来源部分不可用" in outcome["message"]
          '''
          addition = "\n".join(line[10:] if line.startswith("          ") else line for line in addition.splitlines())
          marker = "def test_official_coverage_gap_is_completed_with_review"
          if marker not in tests:
              test_path.write_text(tests.rstrip() + "\n" + addition.lstrip(), encoding="utf-8")
          PY
          ruff check --fix src/ashare_f10/api/visual_jobs_v2.py tests/test_visual_execution.py
          pytest -q tests/test_visual_execution.py
          git diff --check
      - name: Commit patch to feature branch
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/api/visual_jobs_v2.py tests/test_visual_execution.py
          git commit -m "Clarify official validation review states"
          git push origin HEAD:${{ github.head_ref }}
