# Deterministic trigger; no Codex or relay access.
name: Temporary Zero-Codex Remaining V9

on:
  push:
    branches: [main]
    paths: [.github/workflows/temporary-zero-codex-remaining-v9.yml]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.head_commit.message == 'Trigger temporary zero-Codex remaining migration v9'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-operational-optimization-v2-clean
          fetch-depth: 0
      - name: Apply remaining ChatGPT Web migration
        run: |
          python scripts/devflow/temporary_apply_remaining_zero_model_files.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete remaining zero-Codex Devflow migration"
          git push origin HEAD:feature/devflow-operational-optimization-v2-clean
      - name: Remove temporary executor
        if: always()
        run: |
          git fetch --no-tags origin main
          git switch -C main origin/main
          git rm .github/workflows/temporary-zero-codex-remaining-v9.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove temporary zero-Codex remaining migration v9"
          git push origin HEAD:main
