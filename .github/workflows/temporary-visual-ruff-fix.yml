name: Temporary Visual Ruff Autofix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-visual-ruff-fix.yml"

permissions:
  contents: write

jobs:
  autofix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply exact Ruff import fix
        run: |
          ruff check --select I --fix src/ashare_f10/api/visual_jobs_v2.py
          ruff check src/ashare_f10/api/visual_jobs_v2.py
          git diff --check
      - name: Commit fix to feature branch
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/api/visual_jobs_v2.py
          git commit -m "Fix visual V2 import ordering"
          git push origin HEAD:${{ github.head_ref }}
