name: Official Validation 688521

on:
  workflow_dispatch:
  push:
    branches: [feature/official-validation-v1]
    paths:
      - "src/ashare_f10/validation/**"
      - "src/ashare_f10/cli.py"
      - "tests/test_official_validation.py"
      - "pyproject.toml"
      - ".github/workflows/official-validation-688521.yml"
  pull_request:
    paths:
      - "src/ashare_f10/validation/**"
      - "src/ashare_f10/cli.py"
      - "tests/test_official_validation.py"
      - "pyproject.toml"
      - ".github/workflows/official-validation-688521.yml"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  official-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/official-validation-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Preserve explicit official statement units
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ashare_f10/validation/documents/pdf_parser.py")
          text = path.read_text(encoding="utf-8")
          old = '''                unit = _unit_info(text)
                if unit[1] == 1.0 and previous_unit[1] != 1.0 and page_section:
                    unit = previous_unit
                elif unit[1] != 1.0 or page_section:
                    previous_unit = unit
'''
          new = '''                unit = _unit_info(text)
                explicit_unit = bool(
                    re.search(r"单位[：:](?:亿元|万元|千元|元)", _compact(text))
                )
                if (
                    not explicit_unit
                    and unit[1] == 1.0
                    and previous_unit[1] != 1.0
                    and page_section
                ):
                    unit = previous_unit
                elif explicit_unit or unit[1] != 1.0 or page_section:
                    previous_unit = unit
'''
          if new not in text:
              if old not in text:
                  raise SystemExit("Expected unit propagation block was not found")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          ruff format src/ashare_f10/validation/documents/pdf_parser.py
          ruff check src/ashare_f10/validation tests/test_official_validation.py
      - name: Unit tests for official validation
        run: pytest -q tests/test_official_validation.py
      - name: Fetch all fixed Eastmoney F10 sources
        run: ashare-f10 fetch 688521 --output official-validation-run --workers 8
      - name: Validate against free official SSE reports
        run: |
          set -o pipefail
          ashare-f10 validate-official 688521 official-validation-run \
            --output official-validation-run/validation \
            --annual-year 2025 \
            --quarter-year 2026 2>&1 | tee official-validation.log
      - name: Verify validation acceptance
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          summary = json.loads(Path("official-validation-run/validation/validation_summary.json").read_text(encoding="utf-8"))
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          assert summary["paid_sources_used"] is False
          assert summary["document_count"] >= 2
          assert summary["official_fact_count"] >= 20
          assert summary["high_severity_mismatch_count"] == 0
          assert summary["acceptance_status"] == "PASS"
          PY
      - name: Commit official unit detection fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/validation/documents/pdf_parser.py
          if git diff --cached --quiet; then
            echo "Unit detection fix already present."
          else
            git commit -m "Preserve explicit official statement units"
            git push origin HEAD:feature/official-validation-v1
          fi
      - name: Upload official validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-validation-688521-${{ github.run_id }}
          path: |
            official-validation-run/validation/
            official-validation.log
            official-validation-run/artifacts.json
          if-no-files-found: warn
          retention-days: 30
