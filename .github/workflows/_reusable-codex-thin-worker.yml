name: Reusable Codex Thin Worker

on:
  workflow_call:
    inputs:
      task_id:
        required: true
        type: string
      task_branch:
        required: true
        type: string
      task_file:
        required: true
        type: string
      gate_profile:
        required: true
        type: string
      publish_branch:
        required: true
        type: string

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  codex:
    name: secret-bearing-read-only-codex
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: agent-runtime
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ inputs.task_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Register private value masks
        shell: bash
        env:
          ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          API_KEY: ${{ secrets.AGENT_API_KEY }}
          MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set +x
          python - <<'PY'
          import base64
          import os
          from urllib.parse import quote, urlsplit

          endpoint = os.environ["ENDPOINT"]
          api_key = os.environ["API_KEY"]
          model = os.environ["MODEL"]
          parsed = urlsplit(endpoint)
          values = {
              endpoint,
              endpoint.rstrip("/"),
              parsed.netloc,
              parsed.hostname or "",
              api_key,
              model,
              quote(endpoint, safe=""),
              quote(api_key, safe=""),
              base64.b64encode(endpoint.encode()).decode(),
              base64.urlsafe_b64encode(endpoint.encode()).decode(),
              base64.b64encode(api_key.encode()).decode(),
              base64.urlsafe_b64encode(api_key.encode()).decode(),
          }
          for value in values:
              if len(value) >= 3:
                  print(f"::add-mask::{value}")
          PY

      - name: Start localhost-only no-log Responses forwarder
        shell: bash
        env:
          AGENT_RESPONSES_ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          PYTHONPATH: scripts/devflow
        run: |
          set -euo pipefail
          nohup python scripts/devflow/private_responses_forwarder.py --port 8787 \
            >/dev/null 2>&1 &
          echo $! > /tmp/private-responses-forwarder.pid
          for attempt in $(seq 1 30); do
            if curl --silent --show-error --fail http://127.0.0.1:8787/health >/dev/null; then
              echo "PRIVATE_RESPONSES_FORWARDER=READY"
              exit 0
            fi
            sleep 0.5
          done
          echo "PRIVATE_RESPONSES_FORWARDER=FAILED"
          exit 1

      # One bounded Codex Session. Automatic second session is intentionally disabled.
      - name: Run one Codex Thin Worker session
        id: codex
        continue-on-error: true
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56
        with:
          openai-api-key: ${{ secrets.AGENT_API_KEY }}
          responses-api-endpoint: http://127.0.0.1:8787/v1/responses
          model: ${{ secrets.AGENT_MODEL }}
          effort: low
          prompt-file: ${{ inputs.task_file }}
          output-file: /tmp/codex-result.json
          output-schema-file: docs/process/templates/codex_result.schema.json
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Stop private forwarder
        if: always()
        run: |
          if [[ -f /tmp/private-responses-forwarder.pid ]]; then
            kill "$(cat /tmp/private-responses-forwarder.pid)" 2>/dev/null || true
            rm -f /tmp/private-responses-forwarder.pid
          fi

      - name: Verify Codex changed-path scope
        id: scope
        continue-on-error: true
        run: |
          mkdir -p artifact
          python scripts/devflow/verify_changed_paths.py \
            --task-file "${{ inputs.task_file }}" \
            --status \
            --output artifact/scope-result.json

      - name: Run trusted targeted gate
        id: gate
        continue-on-error: true
        run: |
          python scripts/devflow/run_gate_profile.py "${{ inputs.gate_profile }}" \
            --output artifact/gate-result.json

      - name: Build minimal handoff and manifest
        if: always()
        shell: bash
        env:
          AGENT_RESPONSES_ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          AGENT_MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set -euo pipefail
          mkdir -p artifact
          if [[ -s /tmp/codex-result.json ]]; then
            cp /tmp/codex-result.json artifact/codex-result.json
          else
            printf '%s\n' '{"status":"BLOCKED","summary":"Codex did not produce a structured result","changed_files":[],"commands_run":[],"tests_passed":false,"blocking_reason":"missing output"}' > artifact/codex-result.json
          fi
          git diff --binary > artifact/codex.patch
          test -s artifact/codex.patch
          python scripts/devflow/secret_audit.py \
            artifact/codex.patch \
            artifact/codex-result.json \
            artifact/scope-result.json \
            artifact/gate-result.json \
            --output artifact/secret-audit.json
          (
            cd artifact
            sha256sum codex.patch codex-result.json scope-result.json gate-result.json secret-audit.json \
              > manifest.sha256
          )

      - name: Upload audited handoff only
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: codex-handoff-${{ inputs.task_id }}-${{ github.run_id }}
          path: artifact/
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Codex, scope, gate and secret outcomes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.codex.outcome }}" = "success"
          test "${{ steps.scope.outcome }}" = "success"
          test "${{ steps.gate.outcome }}" = "success"
          python - <<'PY'
          import json
          from pathlib import Path
          for name in ("scope-result.json", "gate-result.json", "secret-audit.json"):
              value = json.loads((Path("artifact") / name).read_text(encoding="utf-8"))
              if value.get("status") != "PASS":
                  raise SystemExit(f"{name} did not pass")
          result = json.loads(Path("artifact/codex-result.json").read_text(encoding="utf-8"))
          if result.get("status") != "SUCCESS" or not result.get("tests_passed"):
              raise SystemExit("Codex structured result did not report verified success")
          PY

  publish:
    name: secret-free-publish
    needs: codex
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ inputs.task_branch }}
          fetch-depth: 0

      - name: Download audited handoff outside repository workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: codex-handoff-${{ inputs.task_id }}-${{ github.run_id }}
          path: /tmp/codex-handoff

      - name: Verify manifest, apply patch and re-run scope
        shell: bash
        run: |
          set -euo pipefail
          (cd /tmp/codex-handoff && sha256sum --check manifest.sha256)
          python - <<'PY'
          import json
          from pathlib import Path
          if json.loads(Path("/tmp/codex-handoff/secret-audit.json").read_text())["status"] != "PASS":
              raise SystemExit("secret audit did not pass")
          PY
          git switch -c "${{ inputs.publish_branch }}"
          git apply --index /tmp/codex-handoff/codex.patch
          python scripts/devflow/verify_changed_paths.py \
            --task-file "${{ inputs.task_file }}" \
            --status \
            --output /tmp/publish-scope-result.json

      - name: Re-run trusted gate without relay secrets
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/run_gate_profile.py "${{ inputs.gate_profile }}" \
            --output /tmp/publish-gate-result.json

      - name: Commit and push isolated product branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Apply Codex thin-worker task ${{ inputs.task_id }}"
          git push origin "HEAD:refs/heads/${{ inputs.publish_branch }}"
          echo "PUBLISHED_BRANCH=${{ inputs.publish_branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "PUBLISHED_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
