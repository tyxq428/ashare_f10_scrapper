name: Devflow State Consistency

on:
  push:
    branches:
      - main
      - "feature/chatgpt-web-codex-devflow-*"
      - "feature/devflow-*"
      - "feature/codex-entrypoint-*"
      - "fix/codex-environment-secret-*"
    paths:
      - AGENTS.md
      - "**/AGENTS.md"
      - ".devflow/**"
      - "docs/process/**"
      - "docs/implementation/**"
      - "scripts/devflow/**"
      - "tests/test_devflow*.py"
      - ".github/actions/codex-thin-worker/**"
      - ".github/workflows/*devflow*"
      - ".github/workflows/*codex*"
      - ".github/workflows/test.yml"
      - ".github/workflows/e2e-688521.yml"
  pull_request:
    paths:
      - AGENTS.md
      - "**/AGENTS.md"
      - ".devflow/**"
      - "docs/process/**"
      - "docs/implementation/**"
      - "scripts/devflow/**"
      - "tests/test_devflow*.py"
      - ".github/actions/codex-thin-worker/**"
      - ".github/workflows/*devflow*"
      - ".github/workflows/*codex*"
      - ".github/workflows/test.yml"
      - ".github/workflows/e2e-688521.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate every indexed canonical task state
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            EXTRA_ARGS+=(--allow-checkout-branch)
          fi
          python scripts/devflow/validate_state.py \
            --all-active \
            --output devflow-state-result.json \
            "${EXTRA_ARGS[@]}"

      - name: Validate Devflow, Codex entrypoints, docs and tests
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_codex_entrypoints.py \
            --output devflow-codex-entrypoints.json \
            2>&1 | tee devflow-codex-entrypoints.log
          python scripts/devflow/validate_workflows.py \
            2>&1 | tee devflow-workflow-validation.log
          python scripts/devflow/validate_docs.py \
            --output devflow-docs-validation.json \
            2>&1 | tee devflow-docs-validation.log
          ruff check scripts/devflow tests/test_devflow*.py \
            2>&1 | tee devflow-ruff.log
          pytest -q tests/test_devflow*.py \
            2>&1 | tee devflow-pytest.log

      - name: Upload diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: devflow-state-diagnostics-${{ github.run_id }}
          path: |
            devflow-state-result.json
            devflow-codex-entrypoints.json
            devflow-codex-entrypoints.log
            devflow-workflow-validation.json
            devflow-workflow-validation.log
            devflow-docs-validation.json
            devflow-docs-validation.log
            devflow-ruff.log
            devflow-pytest.log
          if-no-files-found: warn
          retention-days: 7

  notify-terminal-state:
    needs: consistency
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Scan only new canonical completed generations
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python scripts/devflow/terminal_notification_scan.py \
            --repo . \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA" \
            --repository "${{ github.repository }}" \
            --source-run-id "${{ github.run_id }}" \
            --output /tmp/devflow-terminal-events.json

      - name: Dispatch each first canonical completion through the notification bus
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          events = json.loads(
              Path('/tmp/devflow-terminal-events.json').read_text(encoding='utf-8')
          )
          if not isinstance(events, list):
              raise SystemExit('TERMINAL_EVENTS_MUST_BE_AN_ARRAY')
          for index, event in enumerate(events):
              if not isinstance(event, dict):
                  raise SystemExit('TERMINAL_EVENT_MUST_BE_AN_OBJECT')
              wrapper = {
                  'event_type': 'devflow_notify',
                  'client_payload': event,
              }
              Path(
                  f'/tmp/devflow-terminal-notification-{index:04d}.json'
              ).write_text(json.dumps(wrapper), encoding='utf-8')
          print(f'TERMINAL_EVENTS_PREPARED={len(events)}')
          PY
          shopt -s nullglob
          PAYLOADS=(/tmp/devflow-terminal-notification-*.json)
          for payload in "${PAYLOADS[@]}"; do
            gh api --method POST \
              "repos/${{ github.repository }}/dispatches" \
              --input "$payload"
          done
          echo "TERMINAL_NOTIFICATION_DISPATCHES=${#PAYLOADS[@]}" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "STATE_CONSISTENCY_REQUIRED_BEFORE_COMPLETION=YES" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "RAW_WORKFLOW_RUN_NOTIFICATIONS=0" >> "$GITHUB_STEP_SUMMARY"
          echo "BARK_REQUESTS_IN_THIS_WORKFLOW=0" >> "$GITHUB_STEP_SUMMARY"
