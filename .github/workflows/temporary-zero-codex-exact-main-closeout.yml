name: Temporary Zero-Codex Exact Main Closeout

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/temporary-zero-codex-exact-main-closeout.yml

permissions:
  contents: write

concurrency:
  group: temporary-zero-codex-exact-main-closeout
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  verify-and-close:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prove repository-wide Codex freeze before every gate
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(Path('.devflow/codex-policy.yaml').read_text(encoding='utf-8'))
          assert policy['mode'] == 'disabled'
          assert policy['auto_recovery_dispatch'] is False
          assert policy['retry_failed_codex_job'] is False
          assert policy['allow_github_actions_bot'] is False
          assert policy['limits']['automatic_second_session'] == 0
          assert policy['limits']['recovery_generations'] == 0

          action = Path('.github/actions/codex-thin-worker/action.yml').read_text(encoding='utf-8')
          assert 'openai/codex-action@' not in action
          assert 'CODEX_POLICY_DISABLED' in action

          for workflow_path in (
              '.github/workflows/codex-task.yml',
              '.github/workflows/devflow-auto-recovery.yml',
              '.github/workflows/devflow-post-merge.yml',
          ):
              text = Path(workflow_path).read_text(encoding='utf-8')
              assert 'openai/codex-action@' not in text
              assert 'actions/workflows/codex-task.yml/dispatches' not in text
              assert "steps.decision.outputs.action == 'RETRY_CODEX'" not in text
              assert 'python scripts/devflow/recovery_task.py' not in text
          print('ZERO_CODEX_FREEZE=PASS')
          PY

      - name: Run exact-main Devflow and compatibility gates
        run: |
          set -o pipefail
          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_state.py \
            --all-active \
            --output /tmp/devflow-state-result.json
          python scripts/devflow/validate_workflows.py \
            2>&1 | tee /tmp/devflow-workflow-validation.log
          python scripts/devflow/validate_docs.py \
            --output /tmp/devflow-docs-validation.json \
            2>&1 | tee /tmp/devflow-docs-validation.log
          python scripts/devflow/upgrade_compatibility.py \
            --output /tmp/devflow-upgrade-compatibility.json
          ruff check scripts/devflow tests/test_devflow*.py \
            --output-format=concise 2>&1 | tee /tmp/devflow-ruff.log
          pytest -q tests/test_devflow*.py \
            2>&1 | tee /tmp/devflow-pytest.log

      - name: Run exact-main complete product regression
        run: |
          set -o pipefail
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py \
            scripts/run_resilient_command.py --output-format=concise \
            2>&1 | tee /tmp/product-ruff.log
          pytest --cov=ashare_f10 --cov-report=term-missing \
            2>&1 | tee /tmp/product-pytest.log

      - name: Run exact-main real 688521 E2E with monitoring and recovery
        env:
          ASHARE_F10_TIMEOUT: "60"
          ASHARE_F10_RETRIES: "3"
          ASHARE_F10_MAX_WORKERS: "4"
          ASHARE_F10_PAGE_WORKERS: "3"
        run: |
          set -euo pipefail
          python scripts/run_resilient_fetch.py 688521 \
            --output /tmp/e2e-output \
            --workers 4 \
            --force \
            --max-attempts 3 \
            --backoff-seconds 8 \
            --heartbeat-seconds 15 \
            --report /tmp/e2e-output/resilient-fetch-report.json
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          import duckdb
          import pandas as pd
          from fastapi.testclient import TestClient

          root = Path('/tmp/e2e-output')
          report = json.loads((root / 'resilient-fetch-report.json').read_text(encoding='utf-8'))
          assert report['status'] == 'PASS', report
          artifacts = json.loads((root / 'artifacts.json').read_text(encoding='utf-8'))
          resolved = {key: Path(value).resolve() for key, value in artifacts.items() if key in {'json', 'excel', 'parquet', 'duckdb'}}
          assert set(resolved) == {'json', 'excel', 'parquet', 'duckdb'}
          for path in resolved.values():
              assert path.is_file() and path.stat().st_size > 0, path

          payload = json.loads(resolved['json'].read_text(encoding='utf-8'))
          assert payload.get('metadata', {}).get('security', {}).get('security_code') == '688521'
          facts = pd.read_parquet(resolved['parquet'])
          assert len(facts) > 100
          con = duckdb.connect(str(resolved['duckdb']), read_only=True)
          try:
              assert con.execute('select count(*) from facts').fetchone()[0] == len(facts)
          finally:
              con.close()

          data_dir = Path('/tmp/api-data')
          stock_dir = data_dir / '688521'
          stock_dir.mkdir(parents=True, exist_ok=True)
          (stock_dir / 'latest.json').write_text(
              json.dumps({'job_id': 'exact-main-closeout', 'output_dir': str(root), 'artifacts': {k: str(v) for k, v in resolved.items()}}, ensure_ascii=False),
              encoding='utf-8',
          )
          os.environ['ASHARE_F10_DATA_DIR'] = str(data_dir)
          from ashare_f10.api.app import app

          client = TestClient(app)
          assert client.get('/api/health').status_code == 200
          assert client.get('/api/stocks/688521/latest').status_code == 200
          assert client.get('/api/stocks/688521/search', params={'q': '资产', 'limit': 5}).status_code == 200
          for kind in ('json', 'xlsx', 'parquet', 'duckdb'):
              response = client.get(f'/api/stocks/688521/download/{kind}')
              assert response.status_code == 200 and response.content
          print('EXACT_MAIN_REAL_E2E=PASS')
          PY

      - name: Finalize canonical W06-W07 records and remove this workflow
        env:
          MERGE_SHA: 59992d2f115fa71c969417dff8ee06b4e42060f4
          PREMERGE_STATE_RUN: "30038187375"
          PREMERGE_UPGRADE_RUN: "30038187361"
          PREMERGE_TEST_RUN: "30038187352"
          PREMERGE_E2E_RUN: "30038187346"
          POSTMERGE_RUN: ${{ github.run_id }}
        run: |
          set -euo pipefail
          export TESTED_SHA="$(git rev-parse HEAD)"
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          task_id = 'devflow-operational-optimization-v2'
          task_dir = Path('docs/implementation') / task_id
          state_path = task_dir / 'task_state.yaml'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          now = datetime.now(UTC).strftime('%Y-%m-%dT%H:%M:%SZ')
          merge_sha = os.environ['MERGE_SHA']
          tested_sha = os.environ['TESTED_SHA']
          postmerge_run = int(os.environ['POSTMERGE_RUN'])
          premerge_runs = {
              'state_consistency': int(os.environ['PREMERGE_STATE_RUN']),
              'upgrade_compatibility': int(os.environ['PREMERGE_UPGRADE_RUN']),
              'full_test': int(os.environ['PREMERGE_TEST_RUN']),
              'real_e2e': int(os.environ['PREMERGE_E2E_RUN']),
          }

          state.update({
              'state_revision': int(state.get('state_revision', 0)) + 1,
              'status': 'DONE',
              'execution_status': 'COMPLETED',
              'security_status': 'PASS',
              'working_branch': 'main',
              'pull_request': 50,
              'last_product_commit_sha': tested_sha,
              'current_stage': 'W07',
              'last_completed_stage': 'W07',
              'last_successful_step': 'exact_main_zero_codex_closeout_pass',
              'next_action': 'none',
              'updated_at_utc': now,
          })
          state['acceptance'] = {
              'domain': 'generic',
              'status': 'PASS',
              'reason_code': None,
              'details_path': str(task_dir / 'FINAL_REPORT.md'),
          }
          state['gate_results'] = {
              **state.get('gate_results', {}),
              'W03_CONTEXT_AND_IMPACT': 'PASS',
              'W04_STATE_AND_BRANCH_GC': 'PASS',
              'W05_CODEX_ELIGIBILITY': 'PASS',
              'W06_PRE_MERGE': f"PASS:{','.join(str(v) for v in premerge_runs.values())}",
              'W07_EXACT_MAIN': f'PASS:{postmerge_run}',
              'CODEX_CALLS_DURING_OPTIMIZATION': '0',
          }
          state['post_merge'] = {
              'status': 'PASS',
              'merge_sha': merge_sha,
              'verified_run_ids': [postmerge_run],
          }
          state['human_gate'] = {
              'required': False,
              'reason': None,
              'minimum_action': None,
              'resume_from': None,
          }
          state['notification'] = {
              **state.get('notification', {}),
              'generation': int(state.get('notification', {}).get('generation', 0)) + 1,
              'last_type': 'COMPLETED',
              'acknowledged': True,
          }
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          active_path = Path('docs/implementation/ACTIVE_TASKS.yaml')
          active = json.loads(active_path.read_text(encoding='utf-8'))
          for item in active.get('tasks', []):
              if item.get('task_id') == task_id:
                  item.update({'status': 'DONE', 'branch': 'main', 'pull_request': 50, 'current_stage': 'W07'})
          active_path.write_text(json.dumps(active, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          (task_dir / 'W06_result.md').write_text(
              '# W06 结果：合并前全量验证\n\n'
              '```yaml\nstatus: PASS\n'
              f"state_consistency_run: {premerge_runs['state_consistency']}\n"
              f"upgrade_compatibility_run: {premerge_runs['upgrade_compatibility']}\n"
              f"full_test_run: {premerge_runs['full_test']}\n"
              f"real_e2e_run: {premerge_runs['real_e2e']}\n"
              'codex_calls: 0\n```\n',
              encoding='utf-8',
          )
          (task_dir / 'W07_result.md').write_text(
              '# W07 结果：Exact-main 与最终收尾\n\n'
              '```yaml\nstatus: PASS\n'
              f'merge_sha: {merge_sha}\n'
              f'exact_main_tested_sha: {tested_sha}\n'
              f'post_merge_run: {postmerge_run}\n'
              'full_product_regression: PASS\n'
              'real_e2e_688521: PASS\n'
              'codex_policy_after_completion: disabled\n'
              'codex_calls: 0\n```\n',
              encoding='utf-8',
          )
          (task_dir / 'FINAL_REPORT.md').write_text(
              '# Devflow Operational Optimization v2 最终报告\n\n'
              '## 结论\n\n'
              'W00–W07 已在零 Codex 调用条件下完成。默认执行路径为 ChatGPT Web 与确定性 GitHub Actions；Codex 仍由仓库级 Policy 硬禁用。\n\n'
              '## 已交付\n\n'
              '- 全局 `mode: disabled` 与无模型 Composite Action；\n'
              '- 禁止 Bot、Auto Recovery、失败 Job 与 Post-Merge 自动派发或重试 Codex；\n'
              '- 用户授权、失败复现、失败文件覆盖、Context Budget、重复指纹和使用账本资格门禁；\n'
              '- 十次历史额度浪费 Run 永久回归 Fixture，全部路由至 ChatGPT Web；\n'
              '- 影响感知 Test/E2E、依赖缓存、State Schema v2、Branch GC dry-run 与升级兼容；\n'
              '- 合并前完整 Test、真实 688521 E2E 和 exact-main 再验证。\n\n'
              '## 证据\n\n'
              f'- PR：#50\n- Merge SHA：`{merge_sha}`\n- Exact-main Run：`{postmerge_run}`\n'
              f"- Pre-merge Runs：`{premerge_runs}`\n"
              '- 优化期间 Codex 调用：`0`\n- 完成后 Codex Policy：`disabled`\n',
              encoding='utf-8',
          )
          PY
          python scripts/devflow/render_task_docs.py \
            docs/implementation/devflow-operational-optimization-v2
          python scripts/devflow/validate_state.py \
            --all-active \
            --output /tmp/final-state-result.json
          git rm .github/workflows/temporary-zero-codex-exact-main-closeout.yml
          git add docs/implementation
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Finalize zero-Codex Devflow operational optimization"
          git push origin HEAD:main

      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zero-codex-exact-main-closeout-failure-${{ github.run_id }}
          path: |
            /tmp/devflow-state-result.json
            /tmp/devflow-workflow-validation.log
            /tmp/devflow-docs-validation.json
            /tmp/devflow-docs-validation.log
            /tmp/devflow-upgrade-compatibility.json
            /tmp/devflow-ruff.log
            /tmp/devflow-pytest.log
            /tmp/product-ruff.log
            /tmp/product-pytest.log
            /tmp/e2e-output/resilient-fetch-report.json
          if-no-files-found: warn
          retention-days: 7
