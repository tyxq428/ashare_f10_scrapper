name: Temporary Dispatch Canonical Codex

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-dispatch-canonical-codex.yml
  schedule:
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: temporary-dispatch-canonical-codex
  cancel-in-progress: false

jobs:
  wait-dispatch-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for canonical wrapper and trusted control branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CONTROL_BRANCH="task/codex-resilient-command-terminal-status-v1"
          for attempt in $(seq 1 240); do
            git fetch origin main --quiet
            if git cat-file -e origin/main:.github/workflows/codex-task.yml 2>/dev/null && \
               git ls-remote --exit-code --heads origin "$CONTROL_BRANCH" >/dev/null 2>&1; then
              PRODUCT_BRANCH="codex/resilient-command-terminal-status-v1"
              if git ls-remote --exit-code --heads origin "$PRODUCT_BRANCH" >/dev/null 2>&1; then
                echo "PRODUCT_BRANCH_ALREADY_PUBLISHED=PASS"
                exit 0
              fi
              ACTIVE="$(gh run list --repo "${{ github.repository }}" --workflow codex-task.yml --limit 20 \
                --json status,databaseId 2>/dev/null \
                --jq '.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending") | .databaseId' | head -n 1)"
              if [[ -z "$ACTIVE" ]]; then
                gh workflow run codex-task.yml --repo "${{ github.repository }}" --ref main \
                  -f task_branch="$CONTROL_BRANCH"
                echo "CANONICAL_CODEX_TASK_DISPATCHED=PASS"
              else
                echo "CANONICAL_CODEX_TASK_ALREADY_ACTIVE=$ACTIVE"
              fi
              exit 0
            fi
            echo "[canonical-dispatch-heartbeat] waiting; attempt=${attempt}/240"
            sleep 20
          done
          exit 1
      - name: Remove obsolete dispatchers and this one-time dispatcher
        if: success()
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          rm -f .github/workflows/temporary-dispatch-codex-control.yml
          rm -f .github/workflows/temporary-dispatch-codex-control-secure.yml
          rm -f .github/workflows/temporary-dispatch-canonical-codex.yml
          rm -f .github/workflows/temporary-codex-recovery-controller.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove completed Codex dispatch controls"
            git push origin HEAD:main
          fi
      - name: Notify only if canonical dispatch is genuinely blocked
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "Single valuable-notification channel." --assignee tyxq428)"; NUMBER="${URL##*/}"; fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

The canonical Codex task wrapper or trusted control branch did not become available, or workflow dispatch failed. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
