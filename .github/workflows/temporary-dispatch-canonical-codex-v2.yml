name: Temporary Dispatch Canonical Codex V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-dispatch-canonical-codex-v2.yml
  schedule:
    - cron: "12,27,42,57 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: temporary-dispatch-canonical-codex-v2
  cancel-in-progress: false

jobs:
  wait-dispatch-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for wrapper readiness marker and trusted control branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CONTROL="task/codex-resilient-command-terminal-status-v1"
          PRODUCT="codex/resilient-command-terminal-status-v1"
          for attempt in $(seq 1 300); do
            git fetch origin main --quiet
            if git cat-file -e origin/main:.devflow/codex-wrapper-ready.json 2>/dev/null && \
               git ls-remote --exit-code --heads origin "$CONTROL" >/dev/null 2>&1; then
              if git ls-remote --exit-code --heads origin "$PRODUCT" >/dev/null 2>&1; then
                echo "PRODUCT_ALREADY_PUBLISHED=PASS"
                exit 0
              fi
              RUNS="$(gh run list --repo "${{ github.repository }}" --workflow codex-task.yml --limit 20 \
                --json status,conclusion,databaseId 2>/dev/null || echo '[]')"
              ACTIVE="$(python -c 'import json,sys; rows=json.load(sys.stdin); x=[r for r in rows if r.get("status") in {"queued","in_progress","waiting","requested","pending"}]; print(x[0]["databaseId"] if x else "")' <<<"$RUNS")"
              COMPLETED="$(python -c 'import json,sys; rows=json.load(sys.stdin); print(sum(1 for r in rows if r.get("status")=="completed"))' <<<"$RUNS")"
              if [[ -n "$ACTIVE" ]]; then
                echo "CODEX_ALREADY_ACTIVE=$ACTIVE"
                exit 0
              fi
              if [[ "$COMPLETED" != "0" ]]; then
                echo "ONE_SESSION_ALREADY_COMPLETED_WITHOUT_PRODUCT_BRANCH"
                exit 1
              fi
              gh workflow run codex-task.yml --repo "${{ github.repository }}" --ref main \
                -f task_branch="$CONTROL"
              echo "CANONICAL_CODEX_DISPATCHED=PASS"
              exit 0
            fi
            echo "[dispatch-v2-heartbeat] waiting; attempt=${attempt}/300"
            sleep 20
          done
          exit 1
      - name: Remove old and current dispatchers after safe handoff
        if: success()
        run: |
          git fetch origin main
          git reset --hard origin/main
          rm -f .github/workflows/temporary-dispatch-canonical-codex.yml
          rm -f .github/workflows/temporary-dispatch-canonical-codex-v2.yml
          rm -f .github/workflows/temporary-dispatch-codex-control.yml
          rm -f .github/workflows/temporary-dispatch-codex-control-secure.yml
          rm -f .github/workflows/temporary-codex-recovery-controller.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove completed Codex dispatch controls"
            git push origin HEAD:main
          fi
      - name: Notify only if wrapper/control/session state is blocked
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "Single valuable-notification channel." --assignee tyxq428)"; NUMBER="${URL##*/}"; fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

The exact-main Codex wrapper never became ready, the control branch was missing, or the one-session budget was already consumed without a product branch. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
