name: Devflow Infrastructure Post Merge

on:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - "**/AGENTS.md"
      - "docs/process/**"
      - "docs/implementation/**"
      - "scripts/devflow/**"
      - "tests/test_devflow*.py"
      - "tests/fixtures/devflow/**"
      - ".github/actions/codex-thin-worker/**"
      - ".github/workflows/*devflow*"
      - ".github/workflows/*codex*"
      - ".github/workflows/test.yml"
      - ".github/workflows/e2e-688521.yml"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  verify-exact-main:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Classify exact-main infrastructure impact
        id: impact
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$BEFORE_SHA" =~ ^[0-9a-f]{40}$ &&
                "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$BEFORE_SHA"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            BASE_SHA="$(git rev-parse HEAD^)"
          else
            BASE_SHA="$(git rev-parse HEAD)"
          fi
          python scripts/devflow/change_impact.py \
            --base "$BASE_SHA" \
            --head HEAD \
            --output post-merge-impact.json \
            --github-output "$GITHUB_OUTPUT"
          {
            echo "## Exact-main impact"
            echo '```json'
            cat post-merge-impact.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify state, documentation and workflow policy
        run: |
          python scripts/devflow/validate_state.py \
            --all-active \
            --no-git \
            --output post-merge-state-result.json
          python scripts/devflow/validate_docs.py \
            --output post-merge-docs-result.json
          python scripts/devflow/validate_workflows.py

      - name: Set up Python with dependency cache
        if: steps.impact.outputs.impact != 'docs_only'
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        if: steps.impact.outputs.impact != 'docs_only'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run exact-main Devflow contract
        if: steps.impact.outputs.impact == 'devflow_only'
        run: |
          python -m compileall -q scripts/devflow
          python scripts/devflow/upgrade_compatibility.py \
            --output post-merge-upgrade-compatibility.json
          ruff check scripts/devflow tests/test_devflow*.py
          pytest -q tests/test_devflow*.py

      - name: Run exact-main complete product regression
        if: steps.impact.outputs.impact == 'product'
        run: |
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py \
            scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing

      - name: Record exact-main docs-only pass
        if: steps.impact.outputs.impact == 'docs_only'
        run: |
          echo "INFRASTRUCTURE_POST_MERGE=DOCS_ONLY_PASS" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "No product regression result was cached or reused." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: infrastructure-post-merge-failure-${{ github.run_id }}
          path: |
            post-merge-impact.json
            post-merge-state-result.json
            post-merge-docs-result.json
            post-merge-upgrade-compatibility.json
            devflow-workflow-validation.json
          if-no-files-found: warn
          retention-days: 7
