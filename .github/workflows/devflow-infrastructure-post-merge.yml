name: Devflow Infrastructure Post Merge

on:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - "**/AGENTS.md"
      - "docs/process/**"
      - "docs/implementation/**"
      - "scripts/devflow/**"
      - "tests/test_devflow.py"
      - ".github/workflows/*devflow*"
      - ".github/workflows/*codex*"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify-exact-main:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify infrastructure state and policy
        run: |
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --no-git \
            --output post-merge-state-result.json
          python scripts/devflow/validate_workflows.py
          pytest -q tests/test_devflow.py
      - name: Run existing repository regression contract
        run: |
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: infrastructure-post-merge-failure-${{ github.run_id }}
          path: |
            post-merge-state-result.json
            devflow-workflow-validation.json
          if-no-files-found: warn
          retention-days: 7

  zero-codex-finalize-operational-optimization:
    if: github.event.head_commit.message == 'Rerun deterministic zero-Codex operational optimization finalizer'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-operational-optimization-v2-clean
          fetch-depth: 0
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Verify repository-wide model freeze
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          policy = json.loads(Path('.devflow/codex-policy.yaml').read_text())
          assert policy['mode'] == 'disabled'
          action = Path('.github/actions/codex-thin-worker/action.yml').read_text()
          assert 'openai/codex-action@' not in action
          assert 'CODEX_POLICY_DISABLED' in action
          print('ZERO_CODEX_FREEZE=PASS')
          PY
      - name: Install deterministic dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply deterministic finalizer and run bounded gates
        id: finalize
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python scripts/devflow/temporary_patch_finalizer.py
            python scripts/devflow/temporary_finalize_operational_optimization.py
            ruff format scripts/devflow tests/test_devflow*.py
            ruff check --fix scripts/devflow tests/test_devflow*.py
            python -m compileall -q scripts/devflow
            python scripts/devflow/validate_workflows.py
            python scripts/devflow/validate_docs.py --output /tmp/devflow-docs-validation.json
            python scripts/devflow/upgrade_compatibility.py --output /tmp/devflow-upgrade-compatibility.json
            ruff check scripts/devflow tests/test_devflow*.py
            pytest -q tests/test_devflow*.py
          } 2>&1 | tee /tmp/zero-codex-finalizer.log
      - name: Publish safe finalizer diagnostic on failure
        if: steps.finalize.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/implementation/devflow-operational-optimization-v2
          {
            echo '# Zero-Codex Finalizer Diagnostic'
            echo
            echo '```text'
            tail -n 200 /tmp/zero-codex-finalizer.log
            echo '```'
          } > docs/implementation/devflow-operational-optimization-v2/FINALIZER_DIAGNOSTIC.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record deterministic operational optimization failure"
          git push origin HEAD:feature/devflow-operational-optimization-v2-clean
          exit 1
      - name: Commit verified clean optimization branch
        if: steps.finalize.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete zero-Codex Devflow operational optimization"
          git push origin HEAD:feature/devflow-operational-optimization-v2-clean
      - name: Remove one-shot finalizer from main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git switch -C main origin/main
          git show eb74e072bd3c9d2be8f6e214d695b7357582f53e:.github/workflows/devflow-infrastructure-post-merge.yml \
            > .github/workflows/devflow-infrastructure-post-merge.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/devflow-infrastructure-post-merge.yml
          git commit -m "Remove zero-Codex operational optimization rerun"
          git push origin HEAD:main
