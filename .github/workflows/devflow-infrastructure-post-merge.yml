# Retrigger after clean branch restoration; deterministic only, no Codex.
name: Devflow Infrastructure Post Merge

on:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - "**/AGENTS.md"
      - "docs/process/**"
      - "docs/implementation/**"
      - "scripts/devflow/**"
      - "tests/test_devflow.py"
      - ".github/workflows/*devflow*"
      - ".github/workflows/*codex*"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify-exact-main:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify infrastructure state and policy
        run: |
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --no-git \
            --output post-merge-state-result.json
          python scripts/devflow/validate_workflows.py
          pytest -q tests/test_devflow.py
      - name: Run existing repository regression contract
        run: |
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: infrastructure-post-merge-failure-${{ github.run_id }}
          path: |
            post-merge-state-result.json
            devflow-workflow-validation.json
          if-no-files-found: warn
          retention-days: 7

  one-shot-clean-migration:
    if: github.event.head_commit.message == 'Inject one-shot clean Devflow migration job'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
      - name: Verify zero-Codex freeze before migration
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          policy = json.loads(Path('.devflow/codex-policy.yaml').read_text())
          assert policy['mode'] == 'disabled'
          action = Path('.github/actions/codex-thin-worker/action.yml').read_text()
          assert 'openai/codex-action@' not in action
          assert 'CODEX_POLICY_DISABLED' in action
          print('CODEX_FREEZE=PASS')
          PY
      - name: Rebuild clean branch deterministically
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            feature/devflow-operational-optimization-v2-clean \
            feature/devflow-operational-optimization-v2
          git switch -C feature/devflow-operational-optimization-v2-clean \
            origin/feature/devflow-operational-optimization-v2-clean
          python scripts/devflow/temporary_migrate_operational_optimization.py
          python -m pip install ruff
          ruff format scripts/devflow tests/test_devflow*.py
          python -m compileall -q scripts/devflow
          git rm scripts/devflow/temporary_migrate_operational_optimization.py
          git rm .github/workflows/temporary-migrate-operational-optimization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md .devflow .github docs scripts/devflow tests
          git commit -m "Rebuild Devflow optimization on frozen main without Codex"
          git push origin HEAD:feature/devflow-operational-optimization-v2-clean
      - name: Restore main workflow and remove temporary executor
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git switch -C main origin/main
          git show HEAD^:.github/workflows/devflow-infrastructure-post-merge.yml \
            > .github/workflows/devflow-infrastructure-post-merge.yml
          git rm -f .github/workflows/temporary-execute-clean-devflow-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/devflow-infrastructure-post-merge.yml
          git commit -m "Remove one-shot clean Devflow migration executors"
          git push origin HEAD:main
