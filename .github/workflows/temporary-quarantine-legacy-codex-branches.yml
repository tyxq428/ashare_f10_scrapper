# Direct zero-model trigger after the one-shot workflow exists.
name: Temporary Quarantine Legacy Codex Branches

on:
  push:
    branches:
      - feature/codex-trigger-surface-audit-v2
    paths:
      - .github/workflows/temporary-quarantine-legacy-codex-branches.yml

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: temporary-quarantine-legacy-codex-branches
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  quarantine:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/codex-trigger-surface-audit-v2
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prove zero-model boundary and test quarantine logic
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(
              Path('.devflow/codex-policy.yaml').read_text(encoding='utf-8')
          )
          assert policy['mode'] == 'disabled'
          assert policy['auto_recovery_dispatch'] is False
          assert policy['retry_failed_codex_job'] is False
          action = Path(
              '.github/actions/codex-thin-worker/action.yml'
          ).read_text(encoding='utf-8')
          assert 'CODEX_MODEL_INVOCATION=DISABLED' in action
          assert 'openai/codex-action@' not in action
          print('ZERO_MODEL_BOUNDARY=PASS')
          PY
          ruff check scripts/devflow/legacy_codex_branch_audit.py \
            tests/test_devflow_legacy_codex_branch_audit.py
          pytest -q tests/test_devflow_legacy_codex_branch_audit.py

      - name: Collect open pull request heads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr list --state open --limit 200 --json headRefName \
            > /tmp/open-pr-heads.json

      - name: Quarantine every closed historical task/codex branch
        run: |
          set -euo pipefail
          CONTROL_SHA="$(git rev-parse HEAD)"
          python scripts/devflow/legacy_codex_branch_audit.py \
            --repo . \
            --open-pr-heads-json /tmp/open-pr-heads.json \
            --canonical-action .github/actions/codex-thin-worker/action.yml \
            --control-sha "$CONTROL_SHA" \
            --execute \
            --output docs/implementation/codex-trigger-surface-audit-v2/legacy-codex-rerun-audit.json
          echo "CODEX_MODEL_INVOCATIONS=0" >> "$GITHUB_STEP_SUMMARY"
          echo "RELAY_SECRETS_ACCESSED=0" >> "$GITHUB_STEP_SUMMARY"

      - name: Record W01 result and remove the one-shot executor
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from datetime import UTC, datetime
          from pathlib import Path

          task_dir = Path(
              'docs/implementation/codex-trigger-surface-audit-v2'
          )
          report = json.loads(
              (task_dir / 'legacy-codex-rerun-audit.json').read_text(
                  encoding='utf-8'
              )
          )
          if report.get('status') != 'PASS':
              raise SystemExit('LEGACY_CODEX_BRANCH_AUDIT_FAILED')
          result = (
              '# W01 结果：历史 Codex Workflow Re-run 隔离\n\n'
              '```yaml\n'
              'status: PASS\n'
              f"branch_count: {report['branch_count']}\n"
              f"already_compliant_or_quarantined: {report['compliant_count']}\n"
              f"newly_quarantined: {report['quarantined_count']}\n"
              f"blocked_open_pr_count: {report['blocked_open_pr_count']}\n"
              'remaining_noncompliant: 0\n'
              'codex_calls: 0\n'
              'relay_secrets_accessed: false\n'
              '```\n'
          )
          (task_dir / 'W01_result.md').write_text(result, encoding='utf-8')

          state_path = task_dir / 'task_state.yaml'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          state['state_revision'] += 1
          state['current_stage'] = 'W02'
          state['last_completed_stage'] = 'W01'
          state['last_successful_step'] = 'legacy_codex_branches_quarantined'
          state['next_action'] = 'validate_paid_probe_and_secret_audit_boundaries'
          state['gate_results']['W01_LEGACY_RERUN_QUARANTINE'] = 'PASS'
          state['updated_at_utc'] = datetime.now(UTC).strftime(
              '%Y-%m-%dT%H:%M:%SZ'
          )
          state_path.write_text(
              json.dumps(state, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          git rm \
            .github/workflows/temporary-quarantine-legacy-codex-branches.yml
          git add \
            docs/implementation/codex-trigger-surface-audit-v2 \
            scripts/devflow/legacy_codex_branch_audit.py \
            tests/test_devflow_legacy_codex_branch_audit.py
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m \
            "Quarantine historical Codex task branches from workflow reruns"
          git push origin HEAD:feature/codex-trigger-surface-audit-v2
