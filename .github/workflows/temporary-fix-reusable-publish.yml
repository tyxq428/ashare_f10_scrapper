name: Temporary Fix Reusable Publish

on:
  push:
    branches:
      - feature/chatgpt-web-codex-devflow-v1-clean
    paths:
      - .github/workflows/temporary-fix-reusable-publish.yml

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  fix-and-verify:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/chatgpt-web-codex-devflow-v1-clean
          fetch-depth: 0
      - name: Replace publish job with workspace-clean handoff replay
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('.github/workflows/_reusable-codex-thin-worker.yml')
          text=path.read_text(encoding='utf-8')
          prefix=text.split('\n  publish:\n',1)[0]
          publish=r'''
  publish:
    name: secret-free-publish
    needs: codex
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ inputs.task_branch }}
          fetch-depth: 0

      - name: Download audited handoff outside the repository workspace
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: codex-handoff-${{ inputs.task_id }}-${{ github.run_id }}
          path: /tmp/codex-handoff

      - name: Verify manifest, apply patch and re-run scope
        shell: bash
        run: |
          set -euo pipefail
          (cd /tmp/codex-handoff && sha256sum --check manifest.sha256)
          python - <<'PY2'
          import json
          from pathlib import Path
          if json.loads(Path('/tmp/codex-handoff/secret-audit.json').read_text())['status'] != 'PASS':
              raise SystemExit('secret audit did not pass')
          PY2
          git switch -c "${{ inputs.publish_branch }}"
          git apply --index /tmp/codex-handoff/codex.patch
          python scripts/devflow/verify_changed_paths.py \
            --task-file "${{ inputs.task_file }}" \
            --status \
            --output /tmp/publish-scope-result.json

      - name: Re-run trusted gate without relay secrets
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/run_gate_profile.py "${{ inputs.gate_profile }}" \
            --output /tmp/publish-gate-result.json

      - name: Commit and push isolated product branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Apply Codex thin-worker task ${{ inputs.task_id }}"
          git push origin "HEAD:refs/heads/${{ inputs.publish_branch }}"
          echo "PUBLISHED_BRANCH=${{ inputs.publish_branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "PUBLISHED_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
'''
          if '\n  publish:\n' not in text:
              raise SystemExit('publish job marker not found')
          path.write_text(prefix+'\n'+publish.lstrip('\n'),encoding='utf-8')
          PY
      - name: Verify static policy and unit tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/validate_workflows.py
          ruff check scripts/devflow tests/test_devflow.py
          pytest -q tests/test_devflow.py
      - name: Remove one-time fixer and publish
        run: |
          rm -f .github/workflows/temporary-fix-reusable-publish.yml
          rm -rf scripts/devflow/__pycache__ tests/__pycache__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep secret-free handoff outside repository workspace"
          git push origin HEAD:feature/chatgpt-web-codex-devflow-v1-clean
