name: Devflow Secret Audit

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Exact completed one-time activation run ID
        required: true
        type: string
      activation_id:
        description: One-time activation ID recorded by the model run
        required: true
        type: string
      confirm_model_run:
        description: Enter AUDIT_CONFIRMED_MODEL_RUN
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  validate-source:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      source_run_id: ${{ steps.source.outputs.source_run_id }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          persist-credentials: false

      - name: Validate source run and model-start marker before Environment binding
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ inputs.source_run_id }}
          ACTIVATION_ID: ${{ inputs.activation_id }}
          CONFIRM: ${{ inputs.confirm_model_run }}
        run: |
          set -euo pipefail
          test "$CONFIRM" = "AUDIT_CONFIRMED_MODEL_RUN"
          [[ "$SOURCE_RUN" =~ ^[0-9]+$ ]]
          [[ "$ACTIVATION_ID" =~ ^[A-Za-z0-9._-]{8,120}$ ]]
          gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}" \
            > /tmp/source-run.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          value = json.loads(Path('/tmp/source-run.json').read_text(encoding='utf-8'))
          if value.get('name') != 'Codex One-Time Activation':
              raise SystemExit('SOURCE_WORKFLOW_IS_NOT_ONE_TIME_ACTIVATION')
          if value.get('event') != 'workflow_dispatch':
              raise SystemExit('SOURCE_EVENT_IS_NOT_MANUAL_DISPATCH')
          if value.get('head_branch') != 'main':
              raise SystemExit('SOURCE_ACTIVATION_DID_NOT_RUN_FROM_MAIN')
          if value.get('status') != 'completed':
              raise SystemExit('SOURCE_ACTIVATION_NOT_COMPLETED')
          PY
          mkdir -p /tmp/source-preflight-logs
          gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/logs" \
            > /tmp/source-preflight-logs.zip
          unzip -q /tmp/source-preflight-logs.zip -d /tmp/source-preflight-logs
          rm -f /tmp/source-preflight-logs.zip
          grep -R -F -q \
            "CODEX_MODEL_SESSION_STARTED activation_id=${ACTIVATION_ID}" \
            /tmp/source-preflight-logs
          echo "source_run_id=${SOURCE_RUN}" >> "$GITHUB_OUTPUT"
          echo "MODEL_RUN_EVIDENCE=VALIDATED_BEFORE_SECRET_ACCESS" \
            >> "$GITHUB_STEP_SUMMARY"

  audit-public-logs:
    needs: validate-source
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: agent-runtime
      deployment: false
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          persist-credentials: false

      - name: Register private value masks
        shell: bash
        env:
          ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          API_KEY: ${{ secrets.AGENT_API_KEY }}
          MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set +x
          python - <<'PY'
          import base64
          import os
          from urllib.parse import quote, urlsplit

          endpoint = os.environ['ENDPOINT']
          key = os.environ['API_KEY']
          model = os.environ['MODEL']
          parsed = urlsplit(endpoint)
          for value in {
              endpoint,
              endpoint.rstrip('/'),
              parsed.netloc,
              parsed.hostname or '',
              key,
              model,
              quote(endpoint, safe=''),
              quote(key, safe=''),
              base64.b64encode(endpoint.encode()).decode(),
              base64.urlsafe_b64encode(endpoint.encode()).decode(),
              base64.b64encode(key.encode()).decode(),
              base64.urlsafe_b64encode(key.encode()).decode(),
          }:
              if len(value) >= 3:
                  print(f'::add-mask::{value}')
          PY

      - name: Download validated source workflow logs privately
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ needs.validate-source.outputs.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/source-logs
          gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/logs" \
            > /tmp/source-logs.zip
          unzip -q /tmp/source-logs.zip -d /tmp/source-logs
          rm -f /tmp/source-logs.zip

      - name: Scan raw logs without printing matches
        shell: bash
        env:
          AGENT_RESPONSES_ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          AGENT_MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set -euo pipefail
          mapfile -d '' LOG_FILES < <(find /tmp/source-logs -type f -print0)
          test "${#LOG_FILES[@]}" -gt 0
          python scripts/devflow/secret_audit.py "${LOG_FILES[@]}" \
            --output public-log-secret-audit.json

      - name: Upload safe audit summary only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: secret-audit-failure-${{ needs.validate-source.outputs.source_run_id }}
          path: public-log-secret-audit.json
          if-no-files-found: warn
          retention-days: 7
