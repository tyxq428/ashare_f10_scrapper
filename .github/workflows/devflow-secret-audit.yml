name: Devflow Secret Audit

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Exact GitHub Actions run ID whose public logs must be audited
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  audit-public-logs:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: agent-runtime
      deployment: false
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          persist-credentials: false

      - name: Validate explicit source run ID
        shell: bash
        env:
          SOURCE_RUN: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_RUN" =~ ^[0-9]+$ ]]
          echo "SOURCE_RUN_ID=${SOURCE_RUN}" >> "$GITHUB_STEP_SUMMARY"
          echo "This audit does not start a model session." >> "$GITHUB_STEP_SUMMARY"

      - name: Register private value masks
        shell: bash
        env:
          ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          API_KEY: ${{ secrets.AGENT_API_KEY }}
          MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set +x
          python - <<'PY'
          import base64
          import os
          from urllib.parse import quote, urlsplit

          endpoint = os.environ['ENDPOINT']
          key = os.environ['API_KEY']
          model = os.environ['MODEL']
          parsed = urlsplit(endpoint)
          for value in {
              endpoint,
              endpoint.rstrip('/'),
              parsed.netloc,
              parsed.hostname or '',
              key,
              model,
              quote(endpoint, safe=''),
              quote(key, safe=''),
              base64.b64encode(endpoint.encode()).decode(),
              base64.urlsafe_b64encode(endpoint.encode()).decode(),
              base64.b64encode(key.encode()).decode(),
              base64.urlsafe_b64encode(key.encode()).decode(),
          }:
              if len(value) >= 3:
                  print(f'::add-mask::{value}')
          PY

      - name: Download source workflow logs privately
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/source-logs
          gh api \
            "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/logs" \
            > /tmp/source-logs.zip
          unzip -q /tmp/source-logs.zip -d /tmp/source-logs
          rm -f /tmp/source-logs.zip

      - name: Scan raw logs without printing matches
        shell: bash
        env:
          AGENT_RESPONSES_ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          AGENT_MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set -euo pipefail
          mapfile -d '' LOG_FILES < <(find /tmp/source-logs -type f -print0)
          test "${#LOG_FILES[@]}" -gt 0
          python scripts/devflow/secret_audit.py "${LOG_FILES[@]}" \
            --output public-log-secret-audit.json

      - name: Upload safe audit summary only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: secret-audit-failure-${{ inputs.source_run_id }}
          path: public-log-secret-audit.json
          if-no-files-found: warn
          retention-days: 7
