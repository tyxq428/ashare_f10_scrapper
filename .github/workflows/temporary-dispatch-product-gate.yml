name: Temporary Dispatch Product Gate

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-dispatch-product-gate.yml
  schedule:
    - cron: "11,26,41,56 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: temporary-dispatch-product-gate
  cancel-in-progress: false

jobs:
  wait-dispatch-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for verified Codex product branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PRODUCT_BRANCH="codex/resilient-command-terminal-status-v1"
          for attempt in $(seq 1 180); do
            if git ls-remote --exit-code --heads origin "$PRODUCT_BRANCH" >/dev/null 2>&1; then
              RUNS="$(gh run list --repo "${{ github.repository }}" \
                --workflow "Temporary Product Branch Gate" --limit 20 \
                --json status,conclusion,headBranch,databaseId 2>/dev/null || echo '[]')"
              ACTIVE="$(python -c 'import json,sys; rows=json.load(sys.stdin); x=[r for r in rows if r.get("status") in {"queued","in_progress","waiting","requested","pending"}]; print(x[0]["databaseId"] if x else "")' <<<"$RUNS")"
              if [[ -z "$ACTIVE" ]]; then
                gh workflow run temporary-product-branch-gate.yml \
                  --repo "${{ github.repository }}" --ref main \
                  -f product_branch="$PRODUCT_BRANCH"
                echo "PRODUCT_GATE_DISPATCHED=PASS"
              else
                echo "PRODUCT_GATE_ALREADY_ACTIVE=$ACTIVE"
              fi
              exit 0
            fi
            echo "[product-gate-heartbeat] waiting for product branch; attempt=${attempt}/180"
            sleep 20
          done
          echo "PRODUCT_BRANCH_TIMEOUT"
          exit 1
      - name: Remove one-time product gate dispatcher
        if: success()
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          rm -f .github/workflows/temporary-dispatch-product-gate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove completed product gate dispatcher"
          git push origin HEAD:main
      - name: Notify only if product branch never appears
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" \
            --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

The verified Codex product branch did not appear in time, so the explicit product gate could not start. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} and resume from HANDOFF.md."
