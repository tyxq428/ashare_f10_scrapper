name: Temporary PR-A Controller

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-pr-a-controller.yml
  schedule:
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: temporary-pr-a-controller
  cancel-in-progress: false

jobs:
  validate-and-merge-pr-a:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    steps:
      - name: Wait for completed W04 branch state
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="feature/chatgpt-web-codex-devflow-v1-clean"
          for attempt in $(seq 1 180); do
            git init -q /tmp/probe
            git -C /tmp/probe remote remove origin 2>/dev/null || true
            git -C /tmp/probe remote add origin "https://github.com/${{ github.repository }}.git"
            git -C /tmp/probe fetch -q --depth=1 origin "$BRANCH"
            if git -C /tmp/probe cat-file -e FETCH_HEAD:docs/implementation/chatgpt-web-codex-devflow-v1/W04_result.md 2>/dev/null; then
              echo "PR_A_W04_RESULT=READY"
              exit 0
            fi
            rm -rf /tmp/probe
            echo "[pr-a-heartbeat] waiting for W04 completion; attempt=${attempt}/180"
            sleep 20
          done
          exit 1
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/chatgpt-web-codex-devflow-v1-clean
          fetch-depth: 0
      - name: Synchronize latest main and run exact PR-A gates
        run: |
          set -euo pipefail
          git fetch origin main
          git merge --no-edit origin/main
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --output pr-a-state-result.json
          python scripts/devflow/validate_workflows.py
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Remove all PR-A one-time branch workflows and publish exact reviewed head
        run: |
          set -euo pipefail
          rm -f .github/workflows/temporary-complete-devflow-w04.yml
          rm -f .github/workflows/temporary-complete-devflow-w04-v2.yml
          rm -f .github/workflows/temporary-ruff-fix-devflow.yml
          rm -f .github/workflows/temporary-merge-devflow-pr-a.yml
          rm -rf scripts/devflow/__pycache__ tests/__pycache__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Finalize verified PR-A infrastructure"
            git push origin HEAD:feature/chatgpt-web-codex-devflow-v1-clean
          fi
      - name: Find or create Web-compatible PR-A and merge exact head
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="$(gh pr list --repo "${{ github.repository }}" --state open \
            --head "tyxq428:feature/chatgpt-web-codex-devflow-v1-clean" --base main \
            --json number --jq '.[0].number // empty')"
          if [[ -z "$PR_NUMBER" ]]; then
            URL="$(gh pr create --repo "${{ github.repository }}" \
              --head feature/chatgpt-web-codex-devflow-v1-clean --base main \
              --title "Build ChatGPT Web + Codex Thin Worker development flow" \
              --body "Infrastructure-only PR for the canonical ChatGPT Web + GitHub Actions + Codex Thin Worker flow. Full plans and evidence are under docs/implementation/chatgpt-web-codex-devflow-v1/." --draft)"
            PR_NUMBER="${URL##*/}"
          fi
          HEAD_SHA="$(git rev-parse HEAD)"
          gh pr ready "$PR_NUMBER" --repo "${{ github.repository }}" || true
          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --merge --match-head-commit "$HEAD_SHA"
      - name: Remove this controller from latest main after successful merge
        if: success()
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          rm -f .github/workflows/temporary-pr-a-controller.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove completed PR-A controller"
          git push origin HEAD:main
      - name: Notify only if PR-A is genuinely blocked
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

PR-A did not reach a verifiable W04 state, failed exact branch gates, conflicted with main, or could not be merged. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} and resume from HANDOFF.md."
