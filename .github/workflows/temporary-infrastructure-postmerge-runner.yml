name: Devflow Infrastructure Post Merge

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-infrastructure-postmerge-runner.yml
  schedule:
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: temporary-infrastructure-postmerge-runner
  cancel-in-progress: false

jobs:
  wait-and-verify-exact-main:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for PR-A infrastructure to reach exact main
        run: |
          set -euo pipefail
          for attempt in $(seq 1 180); do
            git fetch origin main --quiet
            if git cat-file -e origin/main:scripts/devflow/validate_state.py 2>/dev/null && \
               git cat-file -e origin/main:docs/implementation/chatgpt-web-codex-devflow-v1/W04_result.md 2>/dev/null; then
              git reset --hard origin/main
              echo "PR_A_INFRASTRUCTURE_ON_MAIN=READY"
              exit 0
            fi
            echo "[infra-postmerge-heartbeat] waiting for PR-A on exact main; attempt=${attempt}/180"
            sleep 20
          done
          exit 1
      - name: Install dependencies and run exact-main infrastructure plus full gates
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --no-git \
            --output post-merge-state-result.json
          python scripts/devflow/validate_workflows.py
          ruff check scripts/devflow tests/test_devflow.py
          pytest -q tests/test_devflow.py
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Remove this one-time exact-main runner
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          rm -f .github/workflows/temporary-infrastructure-postmerge-runner.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove completed infrastructure post-merge runner"
          git push origin HEAD:main
