# Deterministic trigger; no Codex or relay access.
name: Temporary Zero-Codex Fix V8

on:
  push:
    branches: [main]
    paths: [.github/workflows/temporary-zero-codex-fix-v8.yml]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message == 'Trigger temporary zero-Codex deterministic fix v8'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-operational-optimization-v2-clean
          fetch-depth: 0
      - name: Apply ChatGPT Web deterministic correction
        run: |
          python scripts/devflow/temporary_fix_zero_model_tests.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align zero-model recovery policy and regression expectations"
          git push origin HEAD:feature/devflow-operational-optimization-v2-clean
      - name: Remove temporary executor
        if: always()
        run: |
          git fetch --no-tags origin main
          git switch -C main origin/main
          git rm .github/workflows/temporary-zero-codex-fix-v8.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove temporary zero-Codex deterministic fix v8"
          git push origin HEAD:main
