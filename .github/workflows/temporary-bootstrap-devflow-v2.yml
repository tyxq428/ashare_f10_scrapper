name: Temporary Bootstrap Devflow V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-bootstrap-devflow-v2.yml
  schedule:
    - cron: "1,16,31,46 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

concurrency:
  group: temporary-bootstrap-devflow-v2
  cancel-in-progress: false

jobs:
  exact-main-health-and-control:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: agent-runtime
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for verified PR-A infrastructure on main
        run: |
          set -euo pipefail
          for attempt in $(seq 1 240); do
            git fetch origin main --quiet
            if git cat-file -e origin/main:scripts/devflow/relay_health.py 2>/dev/null && \
               git cat-file -e origin/main:docs/implementation/chatgpt-web-codex-devflow-v1/W04_result.md 2>/dev/null; then
              git reset --hard origin/main
              echo "PR_A_EXACT_MAIN=READY"
              exit 0
            fi
            echo "[bootstrap-v2-heartbeat] waiting for PR-A; attempt=${attempt}/240"
            sleep 20
          done
          exit 1
      - name: Run exact-main infrastructure gate before using secrets
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --no-git \
            --output bootstrap-state-result.json
          python scripts/devflow/validate_workflows.py
          ruff check scripts/devflow tests/test_devflow.py
          pytest -q tests/test_devflow.py
      - name: Register private masks and run one formal Relay health check
        shell: bash
        env:
          ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          API_KEY: ${{ secrets.AGENT_API_KEY }}
          MODEL: ${{ secrets.AGENT_MODEL }}
          AGENT_RESPONSES_ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          AGENT_MODEL: ${{ secrets.AGENT_MODEL }}
          PYTHONPATH: scripts/devflow
        run: |
          set +x
          python - <<'PY'
          import base64, os
          from urllib.parse import quote, urlsplit
          endpoint=os.environ['ENDPOINT']; key=os.environ['API_KEY']; model=os.environ['MODEL']
          parsed=urlsplit(endpoint)
          for value in {endpoint,endpoint.rstrip('/'),parsed.netloc,parsed.hostname or '',key,model,
                        quote(endpoint,safe=''),quote(key,safe=''),
                        base64.b64encode(endpoint.encode()).decode(),
                        base64.urlsafe_b64encode(endpoint.encode()).decode(),
                        base64.b64encode(key.encode()).decode(),
                        base64.urlsafe_b64encode(key.encode()).decode()}:
              if len(value)>=3: print(f'::add-mask::{value}')
          PY
          python scripts/devflow/relay_health.py
          python scripts/devflow/secret_audit.py relay-health-summary.json \
            --output relay-health-secret-audit.json
      - name: Idempotently record W05 and create the trusted control branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          python - <<'PY'
          import json
          from datetime import UTC, datetime
          from pathlib import Path
          root=Path('docs/implementation/chatgpt-web-codex-devflow-v1')
          state_path=root/'task_state.yaml'
          state=json.loads(state_path.read_text(encoding='utf-8'))
          if state.get('current_stage') in {'W04','W05'}:
              state['state_revision'] += 1
              state['current_stage']='W06'
              state['last_completed_stage']='W05'
              state['last_successful_step']='pr_a_exact_main_and_formal_relay_health_verified'
              state['next_action']='dispatch_real_resilient_command_codex_thin_slice'
              state['gate_results']['W04']='PASS'
              state['gate_results']['W05']='PASS'
              state['updated_at_utc']=datetime.now(UTC).replace(microsecond=0).isoformat().replace('+00:00','Z')
              state_path.write_text(json.dumps(state,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
              active_path=Path('docs/implementation/ACTIVE_TASKS.yaml')
              active=json.loads(active_path.read_text(encoding='utf-8'))
              entry=next(x for x in active['tasks'] if x['task_id']==state['task_id'])
              entry['status']='RUNNING'; entry['current_stage']='W06'
              active_path.write_text(json.dumps(active,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          (root/'W05_result.md').write_text('''# W05 结果：PR-A 合并与独立 Post-Merge\n\n```yaml\nphase: W05\nstatus: COMPLETED\nlast_successful_step: pr_a_exact_main_and_formal_relay_health_verified\nnext_action: W06_real_codex_thin_slice\nhuman_intervention_required: false\n```\n\nPR-A 已在 exact main 通过 devflow 状态、Workflow 安全、单元测试和正式 Relay Health；可以启动真实低风险 Codex 薄切片。\n''',encoding='utf-8')
          (root/'W06_plan.md').write_text('''# W06 计划：真实低风险 Codex 薄切片\n\n修复 `run_resilient_command.py` 在重试耗尽后仍报告 `RETRYING` 的问题。只允许修改该脚本和 `tests/test_resilient_fetch.py`；使用 `resilient-command-targeted`；low effort、一个 Session、无自动第二 Session。\n''',encoding='utf-8')
          PY
          python scripts/devflow/render_task_docs.py docs/implementation/chatgpt-web-codex-devflow-v1
          rm -f .github/workflows/temporary-bootstrap-devflow-w05-w06.yml
          rm -f .github/workflows/temporary-bootstrap-devflow-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Complete W05 and prepare real Codex thin slice"
            git push origin HEAD:main
          fi

          CONTROL_BRANCH="task/codex-resilient-command-terminal-status-v1"
          if git ls-remote --exit-code --heads origin "$CONTROL_BRANCH" >/dev/null 2>&1; then
            echo "CONTROL_BRANCH_ALREADY_EXISTS=PASS"
            exit 0
          fi
          git switch -c "$CONTROL_BRANCH"
          mkdir -p .agent
          cat > .agent/current_task.yaml <<'JSON'
          {
            "schema_version": 1,
            "task_id": "resilient-command-terminal-status-v1",
            "objective": "Correct terminal report status after finite retry exhaustion without changing retry classification or retry-count semantics.",
            "base_branch": "main",
            "publish_branch": "codex/resilient-command-terminal-status-v1",
            "allowed_files": ["scripts/run_resilient_command.py", "tests/test_resilient_fetch.py"],
            "forbidden_patterns": [".github/**", "src/**", "docs/**", ".env", "secrets/**"],
            "required_changes": [
              "PASS only for return code zero.",
              "RETRYING only when failure is retryable and another attempt will run.",
              "FAILED for non-retryable failures and exhausted retry budget.",
              "Preserve final attempt retryable=true when classification is retryable.",
              "Add deterministic regression tests for success, intermediate retry, exhausted retry and non-retryable failure."
            ],
            "instructions": "Make the smallest patch. Do not redesign retry classification. Run only the trusted targeted gate. Return SUCCESS only after tests pass; otherwise BLOCKED.",
            "gate_profile": "resilient-command-targeted",
            "reasoning_effort": "low",
            "session_limit": 1,
            "automatic_second_session": 0,
            "stop_conditions": ["any path outside allowed_files", "secret audit match", "targeted gate failure", "business decision required"]
          }
          JSON
          git add .agent/current_task.yaml
          git commit -m "Dispatch resilient command terminal-status thin slice"
          git push origin "HEAD:refs/heads/${CONTROL_BRANCH}"
      - name: Notify only for a real PR-A/Relay/bootstrap block
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "Single valuable-notification channel." --assignee tyxq428)"; NUMBER="${URL##*/}"; fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

PR-A exact-main validation, formal Relay Health or control-branch bootstrap failed. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} and resume from HANDOFF.md."
