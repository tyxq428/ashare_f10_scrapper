name: E2E 688521

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_e2e:
        description: Run the real 688521 E2E regardless of changed-path impact
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: e2e-688521-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Decide whether real product E2E is required
        id: impact
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          FORCE_E2E: ${{ inputs.force_e2e }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$FORCE_E2E" == "true" ]]; then
            printf '%s\n' 'src/__forced_real_e2e__' > /tmp/devflow-e2e-paths.txt
            python scripts/devflow/change_impact.py \
              --paths-file /tmp/devflow-e2e-paths.txt \
              --output e2e-change-impact.json \
              --github-output "$GITHUB_OUTPUT"
          else
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              BASE_SHA="$PR_BASE_SHA"
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse HEAD^)"
            else
              BASE_SHA="$(git rev-parse HEAD)"
            fi
            python scripts/devflow/change_impact.py \
              --base "$BASE_SHA" \
              --head HEAD \
              --output e2e-change-impact.json \
              --github-output "$GITHUB_OUTPUT"
          fi
          {
            echo "## E2E impact decision"
            echo '```json'
            cat e2e-change-impact.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record intentional impact-based E2E pass
        if: steps.impact.outputs.run_e2e != 'true'
        run: |
          echo "E2E_688521=SKIPPED_NON_PRODUCT_IMPACT" >> "$GITHUB_STEP_SUMMARY"
          echo "The stable E2E check passed without network/data fetch." >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python with dependency cache
        if: steps.impact.outputs.run_e2e == 'true'
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        if: steps.impact.outputs.run_e2e == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Fetch all fixed F10 data with active monitoring and recovery
        if: steps.impact.outputs.run_e2e == 'true'
        env:
          ASHARE_F10_TIMEOUT: "60"
          ASHARE_F10_RETRIES: "3"
          ASHARE_F10_MAX_WORKERS: "4"
          ASHARE_F10_PAGE_WORKERS: "3"
        run: |
          python scripts/run_resilient_fetch.py 688521 \
            --output e2e-output \
            --workers 4 \
            --force \
            --max-attempts 3 \
            --backoff-seconds 8 \
            --heartbeat-seconds 15 \
            --report e2e-output/resilient-fetch-report.json

      - name: Validate generated artifacts, chained search and research functions
        if: steps.impact.outputs.run_e2e == 'true'
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import zipfile
          from pathlib import Path

          import duckdb
          import pandas as pd

          from ashare_f10.api.search import search_facts
          from ashare_f10.calculate.formula import evaluate_formula
          from ashare_f10.calculate.ttm import compute_ttm

          root = Path("e2e-output").resolve()
          artifacts = json.loads(
              (root / "artifacts.json").read_text(encoding="utf-8")
          )
          artifacts = {
              key: str(Path(value).resolve())
              if key in {"json", "excel", "parquet", "duckdb"}
              else value
              for key, value in artifacts.items()
          }
          for key in ("json", "excel", "parquet", "duckdb"):
              path = Path(artifacts[key])
              assert path.exists() and path.stat().st_size > 0, (
                  key,
                  path,
              )

          payload = json.loads(
              Path(artifacts["json"]).read_text(encoding="utf-8")
          )
          security = payload.get("metadata", {}).get(
              "security",
              {},
          )
          assert security.get("security_code") == "688521", security
          with zipfile.ZipFile(artifacts["excel"]) as book:
              assert book.testzip() is None
              assert "xl/workbook.xml" in book.namelist()

          facts = pd.read_parquet(artifacts["parquet"])
          assert len(facts) > 100
          assert {
              "field_key",
              "field_name_cn",
              "report_date",
          }.issubset(facts.columns)
          con = duckdb.connect(
              artifacts["duckdb"],
              read_only=True,
          )
          try:
              fact_count = con.execute(
                  "select count(*) from facts"
              ).fetchone()[0]
              assert fact_count == len(facts)
              assets = con.execute(
                  "select count(*) from facts "
                  "where field_key='TOTAL_ASSETS'"
              ).fetchone()[0]
              assert assets > 0
          finally:
              con.close()

          search_results = search_facts(
              artifacts["duckdb"],
              query="资产",
              limit=10,
          )
          assert search_results
          periods = sorted(
              {
                  str(value)[:10]
                  for value in facts.loc[
                      facts["field_key"]
                      == "TOTAL_OPERATE_INCOME",
                      "report_date",
                  ].dropna()
              },
              reverse=True,
          )
          assert periods
          ttm_result = None
          for period in periods:
              try:
                  ttm_result = compute_ttm(
                      artifacts["duckdb"],
                      "TOTAL_OPERATE_INCOME",
                      period,
                  )
                  break
              except ValueError:
                  continue
          assert ttm_result is not None

          formula_result = None
          formula_used = None
          formulas = (
              "CIP / TOTAL_ASSETS",
              "MONETARYFUNDS / TOTAL_ASSETS",
              "ACCOUNTS_RECE / TOTAL_ASSETS",
          )
          for formula in formulas:
              try:
                  formula_result = evaluate_formula(
                      artifacts["duckdb"],
                      formula,
                      periods[0],
                  )
                  formula_used = formula
                  break
              except ValueError:
                  continue
          assert formula_result is not None

          data_dir = Path("api-data").resolve()
          stock_dir = data_dir / "688521"
          stock_dir.mkdir(parents=True, exist_ok=True)
          (stock_dir / "latest.json").write_text(
              json.dumps(
                  {
                      "job_id": "e2e-688521",
                      "output_dir": str(root),
                      "artifacts": artifacts,
                  },
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )
          os.environ["ASHARE_F10_DATA_DIR"] = str(data_dir)
          from fastapi.testclient import TestClient
          from ashare_f10.api.app import app

          client = TestClient(app)
          assert client.get("/api/health").status_code == 200
          assert (
              client.get("/api/stocks/688521/latest").status_code
              == 200
          )
          assert client.get(
              "/api/stocks/688521/search",
              params={"q": "资产", "limit": 5},
          ).json()
          for kind in (
              "json",
              "xlsx",
              "parquet",
              "duckdb",
          ):
              response = client.get(
                  f"/api/stocks/688521/download/{kind}"
              )
              assert (
                  response.status_code == 200
                  and response.content
              )

          summary = {
              "security_code": "688521",
              "fact_count": fact_count,
              "simple_search_result_count": len(search_results),
              "latest_period": periods[0],
              "ttm_end_period": ttm_result.end_period,
              "ttm_method": ttm_result.method,
              "ttm_value": ttm_result.value,
              "formula": formula_used,
              "formula_value": formula_result["value"],
              "artifacts": artifacts,
          }
          (root / "e2e-summary.json").write_text(
              json.dumps(
                  summary,
                  ensure_ascii=False,
                  indent=2,
              ),
              encoding="utf-8",
          )
          print(
              json.dumps(
                  summary,
                  ensure_ascii=False,
                  indent=2,
              )
          )
          PY

      - name: Upload E2E artifacts
        if: always() && steps.impact.outputs.run_e2e == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ashare-f10-e2e-688521-${{ github.run_id }}
          path: e2e-output/
          if-no-files-found: error
          retention-days: 30
