name: E2E 688521

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-688521-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Fetch all fixed F10 data for 688521
        env:
          ASHARE_F10_TIMEOUT: "60"
          ASHARE_F10_RETRIES: "3"
          ASHARE_F10_MAX_WORKERS: "4"
          ASHARE_F10_PAGE_WORKERS: "3"
        run: |
          ashare-f10 fetch 688521 --output e2e-output --workers 4 --force

      - name: Validate generated artifacts and research functions
        run: |
          ashare-f10 validate e2e-output
          python - <<'PY'
          from __future__ import annotations

          import json
          import zipfile
          from pathlib import Path

          import duckdb
          import pandas as pd
          from fastapi.testclient import TestClient

          from ashare_f10.api.app import app
          from ashare_f10.calculate.formula import FormulaEngine
          from ashare_f10.calculate.ttm import TTMEngine

          root = Path("e2e-output")
          artifacts = json.loads((root / "artifacts.json").read_text(encoding="utf-8"))
          required = ["json", "excel", "parquet", "duckdb"]
          for key in required:
              path = Path(artifacts[key])
              assert path.exists() and path.stat().st_size > 0, (key, path)

          payload = json.loads(Path(artifacts["json"]).read_text(encoding="utf-8"))
          assert payload.get("metadata", {}).get("security_code") == "688521"

          with zipfile.ZipFile(artifacts["excel"]) as book:
              assert book.testzip() is None
              assert "xl/workbook.xml" in book.namelist()

          facts = pd.read_parquet(artifacts["parquet"])
          assert len(facts) > 100
          assert {"field_key", "field_name_cn", "report_date"}.issubset(facts.columns)

          con = duckdb.connect(artifacts["duckdb"], read_only=True)
          try:
              fact_count = con.execute("select count(*) from facts").fetchone()[0]
              assert fact_count == len(facts)
              assert con.execute("select count(*) from facts where field_key='TOTAL_ASSETS'").fetchone()[0] > 0
          finally:
              con.close()

          ttm = TTMEngine(facts)
          periods = sorted(
              {str(value)[:10] for value in facts.loc[facts["field_key"] == "TOTAL_OPERATE_INCOME", "report_date"].dropna()},
              reverse=True,
          )
          assert periods
          ttm_result = ttm.calculate("TOTAL_OPERATE_INCOME", periods[0])
          assert ttm_result.status in {"OK", "UNRESOLVED"}

          formula = FormulaEngine(facts)
          formula_result = formula.evaluate("CIP / TOTAL_ASSETS", periods[0])
          assert formula_result.status in {"OK", "UNRESOLVED"}

          client = TestClient(app)
          response = client.get("/api/health")
          assert response.status_code == 200
          assert response.json().get("status") == "ok"

          summary = {
              "security_code": "688521",
              "fact_count": fact_count,
              "latest_period": periods[0],
              "ttm_status": ttm_result.status,
              "formula_status": formula_result.status,
              "artifacts": artifacts,
          }
          (root / "e2e-summary.json").write_text(json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ashare-f10-e2e-688521-${{ github.run_id }}
          path: e2e-output/
          if-no-files-found: error
          retention-days: 30
