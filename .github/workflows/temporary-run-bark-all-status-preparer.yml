name: Run Bark All-Status Test Preparer

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/temporary-run-bark-all-status-preparer.yml

permissions:
  contents: write

concurrency:
  group: run-bark-all-status-test-preparer-v2
  cancel-in-progress: false

jobs:
  prepare:
    if: >-
      github.run_attempt == 1 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/devflow-bark-all-status-live-test-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-bark-all-status-live-test-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare the separate one-time live-test workflow and guards
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- \
            .devflow/notification-channels.yaml \
            scripts/devflow/validate_notification_channels.py \
            scripts/devflow/validate_workflows.py \
            tests/test_devflow_bark_workflow.py

          python - <<'PY'
          from __future__ import annotations

          import base64
          import json
          from pathlib import Path

          MANIFEST = Path('.devflow/notification-channels.yaml')
          CHANNEL_VALIDATOR = Path('scripts/devflow/validate_notification_channels.py')
          WORKFLOW_VALIDATOR = Path('scripts/devflow/validate_workflows.py')
          WORKFLOW_TEST = Path('tests/test_devflow_bark_workflow.py')
          LIVE_WORKFLOW = Path('.github/workflows/devflow-bark-all-status-live-test.yml')

          LIVE_WORKFLOW_B64 = ''

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f'EXPECTED_ONE_REPLACEMENT path={path} count={count} old={old!r}'
                  )
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          LIVE_WORKFLOW.write_bytes(base64.b64decode(LIVE_WORKFLOW_B64))

          manifest = json.loads(MANIFEST.read_text(encoding='utf-8'))
          manifest['one_time_live_test'] = {
              'activation_id': 'bark-all-status-live-test-v1-20260724',
              'workflow': LIVE_WORKFLOW.as_posix(),
              'activation_file': '.devflow/bark-all-status-live-test-activation.json',
              'issue_number': 61,
              'statuses': [
                  'COMPLETED',
                  'INTERRUPTED',
                  'HUMAN_REQUIRED',
                  'SECURITY_BLOCKED',
              ],
              'expected_requests': 4,
              'run_attempt_must_equal': 1,
              'automatic_retry': False,
              'response_body_stored': False,
              'response_headers_stored': False,
              'endpoint_stored': False,
              'raw_error_stored': False,
              'secret_value_stored': False,
          }
          MANIFEST.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          replace_once(
              CHANNEL_VALIDATOR,
              'AUTO_RECOVERY = WORKFLOW_ROOT / "devflow-auto-recovery.yml"\n',
              'AUTO_RECOVERY = WORKFLOW_ROOT / "devflow-auto-recovery.yml"\n'
              'LIVE_TEST_WORKFLOW = (\n'
              '    WORKFLOW_ROOT / "devflow-bark-all-status-live-test.yml"\n'
              ')\n'
              'LIVE_TEST_ACTIVATION = Path(\n'
              '    ".devflow/bark-all-status-live-test-activation.json"\n'
              ')\n',
          )

          live_policy = '''
    live_test = manifest.get("one_time_live_test")
    expected_live_test = {
        "activation_id": "bark-all-status-live-test-v1-20260724",
        "workflow": LIVE_TEST_WORKFLOW.as_posix(),
        "activation_file": LIVE_TEST_ACTIVATION.as_posix(),
        "issue_number": 61,
        "statuses": expected_types,
        "expected_requests": 4,
        "run_attempt_must_equal": 1,
        "automatic_retry": False,
        "response_body_stored": False,
        "response_headers_stored": False,
        "endpoint_stored": False,
        "raw_error_stored": False,
        "secret_value_stored": False,
    }
    if live_test != expected_live_test:
        errors.append("one-time Bark all-status live-test policy mismatch")

    try:
        activation = _load_object(LIVE_TEST_ACTIVATION)
    except ValueError as exc:
        errors.append(str(exc))
        activation = {}
    expected_activation = {
        "schema_version": 1,
        "activation_id": "bark-all-status-live-test-v1-20260724",
        "approved_by": "tyxq428",
        "issue_number": 61,
        "active": True,
        "statuses": expected_types,
        "expected_requests": 4,
        "automatic_retry": False,
    }
    if activation != expected_activation:
        errors.append("one-time Bark all-status activation mismatch")

'''
          replace_once(
              CHANNEL_VALIDATOR,
              '    workflow_text: dict[Path, str] = {}\n',
              live_policy + '    workflow_text: dict[Path, str] = {}\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '    if environment_users != [INCIDENT.as_posix()]:\n'
              '        errors.append(\n'
              '            "notification-runtime must be referenced only by Devflow Incident: "\n'
              '            f"{environment_users}"\n'
              '        )\n',
              '    expected_environment_users = [\n'
              '        LIVE_TEST_WORKFLOW.as_posix(),\n'
              '        INCIDENT.as_posix(),\n'
              '    ]\n'
              '    if environment_users != expected_environment_users:\n'
              '        errors.append(\n'
              '            "notification-runtime may be referenced only by Incident and the "\n'
              '            "owner-approved one-time live test: "\n'
              '            f"{environment_users}"\n'
              '        )\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '    if secret_users != [INCIDENT.as_posix()]:\n'
              '        errors.append(\n'
              '            "BARK_PUSH_URL must be referenced only by Devflow Incident: "\n'
              '            f"{secret_users}"\n'
              '        )\n',
              '    expected_secret_users = [\n'
              '        LIVE_TEST_WORKFLOW.as_posix(),\n'
              '        INCIDENT.as_posix(),\n'
              '    ]\n'
              '    if secret_users != expected_secret_users:\n'
              '        errors.append(\n'
              '            "BARK_PUSH_URL may be referenced only by Incident and the "\n'
              '            "owner-approved one-time live test: "\n'
              '            f"{secret_users}"\n'
              '        )\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '    for path in (INCIDENT, STATE_CONSISTENCY, TERMINAL_PRODUCER):\n',
              '    for path in (\n'
              '        INCIDENT,\n'
              '        STATE_CONSISTENCY,\n'
              '        TERMINAL_PRODUCER,\n'
              '        LIVE_TEST_WORKFLOW,\n'
              '    ):\n',
          )

          live_validation = '''
    live_test_text = workflow_text.get(LIVE_TEST_WORKFLOW, "")
    required_live_test = (
        "push:",
        "      - main",
        ".devflow/bark-all-status-live-test-activation.json",
        "github.event_name == 'push'",
        "github.ref_name == 'main'",
        "github.run_attempt == 1",
        "name: notification-runtime",
        "${{ secrets.BARK_PUSH_URL }}",
        "STATUSES=(COMPLETED INTERRUPTED HUMAN_REQUIRED SECURITY_BLOCKED)",
        "render_bark_message",
        "BARK_TITLE_MISSING_STATUS",
        "--retry 0",
        "--proto '=https'",
        "--tlsv1.2",
        "--output /dev/null",
        "EXPECTED_REAL_BARK_REQUESTS=4",
        "ACTUAL_REAL_BARK_REQUESTS=",
        "BARK_ALL_STATUS_LIVE_TEST=DELIVERED",
        "gh issue comment 61",
        UPLOAD_ARTIFACT_REF,
        "bark-all-status-live-test-${{ github.run_id }}",
        "retention-days: 14",
        "compression-level: 0",
    )
    for fragment in required_live_test:
        if fragment not in live_test_text:
            errors.append(f"Bark all-status live test missing guard: {fragment}")
    if live_test_text.count("--request POST") != 1:
        errors.append("Bark all-status live test must contain exactly one POST loop")
    if live_test_text.count("actions/upload-artifact@") != 1:
        errors.append("Bark all-status live test must upload exactly one result Artifact")
    for forbidden in (
        "repository_dispatch:",
        "workflow_run:",
        "agent-runtime",
        "secrets.AGENT_",
        "openai/codex-action@",
        "private_responses_forwarder.py",
        "relay_health.py",
        "--show-error",
    ):
        if forbidden in live_test_text:
            errors.append(f"Bark all-status live test contains forbidden path: {forbidden}")

'''
          replace_once(
              CHANNEL_VALIDATOR,
              '    comment_text = (\n',
              live_validation + '    comment_text = (\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '        "automatic_bark_retries": 0 if not errors else None,\n'
              '        "errors": errors,\n',
              '        "automatic_bark_retries": 0 if not errors else None,\n'
              '        "bark_live_test_post_locations": live_test_text.count(\n'
              '            "--request POST"\n'
              '        ),\n'
              '        "bark_live_test_artifact_uploads": live_test_text.count(\n'
              '            "actions/upload-artifact@"\n'
              '        ),\n'
              '        "one_time_live_test": live_test,\n'
              '        "errors": errors,\n',
          )

          replace_once(
              WORKFLOW_VALIDATOR,
              '    "devflow-incident.yml",\n',
              '    "devflow-incident.yml",\n'
              '    "devflow-bark-all-status-live-test.yml",\n',
          )

          workflow_validator = '''


def _validate_bark_all_status_live_test(
    path: Path,
    text: str,
    errors: list[str],
) -> None:
    _require_fragments(
        path,
        text,
        (
            "push:",
            "      - main",
            ".devflow/bark-all-status-live-test-activation.json",
            "github.event_name == 'push'",
            "github.ref_name == 'main'",
            "github.run_attempt == 1",
            "name: notification-runtime",
            "${{ secrets.BARK_PUSH_URL }}",
            "STATUSES=(COMPLETED INTERRUPTED HUMAN_REQUIRED SECURITY_BLOCKED)",
            "render_bark_message",
            "BARK_TITLE_MISSING_STATUS",
            "EXPECTED_REAL_BARK_REQUESTS=4",
            "ACTUAL_REAL_BARK_REQUESTS=",
            "--retry 0",
            "--output /dev/null",
            "BARK_ALL_STATUS_LIVE_TEST=DELIVERED",
            "gh issue comment 61",
            "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02",
        ),
        errors,
    )
    _forbid(
        path,
        text,
        (
            "repository_dispatch:",
            "workflow_run:",
            "agent-runtime",
            "secrets.AGENT_",
            "openai/codex-action@",
            "private_responses_forwarder.py",
            "relay_health.py",
            "--show-error",
        ),
        errors,
        message="one-time Bark live test contains a forbidden path",
    )
    if text.count("--request POST") != 1:
        errors.append(f"{path}: exactly one bounded POST loop is required")
    if text.count("actions/upload-artifact@") != 1:
        errors.append(f"{path}: exactly one safe result Artifact is required")

'''
          replace_once(
              WORKFLOW_VALIDATOR,
              '\n\ndef _validate_post_merge(path: Path, text: str, errors: list[str]) -> None:\n',
              workflow_validator
              + 'def _validate_post_merge(path: Path, text: str, errors: list[str]) -> None:\n',
          )
          replace_once(
              WORKFLOW_VALIDATOR,
              '        "devflow-incident.yml": _validate_incident,\n',
              '        "devflow-incident.yml": _validate_incident,\n'
              '        "devflow-bark-all-status-live-test.yml": (\n'
              '            _validate_bark_all_status_live_test\n'
              '        ),\n',
          )

          replace_once(
              WORKFLOW_TEST,
              'INCIDENT = ROOT / ".github/workflows/devflow-incident.yml"\n',
              'INCIDENT = ROOT / ".github/workflows/devflow-incident.yml"\n'
              'LIVE_TEST = (\n'
              '    ROOT / ".github/workflows/devflow-bark-all-status-live-test.yml"\n'
              ')\n',
          )
          live_test_case = '''


def test_owner_approved_all_status_live_test_is_bounded() -> None:
    text = LIVE_TEST.read_text(encoding="utf-8")
    assert ".devflow/bark-all-status-live-test-activation.json" in text
    assert "STATUSES=(COMPLETED INTERRUPTED HUMAN_REQUIRED SECURITY_BLOCKED)" in text
    assert "EXPECTED_REAL_BARK_REQUESTS=4" in text
    assert "ACTUAL_REAL_BARK_REQUESTS=" in text
    assert "BARK_ALL_STATUS_LIVE_TEST=DELIVERED" in text
    assert "gh issue comment 61" in text
    assert "github.run_attempt == 1" in text
    assert text.count("--request POST") == 1
    assert text.count("actions/upload-artifact@") == 1
    assert "--retry 0" in text
    assert "--output /dev/null" in text
    assert "BARK_TITLE_MISSING_STATUS" in text
    assert "response_body_stored" in text
    assert "secret_value_stored" in text

'''
          replace_once(
              WORKFLOW_TEST,
              '\n\ndef test_auto_recovery_binds_terminal_events_without_retrying_bark() -> None:\n',
              live_test_case
              + 'def test_auto_recovery_binds_terminal_events_without_retrying_bark() -> None:\n',
          )
          replace_once(
              WORKFLOW_TEST,
              '    assert summary["automatic_bark_retries"] == 0\n',
              '    assert summary["automatic_bark_retries"] == 0\n'
              '    assert summary["bark_live_test_post_locations"] == 1\n'
              '    assert summary["bark_live_test_artifact_uploads"] == 1\n'
              '    assert summary["one_time_live_test"]["workflow"].endswith(\n'
              '        "devflow-bark-all-status-live-test.yml"\n'
              '    )\n',
          )
          PY

          rm -f \
            .github/workflows/temporary-prepare-bark-all-status-live-test.yml \
            .github/workflows/temporary-run-bark-all-status-preparer.yml

          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_notification_channels.py
          python scripts/devflow/validate_workflows.py
          pytest -q \
            tests/test_devflow_bark_notification.py \
            tests/test_devflow_bark_workflow.py

      - name: Commit the non-Workflow policy and test files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .devflow/bark-all-status-live-test-activation.json \
            .devflow/notification-channels.yaml \
            scripts/devflow/notification_event.py \
            scripts/devflow/validate_notification_channels.py \
            scripts/devflow/validate_workflows.py \
            tests/test_devflow_bark_notification.py \
            tests/test_devflow_bark_workflow.py
          git commit -m "Prepare bounded Bark all-status live-test policy"
          git push origin HEAD:feature/devflow-bark-all-status-live-test-v1

      - name: Upload the validated live-test Workflow
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prepared-bark-all-status-workflow-${{ github.run_id }}
          path: .github/workflows/devflow-bark-all-status-live-test.yml
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
