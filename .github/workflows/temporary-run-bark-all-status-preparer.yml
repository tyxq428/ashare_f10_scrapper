name: Run Bark All-Status Test Preparer

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/temporary-run-bark-all-status-preparer.yml
      - scripts/devflow/prepare_bark_all_status_live_test_v2.py

permissions:
  contents: write

concurrency:
  group: run-bark-all-status-test-preparer-v3
  cancel-in-progress: false

jobs:
  prepare:
    if: >-
      github.run_attempt == 1 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/devflow-bark-all-status-live-test-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-bark-all-status-live-test-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare and validate the bounded live-test change set
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- \
            .devflow/notification-channels.yaml \
            scripts/devflow/validate_notification_channels.py \
            scripts/devflow/validate_workflows.py \
            tests/test_devflow_bark_workflow.py

          {
            python scripts/devflow/prepare_bark_all_status_live_test_v2.py

            rm -f \
              .github/workflows/temporary-prepare-bark-all-status-live-test.yml \
              .github/workflows/temporary-run-bark-all-status-preparer.yml \
              scripts/devflow/prepare_bark_all_status_live_test_v2.py

            python -m compileall -q scripts/devflow
            python scripts/devflow/validate_notification_channels.py
            python scripts/devflow/validate_workflows.py
            pytest -q \
              tests/test_devflow_bark_notification.py \
              tests/test_devflow_bark_workflow.py
          } 2>&1 | tee /tmp/bark-all-status-preparer.log

      - name: Commit only non-Workflow files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .devflow/bark-all-status-live-test-activation.json \
            .devflow/notification-channels.yaml \
            scripts/devflow/notification_event.py \
            scripts/devflow/validate_notification_channels.py \
            scripts/devflow/validate_workflows.py \
            tests/test_devflow_bark_notification.py \
            tests/test_devflow_bark_workflow.py
          git add -A scripts/devflow/prepare_bark_all_status_live_test_v2.py
          git commit -m "Prepare bounded Bark all-status live-test policy"
          git push origin HEAD:feature/devflow-bark-all-status-live-test-v1

      - name: Upload live-test Workflow and preparer diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prepared-bark-all-status-workflow-${{ github.run_id }}
          path: |
            .github/workflows/devflow-bark-all-status-live-test.yml
            /tmp/bark-all-status-preparer.log
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
