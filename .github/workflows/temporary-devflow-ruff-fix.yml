name: Temporary Devflow Ruff Fix

on:
  push:
    branches:
      - feature/devflow-auto-recovery-v1-final
    paths:
      - .github/workflows/temporary-devflow-ruff-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-auto-recovery-v1-final
          fetch-depth: 0
      - name: Install repository development tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply only deterministic Ruff fixes
        run: |
          ruff check --fix scripts/devflow tests/test_devflow.py
          ruff check scripts/devflow tests/test_devflow.py
      - name: Commit mechanical fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/devflow tests/test_devflow.py
          if git diff --cached --quiet; then
            echo "No Ruff changes were required."
            exit 0
          fi
          git commit -m "Apply deterministic Ruff fixes to devflow"
          git push origin HEAD:feature/devflow-auto-recovery-v1-final
