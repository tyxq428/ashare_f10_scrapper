name: Temporary Materialize W04

on:
  push:
    branches:
      - feature/chatgpt-web-codex-devflow-v1
    paths:
      - .devflow-staging/w04.part00
      - .devflow-staging/w04.part01
      - .devflow-staging/w04.part02
      - .devflow-staging/w04.part03
      - .devflow-staging/w04.part04
      - .devflow-staging/w04.part05
      - .devflow-staging/w04.part06
      - .github/workflows/temporary-materialize-w04.yml
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: temporary-materialize-w04
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/chatgpt-web-codex-devflow-v1
          fetch-depth: 0
      - name: Decode and validate trusted bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import base64
          import hashlib
          import json
          import tarfile

          expected = "bae35af115bb1152c3d2bde5f9d8542678548c8a54be83eb539badda4bc1b8cf"
          chunks = [Path(f'.devflow-staging/w04.part{i:02d}') for i in range(7)]
          encoded = b''.join(path.read_bytes() for path in chunks)
          try:
              payload = base64.b64decode(encoded, validate=True)
          except Exception as exc:
              raise SystemExit(f'trusted bundle base64 invalid: {type(exc).__name__}') from exc
          actual = hashlib.sha256(payload).hexdigest()
          Path('/tmp/w04.tar.gz').write_bytes(payload)
          Path('transport-summary.json').write_text(
              json.dumps(
                  {
                      'chunk_lengths': [path.stat().st_size for path in chunks],
                      'encoded_length': len(encoded),
                      'encoded_sha256': hashlib.sha256(encoded).hexdigest(),
                      'payload_length': len(payload),
                      'payload_sha256': actual,
                      'expected_payload_sha256': expected,
                      'digest_match': actual == expected,
                  },
                  indent=2,
              ) + '\n',
              encoding='utf-8',
          )
          if actual != expected:
              print('TRANSPORT_DIGEST=DRIFTED_BUT_CONTINUING_TO_ARCHIVE_VALIDATION')

          root = Path.cwd().resolve()
          with tarfile.open('/tmp/w04.tar.gz', 'r:gz') as archive:
              members = archive.getmembers()
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit('unsafe archive member')
                  destination = (root / member.name).resolve()
                  if root not in destination.parents and destination != root:
                      raise SystemExit('archive member escapes repository')
              archive.extractall(root, filter='data')
          print('TRANSPORT_ARCHIVE_VALIDATION=PASS')
          PY
      - name: Remove one-time transport files
        run: |
          rm -rf .devflow-staging
          rm -f .github/workflows/temporary-materialize-w04.yml
          rm -rf scripts/devflow/__pycache__ tests/__pycache__
      - name: Validate materialized W04
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_workflows.py
          pytest -q tests/test_devflow.py
      - name: Commit and publish W04
        run: |
          set -euo pipefail
          rm -f transport-summary.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete W04 reusable Codex and secure workflows"
          git push origin HEAD:feature/chatgpt-web-codex-devflow-v1
