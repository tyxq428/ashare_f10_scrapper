name: Temporary Shenzhen CNINFO Adapter

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/sz-cninfo-adapter-trigger.txt"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  implement-test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sz-cninfo-official-source
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Materialize second-stage CNINFO reconciliation hardening
        run: |
          set -euo pipefail
          python scripts/apply_sz_cninfo_parser_fix_v2.py
          rm scripts/apply_sz_cninfo_parser_fix_v2.py
      - name: Format, lint and unit tests
        run: |
          set -o pipefail
          {
            ruff format \
              src/ashare_f10/validation/sources/cninfo.py \
              src/ashare_f10/validation/documents/pdf_parser.py \
              src/ashare_f10/cross_validation/comparator.py \
              src/ashare_f10/cross_validation/runner.py \
              tests/test_cninfo_source.py \
              tests/test_cninfo_pdf_variants.py \
              tests/test_cninfo_reconciliation_semantics.py
            ruff check --fix --unsafe-fixes \
              src/ashare_f10/validation/sources/cninfo.py \
              src/ashare_f10/validation/documents/pdf_parser.py \
              src/ashare_f10/cross_validation/comparator.py \
              src/ashare_f10/cross_validation/runner.py \
              tests/test_cninfo_source.py \
              tests/test_cninfo_pdf_variants.py \
              tests/test_cninfo_reconciliation_semantics.py
            ruff check src tests scripts/verify_full_cross_validation.py
            python -m compileall -q src
            node --check src/ashare_f10/web/app.js
            node --check src/ashare_f10/web/cross-validation.js
            pytest --cov=ashare_f10 --cov-report=term-missing
          } 2>&1 | tee sz-cninfo-parser-tests.log
      - name: Commit parser implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows
          if git diff --cached --quiet; then
            echo "CNINFO reconciliation hardening is already materialized."
          else
            git commit -m "Complete CNINFO financial reconciliation semantics"
            git push origin HEAD:fix/sz-cninfo-official-source
          fi
      - name: Real 002352 dual-source E2E
        run: |
          set -euo pipefail
          ashare-f10 run-and-validate 002352 --output sz-cninfo-run --workers 8 --max-periods 2 2>&1 | tee sz-cninfo-e2e.log
          python scripts/verify_full_cross_validation.py sz-cninfo-run
      - name: Verify Shenzhen official coverage and artifacts
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          import duckdb
          import pandas as pd

          root = Path("sz-cninfo-run")
          cross = root / "cross_validation"
          summary = json.loads((cross / "cross_validation_summary.json").read_text(encoding="utf-8"))
          status = summary.get("official_source_status") or {}
          extraction = status.get("extraction_by_document") or {}
          assert status.get("source") == "CNINFO", status
          assert int(status.get("document_count") or 0) >= 2, status
          assert int(summary.get("official_fact_count") or 0) >= 30, summary
          assert any("年度报告" in title and count > 0 for title, count in extraction.items()), extraction
          assert any("季度报告" in title and count > 0 for title, count in extraction.items()), extraction
          assert int(summary.get("matched_count") or 0) > 0, summary
          assert int(summary.get("true_conflict_count") or 0) == 0, summary
          assert summary.get("classification_coverage") == 1, summary
          assert summary.get("acceptance_status") in {"PASS", "PASS_WITH_COVERAGE_GAPS"}, summary
          assert (summary.get("logic_check_counts") or {}).get("FAIL", 0) == 0, summary
          assert (summary.get("ttm_check_counts") or {}).get("FAIL", 0) == 0, summary

          artifacts = summary["artifacts"]
          required = [
              "eastmoney_json", "eastmoney_excel", "eastmoney_parquet", "eastmoney_duckdb",
              "official_json", "official_excel", "official_parquet", "official_duckdb",
              "comparison_json", "comparison_excel", "comparison_parquet", "comparison_duckdb",
              "evidence_zip",
          ]
          for key in required:
              path = Path(artifacts[key])
              assert path.exists() and path.stat().st_size > 0, (key, path)

          official = pd.read_parquet(artifacts["official_parquet"])
          comparison = pd.read_parquet(artifacts["comparison_parquet"])
          assert len(official) == summary["official_fact_count"]
          assert len(comparison) == summary["comparison_count"]
          assert comparison["status"].isin(
              ["EXACT_MATCH", "WITHIN_ROUNDING", "DERIVED_MATCH", "TEXT_MATCH_NORMALIZED"]
          ).any()

          connection = duckdb.connect(artifacts["comparison_duckdb"], read_only=True)
          try:
              assert connection.execute("SELECT count(*) FROM reconciliation").fetchone()[0] == len(comparison)
          finally:
              connection.close()

          for key in ("eastmoney_excel", "official_excel", "comparison_excel"):
              with zipfile.ZipFile(artifacts[key]) as archive:
                  assert archive.testzip() is None
          with zipfile.ZipFile(artifacts["evidence_zip"]) as archive:
              names = archive.namelist()
              assert sum(name.lower().endswith(".pdf") for name in names) >= 2
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sz-cninfo-official-validation-002352-${{ github.run_id }}
          path: |
            sz-cninfo-run/
            sz-cninfo-e2e.log
            sz-cninfo-parser-tests.log
          if-no-files-found: warn
          retention-days: 30
