name: Fetch A-share F10

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: Six-digit A-share stock code
        required: true
        default: "688521"
      workers:
        description: Concurrent endpoint groups
        required: false
        default: "8"
      force:
        description: Ignore successful checkpoints
        type: boolean
        required: false
        default: false
      include_raw_pack:
        description: Generate traceable official Raw Pack
        type: boolean
        required: false
        default: false
      raw_pack_packs:
        description: Raw Pack selection: default, all, or comma-separated pack IDs
        required: false
        default: "default"
      raw_pack_max_docs:
        description: Maximum Raw Pack documents/status records
        required: false
        default: "200"

permissions:
  contents: read

env:
  ASHARE_F10_DATA_DIR: ${{ github.workspace }}/data

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Fetch all fixed F10 endpoints and optional Raw Pack
        shell: bash
        run: |
          ARGS=(
            "${{ inputs.stock_code }}"
            --output "data/${{ inputs.stock_code }}/${{ github.run_id }}"
            --workers "${{ inputs.workers }}"
          )
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          if [ "${{ inputs.include_raw_pack }}" = "true" ]; then
            ARGS+=(
              --include-raw-pack
              --raw-pack-packs "${{ inputs.raw_pack_packs }}"
              --raw-pack-max-docs "${{ inputs.raw_pack_max_docs }}"
            )
          fi
          ashare-f10 fetch "${ARGS[@]}"
      - name: Validate complete output
        run: ashare-f10 validate "data/${{ inputs.stock_code }}/${{ github.run_id }}"
      - name: Upload JSON Excel Parquet DuckDB raw cache and optional Raw Pack
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ashare-f10-${{ inputs.stock_code }}-${{ github.run_id }}
          path: data/${{ inputs.stock_code }}/${{ github.run_id }}/
          if-no-files-found: error
          retention-days: 30
