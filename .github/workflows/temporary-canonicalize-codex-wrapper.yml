name: Temporary Canonicalize Codex Wrapper

on:
  push:
    branches:
      - feature/chatgpt-web-codex-devflow-v1-clean
    paths:
      - .github/workflows/temporary-canonicalize-codex-wrapper.yml

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  canonicalize:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/chatgpt-web-codex-devflow-v1-clean
          fetch-depth: 0
      - name: Replace the capped wrapper with the permission-correct wrapper
        run: |
          set -euo pipefail
          test -s .github/workflows/codex-task-secure.yml
          cp .github/workflows/codex-task-secure.yml .github/workflows/codex-task.yml
          rm -f .github/workflows/codex-task-secure.yml
          rm -f .github/workflows/temporary-canonicalize-codex-wrapper.yml
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/validate_workflows.py
          ruff check scripts/devflow tests/test_devflow.py
          pytest -q tests/test_devflow.py
      - name: Publish canonical wrapper
        run: |
          rm -rf scripts/devflow/__pycache__ tests/__pycache__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use one permission-correct canonical Codex task wrapper"
          git push origin HEAD:feature/chatgpt-web-codex-devflow-v1-clean
