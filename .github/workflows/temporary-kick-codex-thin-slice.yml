name: Temporary Redispatch Existing V3 Product Candidate

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-kick-codex-thin-slice.yml

permissions:
  contents: write

concurrency:
  group: temporary-redispatch-v3-product-candidate
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch the existing validated v3 candidate once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "event_type": "devflow_product_gate",
              "client_payload": {
                  "task_id": "resilient-command-terminal-status-auto-v3",
                  "task_branch": "task/codex-resilient-command-terminal-status-auto-v3",
                  "publish_branch": "codex/resilient-command-terminal-status-auto-v3",
              },
          }
          Path("/tmp/devflow-product-gate.json").write_text(json.dumps(payload), encoding="utf-8")
          PY
          gh api --method POST "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-product-gate.json
          echo "REDISPATCHED_PRODUCT_GATE=resilient-command-terminal-status-auto-v3" \
            >> "$GITHUB_STEP_SUMMARY"
