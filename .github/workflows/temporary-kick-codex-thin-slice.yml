name: Temporary Kick Codex Thin Slice

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-kick-codex-thin-slice.yml

permissions:
  actions: write
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  direct-environment-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: agent-runtime
      deployment: false
    permissions:
      contents: read
    steps:
      - name: Verify exact Environment Secret presence without exposing values
        shell: bash
        env:
          ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          API_KEY: ${{ secrets.AGENT_API_KEY }}
          MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set +x
          python - <<'PY'
          import os
          values = {
              "endpoint_present": bool(os.environ.get("ENDPOINT")),
              "api_key_present": bool(os.environ.get("API_KEY")),
              "model_present": bool(os.environ.get("MODEL")),
          }
          print("AGENT_RUNTIME_PRESENCE=" + ",".join(f"{k}:{str(v).lower()}" for k, v in values.items()))
          if not all(values.values()):
              raise SystemExit("AGENT_RUNTIME_ENVIRONMENT_SECRETS_UNAVAILABLE")
          PY

  dispatch-and-report:
    needs: direct-environment-probe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Dispatch a fresh trusted Codex run only when no active run exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TASK_BRANCH: task/codex-resilient-command-terminal-status-auto-v1
        run: |
          set -euo pipefail
          ACTIVE="$(gh api --paginate \
            "repos/${{ github.repository }}/actions/workflows/codex-task.yml/runs?branch=${TASK_BRANCH}&per_page=100" \
            --jq '[.workflow_runs[] | select(.status == "queued" or .status == "in_progress")] | length')"
          if [[ "$ACTIVE" == "0" ]]; then
            gh api --method POST \
              "repos/${{ github.repository }}/actions/workflows/codex-task.yml/dispatches" \
              -f ref=main \
              -f "inputs[task_branch]=${TASK_BRANCH}"
            echo "CODEX_TASK_DISPATCHED=${TASK_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "CODEX_TASK_ALREADY_ACTIVE=${ACTIVE}" >> "$GITHUB_STEP_SUMMARY"
          fi
          sleep 8
          gh api \
            "repos/${{ github.repository }}/actions/workflows/codex-task.yml/runs?branch=${TASK_BRANCH}&per_page=10" \
            --jq '{task_branch: "'"${TASK_BRANCH}"'", observed_at_utc: now | todate, workflow_runs: [.workflow_runs[] | {id, status, conclusion, run_attempt, head_sha, event, created_at, updated_at, html_url}]}' \
            > /tmp/codex-run-status.json
      - name: Publish only non-secret runtime metadata to an isolated branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan runtime-devflow-status
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p runtime
          cp /tmp/codex-run-status.json runtime/codex-run-status.json
          git add runtime/codex-run-status.json
          git commit -m "Publish safe Codex runtime status"
          git push --force origin HEAD:refs/heads/runtime/devflow-status
