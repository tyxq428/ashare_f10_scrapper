name: Temporary Kick Codex Thin Slice

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-kick-codex-thin-slice.yml

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Dispatch the trusted task generation once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TASK_BRANCH: task/codex-resilient-command-terminal-status-auto-v3
        run: |
          set -euo pipefail
          ACTIVE="$(gh api --paginate \
            "repos/${{ github.repository }}/actions/workflows/codex-task.yml/runs?per_page=100" \
            --jq '[.workflow_runs[] | select((.status == "queued" or .status == "in_progress") and .display_title == "Codex Task")] | length')"
          if [[ "$ACTIVE" != "0" ]]; then
            echo "CODEX_TASK_ALREADY_ACTIVE=${ACTIVE}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          gh api --method POST \
            "repos/${{ github.repository }}/actions/workflows/codex-task.yml/dispatches" \
            -f ref=main \
            -f "inputs[task_branch]=${TASK_BRANCH}"
          echo "CODEX_TASK_DISPATCHED=${TASK_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          sleep 8
          gh api \
            "repos/${{ github.repository }}/actions/workflows/codex-task.yml/runs?per_page=20" \
            --jq '{task_branch: "'"${TASK_BRANCH}"'", observed_at_utc: now | todate, workflow_runs: [.workflow_runs[] | {id, status, conclusion, run_attempt, head_branch, head_sha, event, display_title, created_at, updated_at, html_url}]}' \
            > /tmp/codex-run-status.json
      - name: Publish only non-secret runtime metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan runtime-devflow-status
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p runtime
          cp /tmp/codex-run-status.json runtime/codex-run-status.json
          git add runtime/codex-run-status.json
          git commit -m "Publish safe Codex runtime status"
          git push --force origin HEAD:refs/heads/runtime/devflow-status
