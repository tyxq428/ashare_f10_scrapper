# Retriggered after the final parallel-artifact race review.
name: Temporary Visual Artifact Manifest Patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-visual-artifact-manifest-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Patch final artifact manifest merge and regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/ashare_f10/api/visual_jobs_v2.py")
          source = source_path.read_text(encoding="utf-8")
          marker = "    def _run_optional_stages(self, state: JobState, job_settings: Settings) -> int:\n"
          method = '''    def _merge_artifact_manifest(self, state: JobState) -> None:
              """Atomically reconcile core, Raw Pack and official-validation artifacts."""

              path = Path(state.output_dir) / "artifacts.json"
              with self._visual_lock:
                  payload: dict[str, Any] = {}
                  if path.exists():
                      try:
                          existing = json.loads(path.read_text(encoding="utf-8"))
                          if isinstance(existing, dict):
                              payload.update(existing)
                      except Exception:  # noqa: BLE001
                          pass
                  payload.update(
                      {
                          key: value
                          for key, value in (state.artifacts or {}).items()
                          if isinstance(value, str) and value
                      }
                  )
                  path.parent.mkdir(parents=True, exist_ok=True)
                  temporary = path.with_suffix(".json.tmp")
                  temporary.write_text(
                      json.dumps(payload, ensure_ascii=False, indent=2),
                      encoding="utf-8",
                  )
                  temporary.replace(path)

'''
          if "def _merge_artifact_manifest" not in source:
              if marker not in source:
                  raise SystemExit("optional-stage marker not found")
              source = source.replace(marker, method + marker)
          old_return = "        return warnings\n\n\n__all__ = ["
          new_return = "        self._merge_artifact_manifest(state)\n        return warnings\n\n\n__all__ = ["
          if old_return not in source:
              raise SystemExit("optional-stage return marker not found")
          source_path.write_text(source.replace(old_return, new_return), encoding="utf-8")

          test_path = Path("tests/test_visual_execution.py")
          tests = test_path.read_text(encoding="utf-8")
          addition = '''

          def test_optional_stage_artifacts_are_atomically_reconciled(tmp_path: Path) -> None:
              manager = VisualJobManager(Settings(data_dir=tmp_path / "data"))
              output_dir = tmp_path / "data" / "688521" / "combined-job"
              output_dir.mkdir(parents=True)
              (output_dir / "artifacts.json").write_text(
                  json.dumps({"json": "f10.json", "comparison_json": "comparison.json"}),
                  encoding="utf-8",
              )
              state = JobState(
                  job_id="combined-job",
                  stock_code="688521",
                  status="COMPLETED",
                  created_at_utc="2026-07-22T00:00:00Z",
                  updated_at_utc="2026-07-22T00:01:00Z",
                  output_dir=str(output_dir),
                  artifacts={
                      "json": "f10.json",
                      "raw_pack_excel": "raw-pack.xlsx",
                      "official_summary_json": "cross-validation-summary.json",
                  },
              )
              manager._merge_artifact_manifest(state)
              payload = json.loads((output_dir / "artifacts.json").read_text(encoding="utf-8"))
              assert payload["json"] == "f10.json"
              assert payload["comparison_json"] == "comparison.json"
              assert payload["raw_pack_excel"] == "raw-pack.xlsx"
              assert payload["official_summary_json"] == "cross-validation-summary.json"
          '''
          addition = "\n".join(line[10:] if line.startswith("          ") else line for line in addition.splitlines())
          if "def test_optional_stage_artifacts_are_atomically_reconciled" not in tests:
              test_path.write_text(tests.rstrip() + "\n" + addition.lstrip(), encoding="utf-8")
          PY
          ruff check --fix src/ashare_f10/api/visual_jobs_v2.py tests/test_visual_execution.py
          pytest -q tests/test_visual_execution.py
          git diff --check
      - name: Commit patch to feature branch
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/api/visual_jobs_v2.py tests/test_visual_execution.py
          git commit -m "Reconcile parallel optional-stage artifacts"
          git push origin HEAD:${{ github.head_ref }}
