name: Devflow Incident

on:
  repository_dispatch:
    types:
      - devflow_notify

permissions:
  issues: write
  contents: read

# Every valuable notification for this task uses one serialized queue and one
# canonical Issue. Automatic retries and repairs never enter this workflow.
concurrency:
  group: devflow-task-control-chatgpt-web-codex-devflow-v1
  cancel-in-progress: false

jobs:
  valuable-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          persist-credentials: false

      - name: Create or update the canonical task control issue
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          set -euo pipefail
          printf '%s' "$PAYLOAD_JSON" > /tmp/devflow-notification.json
          python - <<'PY'
          import json
          from pathlib import Path

          allowed = {'COMPLETED', 'HUMAN_REQUIRED', 'SECURITY_BLOCKED', 'INTERRUPTED'}
          value = json.loads(Path('/tmp/devflow-notification.json').read_text())
          kind = value.get('notification_type')
          if kind not in allowed:
              raise SystemExit(f'notification type is not valuable: {kind!r}')
          required = ('reason_code', 'reason', 'minimum_action', 'fingerprint', 'source_workflow', 'source_run_id')
          for key in required:
              if value.get(key) in (None, ''):
                  raise SystemExit(f'missing notification field: {key}')
          PY

          TASK_ID="chatgpt-web-codex-devflow-v1"
          CONTROL_TITLE="[TASK CONTROL] ${TASK_ID}"
          STATE_PATH="docs/implementation/${TASK_ID}/task_state.yaml"
          ISSUE_NUMBER="$(python - "$STATE_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path
          data = json.loads(Path(sys.argv[1]).read_text())
          value = data.get('notification', {}).get('control_issue_number')
          if isinstance(value, int) and not isinstance(value, bool) and value > 0:
              print(value)
          PY
          )"
          [[ -n "$ISSUE_NUMBER" ]]

          ISSUE_DATA="$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --json number,title,state)"
          [[ "$(jq -r '.title' <<<"$ISSUE_DATA")" == "$CONTROL_TITLE" ]]

          TYPE="$(jq -r '.notification_type' /tmp/devflow-notification.json)"
          REASON_CODE="$(jq -r '.reason_code' /tmp/devflow-notification.json)"
          REASON="$(jq -r '.reason' /tmp/devflow-notification.json)"
          MINIMUM_ACTION="$(jq -r '.minimum_action' /tmp/devflow-notification.json)"
          FINGERPRINT="$(jq -r '.fingerprint' /tmp/devflow-notification.json)"
          SOURCE_WORKFLOW="$(jq -r '.source_workflow' /tmp/devflow-notification.json)"
          SOURCE_RUN="$(jq -r '.source_run_id' /tmp/devflow-notification.json)"
          SOURCE_URL="https://github.com/${{ github.repository }}/actions/runs/${SOURCE_RUN}"
          FAILURE_STEPS="$(jq -r '(.failure_steps // []) | if length == 0 then "none" else join(", ") end' /tmp/devflow-notification.json)"

          MARKER="devflow-root:${FINGERPRINT}:${TYPE}"
          if gh api --paginate "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments?per_page=100" \
            --jq '.[].body' | grep -Fq "$MARKER"; then
            echo "VALUABLE_NOTIFICATION=ALREADY_RECORDED"
            exit 0
          fi

          if [[ "$(jq -r '.state' <<<"$ISSUE_DATA")" == "CLOSED" && "$TYPE" != "COMPLETED" ]]; then
            gh issue reopen "$ISSUE_NUMBER" --repo "${{ github.repository }}"
          fi

          COMMENT=$(cat <<EOF
          @tyxq428

          [TASK][${TYPE}]

          - Task: \`${TASK_ID}\`
          - Workflow: \`${SOURCE_WORKFLOW}\`
          - Run: ${SOURCE_URL}
          - Classification: \`${REASON_CODE}\`
          - Failed steps: ${FAILURE_STEPS}
          - Reason: ${REASON}
          - Minimum action: ${MINIMUM_ACTION}
          - Recovery record: \`docs/implementation/${TASK_ID}/HANDOFF.md\`

          \`/ack\` only confirms that you saw this message. It does **not** trigger repair or resume execution. Automatic retry and repair were already attempted before this notification. <!-- ${MARKER} -->
          EOF
          )
          gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" --body "$COMMENT"

          if [[ "$TYPE" == "COMPLETED" ]]; then
            gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}" --reason completed
          fi
