name: Prepare Bark All-Status Live Test

on:
  push:
    branches:
      - feature/devflow-bark-all-status-live-test-v1
    paths:
      - .github/workflows/temporary-prepare-bark-all-status-live-test.yml

permissions:
  contents: write

concurrency:
  group: prepare-bark-all-status-live-test-v1
  cancel-in-progress: false

jobs:
  prepare:
    if: github.run_attempt == 1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-bark-all-status-live-test-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Apply the deterministic one-time live-test patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          ROOT = Path('.')
          EXECUTOR = Path('.github/workflows/temporary-prepare-bark-all-status-live-test.yml')
          ACTIVATION = Path('.devflow/bark-all-status-live-test-activation.json')
          INCIDENT = Path('.github/workflows/devflow-incident.yml')
          MANIFEST = Path('.devflow/notification-channels.yaml')
          NOTIFICATION_EVENT = Path('scripts/devflow/notification_event.py')
          CHANNEL_VALIDATOR = Path('scripts/devflow/validate_notification_channels.py')
          WORKFLOW_VALIDATOR = Path('scripts/devflow/validate_workflows.py')
          NOTIFICATION_TEST = Path('tests/test_devflow_bark_notification.py')
          WORKFLOW_TEST = Path('tests/test_devflow_bark_workflow.py')

          STATUSES = [
              'COMPLETED',
              'INTERRUPTED',
              'HUMAN_REQUIRED',
              'SECURITY_BLOCKED',
          ]
          ACTIVATION_ID = 'bark-all-status-live-test-v1-20260724'
          ISSUE_NUMBER = 61

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f'EXPECTED_ONE_REPLACEMENT path={path} count={count} old={old!r}'
                  )
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          activation = {
              'schema_version': 1,
              'activation_id': ACTIVATION_ID,
              'approved_by': 'tyxq428',
              'issue_number': ISSUE_NUMBER,
              'active': True,
              'statuses': STATUSES,
              'expected_requests': 4,
              'automatic_retry': False,
          }
          ACTIVATION.write_text(
              json.dumps(activation, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          replace_once(
              NOTIFICATION_EVENT,
              '    title = _truncate(f"{icon} {repo_name} · {title_suffix}", 120)\n',
              '    title = _truncate(f"{icon} [{kind}] {repo_name} · {title_suffix}", 120)\n',
          )

          replace_once(
              NOTIFICATION_TEST,
              '    assert bark["url"].endswith("/pull/99")\n'
              '    assert "sample-task" in bark["body"]\n\n\n'
              'def test_target_url_must_stay_inside_repository(tmp_path: Path) -> None:\n',
              '    assert bark["url"].endswith("/pull/99")\n'
              '    assert "sample-task" in bark["body"]\n'
              '    assert "[COMPLETED]" in bark["title"]\n\n\n'
              '@pytest.mark.parametrize(\n'
              '    "status",\n'
              '    ["COMPLETED", "INTERRUPTED", "HUMAN_REQUIRED", "SECURITY_BLOCKED"],\n'
              ')\n'
              'def test_every_bark_title_contains_the_literal_status(status: str) -> None:\n'
              '    validated = {\n'
              '        "task_id": "status-title-test",\n'
              '        "notification_type": status,\n'
              '        "reason_code": f"SIMULATED_{status}",\n'
              '        "reason": "Synthetic rendering test.",\n'
              '        "minimum_action": "No action is required.",\n'
              '        "source_workflow": "Unit Test",\n'
              '        "source_run_id": 1,\n'
              '        "target_url": "https://github.com/tyxq428/ashare_f10_scrapper/actions/runs/1",\n'
              '    }\n'
              '    bark = render_bark_message(validated, repository=REPOSITORY)\n'
              '    assert f"[{status}]" in bark["title"]\n\n\n'
              'def test_target_url_must_stay_inside_repository(tmp_path: Path) -> None:\n',
          )

          manifest = json.loads(MANIFEST.read_text(encoding='utf-8'))
          if 'one_time_live_test' in manifest:
              raise SystemExit('ONE_TIME_LIVE_TEST_ALREADY_EXISTS')
          manifest['one_time_live_test'] = {
              'activation_id': ACTIVATION_ID,
              'workflow': INCIDENT.as_posix(),
              'activation_file': ACTIVATION.as_posix(),
              'issue_number': ISSUE_NUMBER,
              'statuses': STATUSES,
              'expected_requests': 4,
              'run_attempt_must_equal': 1,
              'automatic_retry': False,
              'response_body_stored': False,
              'response_headers_stored': False,
              'endpoint_stored': False,
              'raw_error_stored': False,
              'secret_value_stored': False,
          }
          MANIFEST.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          replace_once(
              INCIDENT,
              'on:\n'
              '  repository_dispatch:\n'
              '    types:\n'
              '      - devflow_notify\n',
              'on:\n'
              '  repository_dispatch:\n'
              '    types:\n'
              '      - devflow_notify\n'
              '  push:\n'
              '    branches:\n'
              '      - main\n'
              '    paths:\n'
              '      - .devflow/bark-all-status-live-test-activation.json\n',
          )
          replace_once(
              INCIDENT,
              '  valuable-notification:\n'
              '    runs-on: ubuntu-latest\n',
              '  valuable-notification:\n'
              "    if: github.event_name == 'repository_dispatch'\n"
              '    runs-on: ubuntu-latest\n',
          )
          replace_once(
              INCIDENT,
              '    if: >-\n'
              "      needs.valuable-notification.outputs.should_push == 'true' &&\n"
              '      github.run_attempt == 1\n',
              '    if: >-\n'
              "      github.event_name == 'repository_dispatch' &&\n"
              "      needs.valuable-notification.outputs.should_push == 'true' &&\n"
              '      github.run_attempt == 1\n',
          )

          live_job = r'''

  bark-all-status-live-test:
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      github.run_attempt == 1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    environment:
      name: notification-runtime
      deployment: false
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Validate the owner-approved activation and build four messages
        shell: bash
        env:
          REPOSITORY_VALUE: ${{ github.repository }}
          RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path('scripts/devflow').resolve()))
          from notification_event import render_bark_message

          statuses = [
              'COMPLETED',
              'INTERRUPTED',
              'HUMAN_REQUIRED',
              'SECURITY_BLOCKED',
          ]
          activation_path = Path(
              '.devflow/bark-all-status-live-test-activation.json'
          )
          activation = json.loads(activation_path.read_text(encoding='utf-8'))
          expected = {
              'schema_version': 1,
              'activation_id': 'bark-all-status-live-test-v1-20260724',
              'approved_by': 'tyxq428',
              'issue_number': 61,
              'active': True,
              'statuses': statuses,
              'expected_requests': 4,
              'automatic_retry': False,
          }
          if activation != expected:
              raise SystemExit('BARK_ALL_STATUS_ACTIVATION_MISMATCH')

          repository = os.environ['REPOSITORY_VALUE']
          run_id = int(os.environ['RUN_ID_VALUE'])
          target_url = f'https://github.com/{repository}/actions/runs/{run_id}'
          output_dir = Path('/tmp/bark-all-status-live-test/messages')
          output_dir.mkdir(parents=True, exist_ok=True)
          for status in statuses:
              validated = {
                  'task_id': 'bark-all-status-live-test-v1',
                  'notification_type': status,
                  'reason_code': f'SIMULATED_{status}',
                  'reason': (
                      'Owner-authorized real Bark transport simulation for '
                      f'terminal status {status}.'
                  ),
                  'minimum_action': 'No action is required; this is a live test.',
                  'source_workflow': 'Devflow Incident All-Status Live Test',
                  'source_run_id': run_id,
                  'target_url': target_url,
              }
              message = render_bark_message(
                  validated,
                  repository=repository,
                  group='ashare-f10-devflow-live-test',
              )
              if f'[{status}]' not in message['title']:
                  raise SystemExit(f'BARK_TITLE_MISSING_STATUS:{status}')
              (output_dir / f'{status}.json').write_text(
                  json.dumps(message, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )
          print('BARK_ALL_STATUS_MESSAGES=4')
          PY

      - name: Send exactly one real Bark request for each supported status
        id: live_test
        shell: bash
        env:
          BARK_PUSH_URL: ${{ secrets.BARK_PUSH_URL }}
        run: |
          set -uo pipefail
          set +x
          RESULTS_DIR=/tmp/bark-all-status-live-test
          RESULTS_JSONL="${RESULTS_DIR}/results.jsonl"
          RESULT_JSON="${RESULTS_DIR}/result.json"
          mkdir -p "$RESULTS_DIR"
          : > "$RESULTS_JSONL"
          STATUSES=(COMPLETED INTERRUPTED HUMAN_REQUIRED SECURITY_BLOCKED)

          if [[ -n "${BARK_PUSH_URL:-}" ]]; then
            echo "::add-mask::${BARK_PUSH_URL}"
            for STATUS in "${STATUSES[@]}"; do
              MESSAGE="${RESULTS_DIR}/messages/${STATUS}.json"
              TITLE="$(jq -r '.title' "$MESSAGE")"
              HTTP_STATUS_RAW="$(curl \
                --silent \
                --fail \
                --retry 0 \
                --proto '=https' \
                --tlsv1.2 \
                --connect-timeout 10 \
                --max-time 20 \
                --request POST \
                --header 'Content-Type: application/json; charset=utf-8' \
                --data-binary "@${MESSAGE}" \
                --output /dev/null \
                --write-out '%{http_code}' \
                "$BARK_PUSH_URL")"
              CURL_RC=$?
              python - "$STATUS" "$TITLE" "$CURL_RC" "$HTTP_STATUS_RAW" \
                "$RESULTS_JSONL" <<'PY'
          import json
          import sys
          from pathlib import Path

          status, title, curl_raw, http_raw, output = sys.argv[1:]
          curl_exit = int(curl_raw)
          http_status = int(http_raw) if http_raw.isdigit() else None
          delivered = (
              curl_exit == 0
              and http_status is not None
              and 200 <= http_status <= 299
          )
          value = {
              'status': status,
              'title': title,
              'delivery_status': 'DELIVERED' if delivered else 'FAILED',
              'request_initiated': True,
              'request_attempts': 1,
              'curl_exit_code': curl_exit,
              'http_status': http_status,
              'automatic_retry': False,
              'response_body_stored': False,
              'response_headers_stored': False,
              'endpoint_stored': False,
              'raw_error_stored': False,
              'secret_value_stored': False,
          }
          with Path(output).open('a', encoding='utf-8') as handle:
              handle.write(json.dumps(value, ensure_ascii=False) + '\n')
          PY
            done
          else
            for STATUS in "${STATUSES[@]}"; do
              TITLE="$(jq -r '.title' \
                "${RESULTS_DIR}/messages/${STATUS}.json")"
              python - "$STATUS" "$TITLE" "$RESULTS_JSONL" <<'PY'
          import json
          import sys
          from pathlib import Path

          status, title, output = sys.argv[1:]
          value = {
              'status': status,
              'title': title,
              'delivery_status': 'SKIPPED_MISSING_CONFIGURATION',
              'request_initiated': False,
              'request_attempts': 0,
              'curl_exit_code': None,
              'http_status': None,
              'automatic_retry': False,
              'response_body_stored': False,
              'response_headers_stored': False,
              'endpoint_stored': False,
              'raw_error_stored': False,
              'secret_value_stored': False,
          }
          with Path(output).open('a', encoding='utf-8') as handle:
              handle.write(json.dumps(value, ensure_ascii=False) + '\n')
          PY
            done
          fi

          python - "$RESULTS_JSONL" "$RESULT_JSON" <<'PY'
          import json
          import sys
          from pathlib import Path

          source, output = map(Path, sys.argv[1:])
          results = [
              json.loads(line)
              for line in source.read_text(encoding='utf-8').splitlines()
              if line.strip()
          ]
          expected = [
              'COMPLETED',
              'INTERRUPTED',
              'HUMAN_REQUIRED',
              'SECURITY_BLOCKED',
          ]
          value = {
              'schema_version': 1,
              'activation_id': 'bark-all-status-live-test-v1-20260724',
              'issue_number': 61,
              'expected_statuses': expected,
              'expected_requests': 4,
              'actual_requests': sum(
                  item['request_attempts'] for item in results
              ),
              'all_delivered': (
                  len(results) == 4
                  and [item['status'] for item in results] == expected
                  and all(item['delivery_status'] == 'DELIVERED' for item in results)
              ),
              'results': results,
          }
          output.write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

          jq -r '.results[] | "BARK_STATUS_TEST=\(.status) title=\(.title) delivery=\(.delivery_status) http=\(.http_status // "null")"' \
            "$RESULT_JSON" >> "$GITHUB_STEP_SUMMARY"
          echo "EXPECTED_REAL_BARK_REQUESTS=4" >> "$GITHUB_STEP_SUMMARY"
          echo "ACTUAL_REAL_BARK_REQUESTS=$(jq -r '.actual_requests' "$RESULT_JSON")" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "BARK_AUTOMATIC_RETRIES=0" >> "$GITHUB_STEP_SUMMARY"
          echo "BARK_RESPONSE_BODY_STORED=0" >> "$GITHUB_STEP_SUMMARY"
          echo "BARK_RESPONSE_HEADERS_STORED=0" >> "$GITHUB_STEP_SUMMARY"
          echo "BARK_ENDPOINT_STORED=0" >> "$GITHUB_STEP_SUMMARY"
          echo "BARK_SECRET_VALUE_STORED=0" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload the all-status safe result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bark-all-status-live-test-${{ github.run_id }}
          path: /tmp/bark-all-status-live-test/result.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Record the safe all-status result in Issue 61
        if: always() && hashFiles('/tmp/bark-all-status-live-test/result.json') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          value = json.loads(
              Path('/tmp/bark-all-status-live-test/result.json').read_text(
                  encoding='utf-8'
              )
          )
          lines = [
              '[BARK][ALL_STATUS_LIVE_TEST]',
              '',
              f"- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              f"- Expected requests: `{value['expected_requests']}`",
              f"- Actual requests: `{value['actual_requests']}`",
              f"- All delivered: `{str(value['all_delivered']).lower()}`",
              '',
              '| Status | Title | Delivery | curl | HTTP |',
              '|---|---|---|---:|---:|',
          ]
          for item in value['results']:
              lines.append(
                  f"| `{item['status']}` | {item['title']} | "
                  f"`{item['delivery_status']}` | "
                  f"`{item['curl_exit_code']}` | `{item['http_status']}` |"
              )
          lines.extend(
              (
                  '',
                  '- Automatic retries: `0`',
                  '- Response body/headers stored: `false`',
                  '- Endpoint/raw error/Secret stored: `false`',
              )
          )
          Path('/tmp/bark-all-status-live-test-comment.md').write_text(
              '\n'.join(lines) + '\n',
              encoding='utf-8',
          )
          PY
          gh issue comment 61 --repo "${{ github.repository }}" \
            --body-file /tmp/bark-all-status-live-test-comment.md

      - name: Require all four status requests to be accepted
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          value = json.loads(
              Path('/tmp/bark-all-status-live-test/result.json').read_text(
                  encoding='utf-8'
              )
          )
          assert value['expected_requests'] == 4
          assert value['actual_requests'] == 4
          assert value['all_delivered'] is True
          for item in value['results']:
              assert f"[{item['status']}]" in item['title']
              assert item['request_attempts'] == 1
              assert item['automatic_retry'] is False
          PY
          echo "BARK_ALL_STATUS_LIVE_TEST=DELIVERED" >> "$GITHUB_STEP_SUMMARY"
'''
          incident_text = INCIDENT.read_text(encoding='utf-8')
          if '  bark-all-status-live-test:' in incident_text:
              raise SystemExit('BARK_ALL_STATUS_JOB_ALREADY_EXISTS')
          INCIDENT.write_text(incident_text.rstrip() + live_job + '\n', encoding='utf-8')

          replace_once(
              CHANNEL_VALIDATOR,
              'AUTO_RECOVERY = WORKFLOW_ROOT / "devflow-auto-recovery.yml"\n',
              'AUTO_RECOVERY = WORKFLOW_ROOT / "devflow-auto-recovery.yml"\n'
              'LIVE_TEST_ACTIVATION = Path(\n'
              '    ".devflow/bark-all-status-live-test-activation.json"\n'
              ')\n',
          )
          live_validation = '''
    live_test = manifest.get("one_time_live_test")
    expected_live_test = {
        "activation_id": "bark-all-status-live-test-v1-20260724",
        "workflow": INCIDENT.as_posix(),
        "activation_file": LIVE_TEST_ACTIVATION.as_posix(),
        "issue_number": 61,
        "statuses": expected_types,
        "expected_requests": 4,
        "run_attempt_must_equal": 1,
        "automatic_retry": False,
        "response_body_stored": False,
        "response_headers_stored": False,
        "endpoint_stored": False,
        "raw_error_stored": False,
        "secret_value_stored": False,
    }
    if live_test != expected_live_test:
        errors.append("one-time Bark all-status live-test policy mismatch")

    try:
        activation = _load_object(LIVE_TEST_ACTIVATION)
    except ValueError as exc:
        errors.append(str(exc))
        activation = {}
    expected_activation = {
        "schema_version": 1,
        "activation_id": "bark-all-status-live-test-v1-20260724",
        "approved_by": "tyxq428",
        "issue_number": 61,
        "active": True,
        "statuses": expected_types,
        "expected_requests": 4,
        "automatic_retry": False,
    }
    if activation != expected_activation:
        errors.append("one-time Bark all-status activation mismatch")

'''
          replace_once(
              CHANNEL_VALIDATOR,
              '    workflow_text: dict[Path, str] = {}\n',
              live_validation + '    workflow_text: dict[Path, str] = {}\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '        "BARK_SECRET_VALUE_STORED=0",\n'
              '    )\n',
              '        "BARK_SECRET_VALUE_STORED=0",\n'
              '        ".devflow/bark-all-status-live-test-activation.json",\n'
              '        "bark-all-status-live-test:",\n'
              '        "COMPLETED INTERRUPTED HUMAN_REQUIRED SECURITY_BLOCKED",\n'
              '        "EXPECTED_REAL_BARK_REQUESTS=4",\n'
              '        "BARK_ALL_STATUS_LIVE_TEST=DELIVERED",\n'
              '        "gh issue comment 61",\n'
              '    )\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '    if incident_text.count("--request POST") != 1:\n'
              '        errors.append("Devflow Incident must contain exactly one Bark POST location")\n',
              '    if incident_text.count("--request POST") != 2:\n'
              '        errors.append(\n'
              '            "Devflow Incident must contain one production and one approved live-test Bark POST"\n'
              '        )\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '    if incident_text.count("actions/upload-artifact@") != 1:\n'
              '        errors.append(\n'
              '            "Devflow Incident must contain exactly one receipt Artifact upload"\n'
              '        )\n',
              '    if incident_text.count("actions/upload-artifact@") != 2:\n'
              '        errors.append(\n'
              '            "Devflow Incident must contain one receipt and one live-test Artifact upload"\n'
              '        )\n',
          )
          replace_once(
              CHANNEL_VALIDATOR,
              '        "automatic_bark_retries": 0 if not errors else None,\n'
              '        "errors": errors,\n',
              '        "automatic_bark_retries": 0 if not errors else None,\n'
              '        "one_time_live_test": live_test,\n'
              '        "errors": errors,\n',
          )

          replace_once(
              WORKFLOW_VALIDATOR,
              '            "does **not** trigger repair",\n'
              '        ),\n',
              '            "does **not** trigger repair",\n'
              '            ".devflow/bark-all-status-live-test-activation.json",\n'
              '            "bark-all-status-live-test:",\n'
              '            "EXPECTED_REAL_BARK_REQUESTS=4",\n'
              '            "BARK_ALL_STATUS_LIVE_TEST=DELIVERED",\n'
              '            "gh issue comment 61",\n'
              '        ),\n',
          )
          replace_once(
              WORKFLOW_VALIDATOR,
              '    if text.count("--request POST") != 1:\n'
              '        errors.append(f"{path}: exactly one Bark POST location is allowed")\n',
              '    if text.count("--request POST") != 2:\n'
              '        errors.append(\n'
              '            f"{path}: one production and one approved live-test Bark POST are required"\n'
              '        )\n',
          )

          replace_once(
              WORKFLOW_TEST,
              '    assert text.count("--request POST") == 1\n',
              '    assert text.count("--request POST") == 2\n',
          )
          replace_once(
              WORKFLOW_TEST,
              '    assert text.count("actions/upload-artifact@") == 1\n',
              '    assert text.count("actions/upload-artifact@") == 2\n',
          )
          replace_once(
              WORKFLOW_TEST,
              '    assert summary["bark_post_locations"] == 1\n',
              '    assert summary["bark_post_locations"] == 2\n',
          )
          replace_once(
              WORKFLOW_TEST,
              '    assert summary["bark_receipt_artifact_uploads"] == 1\n',
              '    assert summary["bark_receipt_artifact_uploads"] == 2\n',
          )
          live_test_test = '''


def test_owner_approved_all_status_live_test_is_bounded() -> None:
    text = INCIDENT.read_text(encoding="utf-8")
    assert ".devflow/bark-all-status-live-test-activation.json" in text
    assert "bark-all-status-live-test:" in text
    assert "COMPLETED INTERRUPTED HUMAN_REQUIRED SECURITY_BLOCKED" in text
    assert "EXPECTED_REAL_BARK_REQUESTS=4" in text
    assert "BARK_ALL_STATUS_LIVE_TEST=DELIVERED" in text
    assert "gh issue comment 61" in text
    assert "github.run_attempt == 1" in text
    assert "--retry 0" in text
    assert "--output /dev/null" in text
    assert "response_body_stored" in text
