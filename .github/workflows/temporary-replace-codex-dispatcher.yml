name: Temporary Replace Codex Dispatcher

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-replace-codex-dispatcher.yml

permissions:
  actions: write
  contents: write

jobs:
  cancel-replace-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Cancel queued or running obsolete dispatcher runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUNS="$(gh run list --repo "${{ github.repository }}" \
            --workflow "Temporary Dispatch Codex Control" --limit 20 \
            --json databaseId,status 2>/dev/null || echo '[]')"
          python - <<'PY' > /tmp/cancel-runs.txt
          import json
          import os
          rows = json.loads(os.environ['RUNS_JSON'])
          for row in rows:
              if row.get('status') in {'queued', 'in_progress', 'waiting', 'requested', 'pending'}:
                  print(row['databaseId'])
          PY
        env:
          GH_TOKEN: ${{ github.token }}
          RUNS_JSON: ${{ steps.none.outputs.value }}
      - name: Replace dispatcher with secure-wrapper dispatcher
        shell: bash
        run: |
          set -euo pipefail
          # The previous step is intentionally best-effort because a run may finish between list and cancel.
          if [[ -s /tmp/cancel-runs.txt ]]; then
            while read -r run_id; do
              GH_TOKEN="${{ github.token }}" gh run cancel "$run_id" --repo "${{ github.repository }}" || true
            done < /tmp/cancel-runs.txt
          fi
          git pull --ff-only origin main
          rm -f .github/workflows/temporary-dispatch-codex-control.yml
          cat > .github/workflows/temporary-dispatch-codex-control-secure.yml <<'YAML'
          name: Temporary Dispatch Codex Control Secure

          on:
            push:
              branches:
                - main
              paths:
                - .github/workflows/temporary-dispatch-codex-control-secure.yml
            schedule:
              - cron: "9,24,39,54 * * * *"
            workflow_dispatch:

          permissions:
            actions: write
            contents: write
            issues: write

          concurrency:
            group: temporary-dispatch-codex-control-secure
            cancel-in-progress: false

          jobs:
            wait-dispatch-clean:
              runs-on: ubuntu-latest
              timeout-minutes: 55
              steps:
                - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
                  with:
                    ref: main
                    fetch-depth: 0
                - name: Wait for infrastructure, secure wrapper and trusted control branch
                  shell: bash
                  env:
                    GH_TOKEN: ${{ github.token }}
                  run: |
                    set -euo pipefail
                    CONTROL_BRANCH="task/codex-resilient-command-terminal-status-v1"
                    for attempt in $(seq 1 150); do
                      git fetch origin main --quiet
                      if git cat-file -e origin/main:.github/workflows/codex-task-secure.yml 2>/dev/null && \
                         git ls-remote --exit-code --heads origin "$CONTROL_BRANCH" >/dev/null 2>&1; then
                        gh workflow run codex-task-secure.yml --repo "${{ github.repository }}" --ref main \
                          -f task_branch="$CONTROL_BRANCH"
                        echo "SECURE_CODEX_TASK_DISPATCHED=PASS"
                        exit 0
                      fi
                      echo "[secure-dispatch-heartbeat] waiting; attempt=${attempt}/150"
                      sleep 20
                    done
                    exit 1
                - name: Remove one-time secure dispatcher
                  if: success()
                  run: |
                    git fetch origin main
                    git reset --hard origin/main
                    rm -f .github/workflows/temporary-dispatch-codex-control-secure.yml
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add -A
                    git commit -m "Remove completed secure Codex dispatcher"
                    git push origin HEAD:main
                - name: Notify only if secure dispatch cannot start
                  if: failure()
                  env:
                    GH_TOKEN: ${{ github.token }}
                  run: |
                    TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
                    NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
                    if [[ -z "$NUMBER" ]]; then
                      URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
                      NUMBER="${URL##*/}"
                    fi
                    gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

          [TASK][HUMAN_REQUIRED]

          Secure Codex workflow dispatch did not start. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          YAML
          rm -f .github/workflows/temporary-replace-codex-dispatcher.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use permission-correct secure Codex dispatcher"
          git push origin HEAD:main
