name: Temporary Recover PR-A And Clean Main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-recover-pr-a-and-clean-main.yml
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: temporary-recover-pr-a-and-clean-main
  cancel-in-progress: false

jobs:
  recover:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/chatgpt-web-codex-devflow-v1-clean
          fetch-depth: 0

      - name: Refresh exact PR-A branch
        run: git pull --ff-only origin feature/chatgpt-web-codex-devflow-v1-clean

      - name: Canonicalize production Codex wrapper and handoff
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/codex-task-secure.yml
          cp .github/workflows/codex-task-secure.yml .github/workflows/codex-task.yml
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/_reusable-codex-thin-worker.yml')
          text = path.read_text(encoding='utf-8')
          marker = '\n  publish:\n'
          if marker not in text:
              raise SystemExit('publish job marker missing')
          prefix, publish = text.split(marker, 1)
          publish = publish.replace(
              '      - name: Download audited handoff\n',
              '      - name: Download audited handoff outside repository workspace\n',
          )
          publish = publish.replace('          path: artifact\n', '          path: /tmp/codex-handoff\n', 1)
          publish = publish.replace(
              '(cd artifact && sha256sum --check manifest.sha256)',
              '(cd /tmp/codex-handoff && sha256sum --check manifest.sha256)',
          )
          publish = publish.replace(
              'Path("artifact/secret-audit.json")',
              'Path("/tmp/codex-handoff/secret-audit.json")',
          )
          publish = publish.replace(
              'git apply --index artifact/codex.patch',
              'git apply --index /tmp/codex-handoff/codex.patch',
          )
          publish = publish.replace(
              '--output artifact/publish-scope-result.json',
              '--output /tmp/publish-scope-result.json',
          )
          publish = publish.replace(
              '--output artifact/publish-gate-result.json',
              '--output /tmp/publish-gate-result.json',
          )
          if 'path: /tmp/codex-handoff' not in publish:
              raise SystemExit('publish handoff path was not normalized')
          path.write_text(prefix + marker + publish, encoding='utf-8')
          PY

      - name: Remove PR-A one-time files
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/codex-task-secure.yml \
            .github/workflows/temporary-canonicalize-codex-wrapper.yml \
            .github/workflows/temporary-ensure-devflow-codex-fixes.yml \
            .github/workflows/temporary-fix-reusable-publish.yml \
            .github/workflows/temporary-merge-devflow-pr-a.yml \
            .github/workflows/temporary-finalize-pr-a-cleanup.yml \
            devflow-workflow-validation.json \
            w04-state-result.json
          rm -rf scripts/devflow/__pycache__ tests/__pycache__

      - name: Validate clean PR-A branch
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --output /tmp/pr-a-state-result.json
          python scripts/devflow/validate_workflows.py
          ruff check scripts/devflow tests/test_devflow.py
          pytest -q tests/test_devflow.py
          python -m compileall -q src scripts

      - name: Publish one clean PR-A commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Finalize clean PR-A execution infrastructure"
            git push origin HEAD:feature/chatgpt-web-codex-devflow-v1-clean
          fi

      - name: Remove all temporary orchestration from main
        shell: bash
        run: |
          set -euo pipefail
          FILES=(
            .github/workflows/devflow-cleanup-temporary.yml
            .github/workflows/devflow-cleanup-temporary-v2.yml
            .github/workflows/devflow-cleanup-temporary-v3.yml
            .github/workflows/devflow-final-state-audit.yml
            .github/workflows/devflow-finalize-state.yml
            .github/workflows/temporary-bootstrap-devflow-v2.yml
            .github/workflows/temporary-devflow-reconciler.yml
            .github/workflows/temporary-devflow-watchdog.yml
            .github/workflows/temporary-dispatch-canonical-codex-v2.yml
            .github/workflows/temporary-dispatch-canonical-codex.yml
            .github/workflows/temporary-dispatch-product-gate.yml
            .github/workflows/temporary-ensure-main-codex-wrapper.yml
            .github/workflows/temporary-final-postmerge-runner.yml
            .github/workflows/temporary-infrastructure-postmerge-runner.yml
            .github/workflows/temporary-pr-a-controller.yml
            .github/workflows/temporary-prepare-devflow-finalization.yml
            .github/workflows/temporary-product-branch-gate.yml
            .github/workflows/temporary-thin-slice-postmerge-runner.yml
            .github/workflows/temporary-recover-pr-a-and-clean-main.yml
            .devflow/codex-wrapper-ready.json
          )
          git fetch origin main
          git switch -C main origin/main
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            rm -f "${FILES[@]}"
            rmdir .devflow 2>/dev/null || true
            git add -A
            if git diff --cached --quiet; then
              echo "MAIN_TEMPORARY_ORCHESTRATION_ALREADY_CLEAN=PASS"
              exit 0
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Remove temporary devflow migration orchestration"
            if git push origin HEAD:main; then
              echo "MAIN_TEMPORARY_ORCHESTRATION_CLEANED=PASS"
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "MAIN_TEMPORARY_ORCHESTRATION_CLEANUP_FAILED"
          exit 1
