name: Temporary bootstrap dispatcher

on:
  pull_request:
    branches: [main]
    types: [ready_for_review, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temporary-bootstrap-f10-platform
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feature/f10-research-platform-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout dispatcher from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: dispatcher
          fetch-depth: 1

      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/f10-research-platform-v1
          path: target
          fetch-depth: 0

      - name: Reconstruct, diagnose and verify project
        shell: bash
        run: bash dispatcher/.github/scripts/bootstrap-f10.sh target

      - name: Commit expanded project to feature branch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Build F10 research platform v1"
            git push origin HEAD:feature/f10-research-platform-v1
          fi
