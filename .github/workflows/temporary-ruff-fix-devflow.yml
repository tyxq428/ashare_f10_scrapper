name: Temporary Ruff Fix Devflow

on:
  push:
    branches:
      - feature/chatgpt-web-codex-devflow-v1-clean
    paths:
      - scripts/devflow/**
      - tests/test_devflow.py
      - .github/workflows/temporary-ruff-fix-devflow.yml

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: temporary-ruff-fix-devflow
  cancel-in-progress: false

jobs:
  deterministic-fix:
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/chatgpt-web-codex-devflow-v1-clean
          fetch-depth: 0
      - name: Apply only deterministic Ruff fixes and verify
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check --fix scripts/devflow tests/test_devflow.py
          ruff check scripts/devflow tests/test_devflow.py
          pytest -q tests/test_devflow.py
      - name: Remove one-time fixer and publish repairs
        run: |
          rm -f .github/workflows/temporary-ruff-fix-devflow.yml
          rm -rf scripts/devflow/__pycache__ tests/__pycache__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply deterministic Ruff fixes to devflow infrastructure"
          git push origin HEAD:feature/chatgpt-web-codex-devflow-v1-clean
