name: Temporary Devflow Reconciler

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-devflow-reconciler.yml
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: read
  issues: write

concurrency:
  group: temporary-devflow-reconciler
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Reconcile only idempotent next actions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          STATE="docs/implementation/chatgpt-web-codex-devflow-v1/task_state.yaml"
          if [[ ! -f "$STATE" ]]; then
            echo "RECONCILE=WAITING_FOR_PR_A"
            exit 0
          fi
          STATUS="$(python -c 'import json; print(json.load(open("'"$STATE"'"))["status"])')"
          STAGE="$(python -c 'import json; print(json.load(open("'"$STATE"'"))["current_stage"])')"
          echo "TASK_STATUS=$STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo "TASK_STAGE=$STAGE" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$STATUS" == "DONE" ]]; then
            echo "RECONCILE=DONE"
            exit 0
          fi

          CONTROL="task/codex-resilient-command-terminal-status-v1"
          PRODUCT="codex/resilient-command-terminal-status-v1"
          CONTROL_EXISTS=false
          PRODUCT_EXISTS=false
          PRODUCT_MERGED=false
          git ls-remote --exit-code --heads origin "$CONTROL" >/dev/null 2>&1 && CONTROL_EXISTS=true || true
          git ls-remote --exit-code --heads origin "$PRODUCT" >/dev/null 2>&1 && PRODUCT_EXISTS=true || true
          if [[ "$PRODUCT_EXISTS" == true ]]; then
            git fetch origin "$PRODUCT" --quiet
            git merge-base --is-ancestor "origin/$PRODUCT" origin/main && PRODUCT_MERGED=true || true
          fi

          dispatch_if_idle() {
            local workflow="$1"; shift
            local active
            active="$(gh run list --repo "${{ github.repository }}" --workflow "$workflow" --limit 10 \
              --json status,databaseId 2>/dev/null \
              --jq '.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending") | .databaseId' | head -n 1)"
            if [[ -z "$active" ]]; then
              gh workflow run "$workflow" --repo "${{ github.repository }}" --ref main "$@"
              echo "DISPATCHED=$workflow"
            else
              echo "ALREADY_ACTIVE=$workflow:$active"
            fi
          }

          if [[ "$CONTROL_EXISTS" == false ]]; then
            if [[ -f .github/workflows/temporary-bootstrap-devflow-v2.yml ]]; then
              dispatch_if_idle temporary-bootstrap-devflow-v2.yml
            fi
            exit 0
          fi

          if [[ "$PRODUCT_EXISTS" == false ]]; then
            # Preserve the one-session rule: dispatch only when no Codex Task run has ever completed
            # for this migration and none is currently active.
            RUNS="$(gh run list --repo "${{ github.repository }}" --workflow codex-task.yml --limit 20 \
              --json status,conclusion,databaseId 2>/dev/null || echo '[]')"
            COMPLETED="$(python -c 'import json,sys; rows=json.load(sys.stdin); print(sum(1 for r in rows if r.get("status")=="completed"))' <<<"$RUNS")"
            ACTIVE="$(python -c 'import json,sys; rows=json.load(sys.stdin); x=[r for r in rows if r.get("status") in {"queued","in_progress","waiting","requested","pending"}]; print(x[0]["databaseId"] if x else "")' <<<"$RUNS")"
            if [[ "$COMPLETED" == "0" && -z "$ACTIVE" ]]; then
              gh workflow run codex-task.yml --repo "${{ github.repository }}" --ref main -f task_branch="$CONTROL"
              echo "DISPATCHED=codex-task.yml"
            elif [[ -n "$ACTIVE" ]]; then
              echo "CODEX_TASK_ACTIVE=$ACTIVE"
            else
              echo "CODEX_SESSION_ALREADY_COMPLETED_NO_PRODUCT_BRANCH"
            fi
            exit 0
          fi

          if [[ "$PRODUCT_MERGED" == false ]]; then
            dispatch_if_idle temporary-product-branch-gate.yml -f product_branch="$PRODUCT"
            exit 0
          fi

          if [[ ! -f .devflow/finalize/chatgpt-web-codex-devflow-v1.json ]]; then
            dispatch_if_idle temporary-thin-slice-postmerge-runner.yml
            exit 0
          fi

          dispatch_if_idle temporary-final-postmerge-runner.yml
      - name: Remove reconciler when canonical state is DONE
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git reset --hard origin/main
          STATE="docs/implementation/chatgpt-web-codex-devflow-v1/task_state.yaml"
          [[ -f "$STATE" ]] || exit 0
          STATUS="$(python -c 'import json; print(json.load(open("'"$STATE"'"))["status"])')"
          [[ "$STATUS" == "DONE" ]] || exit 0
          rm -f .github/workflows/temporary-devflow-reconciler.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove completed devflow reconciler"
          git push origin HEAD:main
