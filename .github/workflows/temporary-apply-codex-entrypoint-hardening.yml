name: Temporary Apply Codex Entrypoint Hardening

on:
  push:
    branches:
      - feature/codex-entrypoint-hardening-v1
    paths:
      - .github/workflows/temporary-apply-codex-entrypoint-hardening.yml

permissions:
  contents: write

concurrency:
  group: temporary-apply-codex-entrypoint-hardening
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/codex-entrypoint-hardening-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Verify repository-wide Codex freeze
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(
              Path('.devflow/codex-policy.yaml').read_text(encoding='utf-8')
          )
          assert policy['mode'] == 'disabled'
          assert policy['auto_recovery_dispatch'] is False
          assert policy['retry_failed_codex_job'] is False
          print('ZERO_CODEX_FREEZE=PASS')
          PY

      - name: Apply deterministic patch and format
        run: |
          set -euo pipefail
          python scripts/devflow/temporary_patch_nonrerunnable_codex.py
          python -m pip install ruff
          ruff format scripts/devflow/recovery_policy.py tests/test_devflow.py
          ruff check --fix scripts/devflow/recovery_policy.py tests/test_devflow.py
          python -m compileall -q scripts/devflow

      - name: Commit patch and remove temporary executor
        run: |
          set -euo pipefail
          git rm scripts/devflow/temporary_patch_nonrerunnable_codex.py
          git rm .github/workflows/temporary-apply-codex-entrypoint-hardening.yml
          git add scripts/devflow/recovery_policy.py tests/test_devflow.py
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Make model-bearing Codex jobs non-rerunnable"
          git push origin HEAD:feature/codex-entrypoint-hardening-v1
