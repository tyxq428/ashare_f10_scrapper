name: Temporary Bootstrap Devflow W05-W06

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-bootstrap-devflow-w05-w06.yml

permissions:
  contents: read
  actions: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  wait-and-health:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: agent-runtime
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Wait for PR-A infrastructure on exact main and its independent gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            git fetch origin main --quiet
            if git cat-file -e origin/main:scripts/devflow/relay_health.py 2>/dev/null; then
              RUN_JSON="$(gh run list --repo "${{ github.repository }}" \
                --workflow "Devflow Infrastructure Post Merge" --branch main --limit 1 \
                --json status,conclusion,databaseId 2>/dev/null || true)"
              STATUS="$(python -c 'import json,sys; x=json.load(sys.stdin); print(x[0]["status"] if x else "")' <<<"$RUN_JSON")"
              CONCLUSION="$(python -c 'import json,sys; x=json.load(sys.stdin); print(x[0].get("conclusion") or "" if x else "")' <<<"$RUN_JSON")"
              if [[ "$STATUS" == "completed" && "$CONCLUSION" == "success" ]]; then
                echo "PR_A_POST_MERGE=PASS"
                git reset --hard origin/main
                exit 0
              fi
              if [[ "$STATUS" == "completed" && -n "$CONCLUSION" && "$CONCLUSION" != "success" ]]; then
                echo "PR_A_POST_MERGE=FAIL"
                exit 1
              fi
            fi
            echo "[bootstrap-heartbeat] waiting for PR-A exact-main gate; attempt=${attempt}/90"
            sleep 20
          done
          echo "PR_A_POST_MERGE=TIMEOUT"
          exit 1
      - name: Register private value masks
        shell: bash
        env:
          ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          API_KEY: ${{ secrets.AGENT_API_KEY }}
          MODEL: ${{ secrets.AGENT_MODEL }}
        run: |
          set +x
          python - <<'PY'
          import base64
          import os
          from urllib.parse import quote, urlsplit
          endpoint = os.environ['ENDPOINT']
          key = os.environ['API_KEY']
          model = os.environ['MODEL']
          parsed = urlsplit(endpoint)
          for value in {
              endpoint, endpoint.rstrip('/'), parsed.netloc, parsed.hostname or '', key, model,
              quote(endpoint, safe=''), quote(key, safe=''),
              base64.b64encode(endpoint.encode()).decode(),
              base64.urlsafe_b64encode(endpoint.encode()).decode(),
              base64.b64encode(key.encode()).decode(),
              base64.urlsafe_b64encode(key.encode()).decode(),
          }:
              if len(value) >= 3:
                  print(f'::add-mask::{value}')
          PY
      - name: Run one formal relay health check and audit its safe summary
        env:
          AGENT_RESPONSES_ENDPOINT: ${{ secrets.AGENT_RESPONSES_ENDPOINT }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          AGENT_MODEL: ${{ secrets.AGENT_MODEL }}
          PYTHONPATH: scripts/devflow
        run: |
          python scripts/devflow/relay_health.py
          python scripts/devflow/secret_audit.py relay-health-summary.json \
            --output relay-health-secret-audit.json

  bootstrap-thin-slice:
    needs: wait-and-health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Persist W05 result, W06 plan and create trusted Codex control branch
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          python - <<'PY'
          import json
          import subprocess
          from datetime import UTC, datetime
          from pathlib import Path

          task_root = Path('docs/implementation/chatgpt-web-codex-devflow-v1')
          state_path = task_root / 'task_state.yaml'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          state['state_revision'] += 1
          state['current_stage'] = 'W06'
          state['last_completed_stage'] = 'W05'
          state['last_successful_step'] = 'pr_a_post_merge_and_formal_relay_health_verified'
          state['next_action'] = 'dispatch_real_resilient_command_codex_thin_slice'
          state['gate_results']['W05'] = 'PASS'
          state['updated_at_utc'] = datetime.now(UTC).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          active_path = Path('docs/implementation/ACTIVE_TASKS.yaml')
          active = json.loads(active_path.read_text(encoding='utf-8'))
          entry = next(x for x in active['tasks'] if x['task_id'] == state['task_id'])
          entry['current_stage'] = 'W06'
          active_path.write_text(json.dumps(active, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          (task_root / 'W05_result.md').write_text('''# W05 结果：PR-A 合并与独立 Post-Merge\n\n## 状态\n\n```yaml\nphase: W05\nstatus: COMPLETED\nlast_successful_step: pr_a_post_merge_and_formal_relay_health_verified\nnext_action: W06_real_codex_thin_slice\nhuman_intervention_required: false\n```\n\n## 结果\n\n- PR-A 完成 pre-merge Gate 并合并；\n- exact-main `Devflow Infrastructure Post Merge` 通过；\n- 正式 `agent-runtime` Streaming Responses 健康检查通过；\n- 健康摘要 Secret Audit 通过；\n- 可以开始一个真实、低风险、单 Session Codex 薄切片。\n''', encoding='utf-8')
          (task_root / 'W06_plan.md').write_text('''# W06 计划：真实低风险 Codex 薄切片\n\n## 目标\n\n修复 `run_resilient_command.py` 在最后一次可重试失败已经耗尽 `max_attempts` 时仍把报告状态写为 `RETRYING` 的问题。\n\n## 允许修改\n\n- `scripts/run_resilient_command.py`\n- `tests/test_resilient_fetch.py`\n\n## 禁止\n\n不得修改 Workflow、F10/官方数据逻辑、其他测试或业务语义。\n\n## Gate\n\n`resilient-command-targeted`：定向 Ruff 和 `tests/test_resilient_fetch.py`。随后由 Web PR 执行完整 Test 与独立 post-merge。\n\n## Codex 限制\n\nlow effort；一个 Session；无自动第二 Session；越界或 Gate 失败立即阻断。\n''', encoding='utf-8')
          PY
          python scripts/devflow/render_task_docs.py docs/implementation/chatgpt-web-codex-devflow-v1
          rm -f .github/workflows/temporary-bootstrap-devflow-w05-w06.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete W05 and prepare real Codex thin slice"
          git push origin HEAD:main

          CONTROL_BRANCH="task/codex-resilient-command-terminal-status-v1"
          git switch -c "$CONTROL_BRANCH"
          mkdir -p .agent
          cat > .agent/current_task.yaml <<'JSON'
          {
            "schema_version": 1,
            "task_id": "resilient-command-terminal-status-v1",
            "objective": "Correct terminal report status after finite retry exhaustion without changing retry classification or retry count semantics.",
            "base_branch": "main",
            "publish_branch": "codex/resilient-command-terminal-status-v1",
            "allowed_files": [
              "scripts/run_resilient_command.py",
              "tests/test_resilient_fetch.py"
            ],
            "forbidden_patterns": [
              ".github/**",
              "src/**",
              "docs/**",
              ".env",
              "secrets/**"
            ],
            "required_changes": [
              "Write PASS only for return code zero.",
              "Write RETRYING only when the failure is retryable and another attempt will actually run.",
              "Write FAILED for non-retryable failures and for retryable failures after max_attempts is exhausted.",
              "Preserve per-attempt retryable=true when classification is retryable even if overall status is FAILED.",
              "Add deterministic regression tests for success, intermediate retry, exhausted retry and non-retryable failure."
            ],
            "instructions": "Make the smallest patch. Do not redesign the retry engine. Do not change the retryable regex or business logic. Run only the trusted targeted gate. Return SUCCESS only after the targeted tests pass; otherwise return BLOCKED.",
            "gate_profile": "resilient-command-targeted",
            "reasoning_effort": "low",
            "session_limit": 1,
            "automatic_second_session": 0,
            "stop_conditions": [
              "any changed path outside allowed_files",
              "secret audit match",
              "targeted gate failure after the single session",
              "business or architecture decision required"
            ]
          }
          JSON
          git add .agent/current_task.yaml
          git commit -m "Dispatch resilient command terminal-status thin slice"
          git push origin "HEAD:refs/heads/${CONTROL_BRANCH}"

  notify-bootstrap-failure:
    if: failure()
    needs:
      - wait-and-health
      - bootstrap-thin-slice
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Send one valuable human-required notification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" \
            --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

PR-A exact-main verification or formal Relay Health/bootstrap failed. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} and resume from HANDOFF.md."
