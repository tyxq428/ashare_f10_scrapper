name: Temporary Thin Slice Post Merge

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-thin-slice-postmerge-runner.yml
  schedule:
    - cron: "6,21,36,51 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: temporary-thin-slice-postmerge-runner
  cancel-in-progress: false

jobs:
  wait-verify-and-mark:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait until the exact Codex product branch is merged into main
        run: |
          set -euo pipefail
          PRODUCT_BRANCH="codex/resilient-command-terminal-status-v1"
          for attempt in $(seq 1 240); do
            git fetch origin main "$PRODUCT_BRANCH" --quiet 2>/dev/null || true
            if git show-ref --verify --quiet "refs/remotes/origin/$PRODUCT_BRANCH" && \
               git merge-base --is-ancestor "origin/$PRODUCT_BRANCH" origin/main; then
              git reset --hard origin/main
              echo "THIN_SLICE_MERGED_TO_MAIN=READY"
              exit 0
            fi
            echo "[thin-postmerge-heartbeat] waiting for product merge; attempt=${attempt}/240"
            sleep 20
          done
          exit 1
      - name: Independently verify thin slice on exact main
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check scripts/run_resilient_command.py tests/test_resilient_fetch.py
          pytest -q tests/test_resilient_fetch.py
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Persist W06-W08 state and create finalization marker
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT_SHA="$(git rev-parse origin/codex/resilient-command-terminal-status-v1)"
          export PRODUCT_SHA
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          now = datetime.now(UTC).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          root = Path('docs/implementation/chatgpt-web-codex-devflow-v1')
          state_path = root / 'task_state.yaml'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          state['state_revision'] += 1
          state['status'] = 'VERIFYING'
          state['execution_status'] = 'COMPLETED'
          state['research_acceptance_status'] = 'PASS'
          state['current_stage'] = 'W08'
          state['last_completed_stage'] = 'W07'
          state['last_product_commit_sha'] = os.environ['PRODUCT_SHA']
          state['last_successful_step'] = 'real_codex_thin_slice_merged_and_exact_main_verified'
          state['next_action'] = 'run_final_exact_main_post_merge_verification'
          state['gate_results']['W06'] = 'PASS'
          state['gate_results']['W07'] = 'PASS'
          state['gate_results']['W08'] = 'RUNNING'
          state['post_merge']['status'] = 'RUNNING'
          state['post_merge']['merge_sha'] = os.environ['PRODUCT_SHA']
          state['updated_at_utc'] = now
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          active_path = Path('docs/implementation/ACTIVE_TASKS.yaml')
          active = json.loads(active_path.read_text(encoding='utf-8'))
          entry = next(x for x in active['tasks'] if x['task_id'] == state['task_id'])
          entry['status'] = 'VERIFYING'
          entry['current_stage'] = 'W08'
          active_path.write_text(json.dumps(active, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          (root / 'W06_result.md').write_text('''# W06 结果：真实低风险 Codex 薄切片\n\n## 状态\n\n```yaml\nphase: W06\nstatus: COMPLETED\nlast_successful_step: real_codex_patch_merged_and_exact_main_verified\nnext_action: W07_gradual_migration_policy\nhuman_intervention_required: false\n```\n\n## 结果\n\n- 正式 `agent-runtime` 通过 localhost Forwarder 调用一次 Codex Thin Worker；\n- 只允许并最终只修改 `scripts/run_resilient_command.py` 与 `tests/test_resilient_fetch.py`；\n- 修复有限重试耗尽后 report 仍显示 RETRYING 的真实问题；\n- Scope Guard、目标 Gate、Secret Audit、Patch Manifest、无 Secret Publish、完整 Test 和 exact-main 验证通过；\n- 未自动开启第二个 Codex Session。\n''', encoding='utf-8')
          (root / 'W07_plan.md').write_text('''# W07 计划：后续开发任务渐进迁移\n\n## 目标\n\n仅把窄范围、明确测试、无业务口径的任务逐步切换到 Codex Thin Worker。\n\n## 准入与扩大标准\n\n允许文件通常 2–5 个；明确 G1；无 Workflow/Secret/破坏性迁移；连续三个真实任务 scope violation=0、secret failure=0、automatic second session=0、targeted gate pass=100%、rollback=0 后再扩大使用。\n''', encoding='utf-8')
          (root / 'W07_result.md').write_text('''# W07 结果：渐进迁移策略\n\n## 状态\n\n```yaml\nphase: W07\nstatus: COMPLETED\nlast_successful_step: gradual_migration_admission_and_metrics_defined\nnext_action: W08_final_post_merge_and_closeout\nhuman_intervention_required: false\n```\n\n## 结果\n\n- Thin Worker 不强制用于所有任务；\n- 低风险准入、禁用范围、三任务观察窗和扩大指标已定义；\n- Web Supervisor 保留业务、架构、安全、Workflow 与最终合并控制权。\n''', encoding='utf-8')
          (root / 'W08_plan.md').write_text('''# W08 计划：最终 Post-Merge 与收尾\n\n由 `Devflow Post Merge` 在 exact main 重新执行状态、Workflow 安全、devflow tests、薄切片 Gate 和完整仓库 Test。成功后写 DONE、FINAL_REPORT 与工程经验；失败保持 POST_MERGE_BLOCKED。\n''', encoding='utf-8')

          marker = Path('.devflow/finalize/chatgpt-web-codex-devflow-v1.json')
          marker.parent.mkdir(parents=True, exist_ok=True)
          marker.write_text(json.dumps({
              'schema_version': 1,
              'task_id': state['task_id'],
              'product_sha': os.environ['PRODUCT_SHA'],
              'requested_at_utc': now,
          }, indent=2) + '\n', encoding='utf-8')
          PY
          python scripts/devflow/render_task_docs.py docs/implementation/chatgpt-web-codex-devflow-v1
          rm -f .github/workflows/temporary-merge-devflow-pr-b.yml
          rm -f .github/workflows/temporary-after-codex-merge-pr-b.yml
          rm -f .github/workflows/temporary-product-branch-gate.yml
          rm -f .github/workflows/temporary-dispatch-product-gate.yml
          rm -f .github/workflows/temporary-prepare-devflow-finalization.yml
          rm -f .github/workflows/temporary-thin-slice-postmerge-runner.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prepare final devflow exact-main verification"
          git push origin HEAD:main
      - name: Notify only if exact-main thin-slice verification is blocked
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][INTERRUPTED]

The real thin slice did not merge or failed independent exact-main verification. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} and resume from HANDOFF.md."
