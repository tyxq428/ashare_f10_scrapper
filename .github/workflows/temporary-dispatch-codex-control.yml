name: Temporary Dispatch Codex Control

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-dispatch-codex-control.yml

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: temporary-dispatch-codex-control
  cancel-in-progress: false

jobs:
  wait-dispatch-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Wait for trusted control branch and explicitly dispatch Codex Task
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CONTROL_BRANCH="task/codex-resilient-command-terminal-status-v1"
          for attempt in $(seq 1 120); do
            if git ls-remote --exit-code --heads origin "$CONTROL_BRANCH" >/dev/null 2>&1; then
              gh workflow run codex-task.yml --repo "${{ github.repository }}" --ref main \
                -f task_branch="$CONTROL_BRANCH"
              echo "CODEX_TASK_DISPATCHED=PASS"
              exit 0
            fi
            echo "[dispatch-heartbeat] waiting for control branch; attempt=${attempt}/120"
            sleep 20
          done
          echo "CODEX_CONTROL_BRANCH_TIMEOUT"
          exit 1
      - name: Remove one-time dispatcher from latest main
        if: success()
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          rm -f .github/workflows/temporary-dispatch-codex-control.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove completed Codex control dispatcher"
          git push origin HEAD:main
      - name: Notify only if control dispatch cannot start
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" \
            --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][HUMAN_REQUIRED]

The trusted Codex control branch did not appear or workflow_dispatch failed. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
