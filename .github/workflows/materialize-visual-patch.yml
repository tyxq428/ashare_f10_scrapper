name: Materialize visual-first execution patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".visual-bootstrap/**"
      - ".github/workflows/materialize-visual-patch.yml"

permissions:
  contents: write

concurrency:
  group: materialize-visual-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      HEAD_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Reconstruct and verify patch archive through Contents API
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          expected_blob_shas = {
              "part_00.txt": "d44d7070d6dfe0c676ca9cb8aa78b276b6f02f37",
              "part_01.txt": "0f6fa59e5e9b25b3d4a90618c71571da897a4f87",
              "part_02.txt": "98630605727846895ae13dc2e296deb63caf4043",
              "part_03.txt": "bc8d6723b83bd5cc6c1876ad310410cc9ae4cdda",
              "part_04.txt": "3733b9b9b901b77b1354b750101c0f37503d5930",
              "part_05.txt": "b111891d18481ffa6f21542f7d4f7c8e4807c544",
              "part_06.txt": "236f75f65fe5f43d7f99ededce6f8a552676955e",
              "part_07.txt": "1cca770e42c701c2b8dd5ae6dffc5e633f38af23",
              "part_08.txt": "c958dad57a1d88cffb4dd1ca5f08146cfc274e77",
              "part_09.txt": "3571cc5b99199a5bf66b7c3657b9c55e1a39afc9",
              "part_10.txt": "4962e5ff6cbd3ab4d4960fecf94b9a3d850b751c",
              "part_11.txt": "8008a33b84e115ea92c86a42a2ab0fdeddb11a1c",
              "part_12.txt": "a1f628820e93f554ecf50909193dd57c5dc97b66",
              "part_13.txt": "2cf75679b5d1e2ef77b8dd773a1da85dc3f1f730",
              "part_14.txt": "a76c45b943baae88227136ac424d8942192749e0",
          }
          repository = os.environ["GITHUB_REPOSITORY"]
          ref = os.environ["HEAD_BRANCH"]
          token = os.environ["GH_TOKEN"]
          chunks: list[bytes] = []
          for index in range(15):
              name = f"part_{index:02d}.txt"
              url = (
                  f"https://api.github.com/repos/{repository}/contents/"
                  f".visual-bootstrap/{name}?ref={urllib.parse.quote(ref, safe='')}"
              )
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "ashare-f10-visual-materializer",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              raw = base64.b64decode(payload["content"])
              blob = hashlib.sha1(f"blob {len(raw)}\0".encode() + raw).hexdigest()
              print(f"{name} bytes={len(raw)} blob={blob}")
              assert blob == expected_blob_shas[name], (name, blob, expected_blob_shas[name])
              chunks.append(raw)

          encoded = b"".join(chunks).replace(b"\r", b"").replace(b"\n", b"")
          decoded = base64.b64decode(encoded, validate=True)
          actual = hashlib.sha256(decoded).hexdigest()
          print(f"base64_size={len(encoded)} archive_size={len(decoded)} archive_sha256={actual}")
          assert actual == "72a4cb48b8569dc789c441c4ae26301942216d546a1ebb01a6f70d6d5749b4eb"
          Path("/tmp/visual-patch.tar.xz").write_bytes(decoded)
          PY
          tar -tJf /tmp/visual-patch.tar.xz > /tmp/visual-patch-files.txt
          grep -qx 'src/ashare_f10/api/visual_jobs.py' /tmp/visual-patch-files.txt
          if grep -q '^\.github/workflows/' /tmp/visual-patch-files.txt; then
            echo "Archive must not modify workflow files" >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Materialize project files
        run: |
          set -euo pipefail
          tar -xJf /tmp/visual-patch.tar.xz -C .
          rm -rf .visual-bootstrap
          test -f src/ashare_f10/api/visual_jobs.py
          test -f src/ashare_f10/web/run.html
          test -f scripts/start-web.ps1
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/run.js
      - name: Commit materialized files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- src scripts tests docs WINDOWS_START_HERE.md .visual-bootstrap
          if git diff --cached --quiet; then
            echo "Patch is already materialized"
            exit 0
          fi
          git commit -m "Materialize visual-first execution controls [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
