name: Materialize visual-first execution patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".visual-bootstrap/**"
      - ".github/workflows/materialize-visual-patch.yml"

permissions:
  contents: write

concurrency:
  group: materialize-visual-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Reconstruct and verify patch archive
        run: |
          set -euo pipefail
          echo "part_count=$(find .visual-bootstrap -name 'part_*.txt' -type f | wc -l)"
          sha1sum .visual-bootstrap/part_*.txt
          cat .visual-bootstrap/part_*.txt | tr -d '\r\n' > /tmp/visual-patch.b64
          echo "base64_size=$(wc -c < /tmp/visual-patch.b64)"
          if LC_ALL=C grep -q '[^A-Za-z0-9+/=]' /tmp/visual-patch.b64; then
            echo "Invalid character found in split Base64 transport" >&2
            exit 1
          fi
          base64 --decode /tmp/visual-patch.b64 > /tmp/visual-patch.tar.xz
          ACTUAL_SHA="$(sha256sum /tmp/visual-patch.tar.xz | awk '{print $1}')"
          echo "archive_sha256=$ACTUAL_SHA"
          test "$ACTUAL_SHA" = "72a4cb48b8569dc789c441c4ae26301942216d546a1ebb01a6f70d6d5749b4eb"
          tar -tJf /tmp/visual-patch.tar.xz > /tmp/visual-patch-files.txt
          grep -qx 'src/ashare_f10/api/visual_jobs.py' /tmp/visual-patch-files.txt
          if grep -q '^\.github/workflows/' /tmp/visual-patch-files.txt; then
            echo "Archive must not modify workflow files" >&2
            exit 1
          fi
      - name: Materialize project files
        run: |
          set -euo pipefail
          tar -xJf /tmp/visual-patch.tar.xz -C .
          rm -rf .visual-bootstrap
          test -f src/ashare_f10/api/visual_jobs.py
          test -f src/ashare_f10/web/run.html
          test -f scripts/start-web.ps1
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/run.js
      - name: Commit materialized files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- src scripts tests docs WINDOWS_START_HERE.md .visual-bootstrap
          if git diff --cached --quiet; then
            echo "Patch is already materialized"
            exit 0
          fi
          git commit -m "Materialize visual-first execution controls [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
