name: Materialize visual-first execution patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".visual-bootstrap/**"
      - ".github/workflows/materialize-visual-patch.yml"

permissions:
  contents: write

concurrency:
  group: materialize-visual-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      HEAD_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Reconstruct and verify patch archive through Contents API
        run: |
          set -euo pipefail
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/.visual-bootstrap/verify_transport.py?ref=$HEAD_BRANCH" | python -c "import base64,json,sys; sys.stdout.buffer.write(base64.b64decode(json.load(sys.stdin)['content']))" > /tmp/verify_transport.py
          python /tmp/verify_transport.py
          tar -tJf /tmp/visual-patch.tar.xz > /tmp/visual-patch-files.txt
          grep -qx 'src/ashare_f10/api/visual_jobs.py' /tmp/visual-patch-files.txt
          if grep -q '^\.github/workflows/' /tmp/visual-patch-files.txt; then
            echo "Archive must not modify workflow files" >&2
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Materialize project files
        run: |
          set -euo pipefail
          tar -xJf /tmp/visual-patch.tar.xz -C .
          rm -rf .visual-bootstrap
          test -f src/ashare_f10/api/visual_jobs.py
          test -f src/ashare_f10/web/run.html
          test -f scripts/start-web.ps1
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/run.js
      - name: Commit materialized files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- src scripts tests docs WINDOWS_START_HERE.md .visual-bootstrap
          if git diff --cached --quiet; then
            echo "Patch is already materialized"
            exit 0
          fi
          git commit -m "Materialize visual-first execution controls [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
