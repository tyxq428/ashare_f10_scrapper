name: Temporary Force Codex Trigger Surface Pre-Merge

on:
  push:
    branches:
      - feature/codex-trigger-surface-audit-v2
    paths:
      - .github/workflows/temporary-force-codex-trigger-surface-premerge.yml

permissions:
  contents: write
  pull-requests: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

concurrency:
  group: temporary-force-codex-trigger-surface-premerge
  cancel-in-progress: false

jobs:
  validate-and-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/codex-trigger-surface-audit-v2
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prove zero-model and zero-paid-probe boundary
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(
              Path('.devflow/codex-policy.yaml').read_text(encoding='utf-8')
          )
          assert policy['mode'] == 'disabled'
          assert policy['auto_recovery_dispatch'] is False
          assert policy['allow_github_actions_bot'] is False
          assert policy['retry_failed_codex_job'] is False
          assert policy['limits']['recovery_generations'] == 0
          assert policy['limits']['automatic_second_session'] == 0
          for path in (
              '.github/workflows/codex-task.yml',
              '.github/workflows/devflow-auto-recovery.yml',
              '.github/workflows/devflow-product-gate.yml',
              '.github/workflows/devflow-post-merge.yml',
              '.github/actions/codex-thin-worker/action.yml',
          ):
              text = Path(path).read_text(encoding='utf-8')
              assert 'openai/codex-action@' not in text
              assert 'private_responses_forwarder.py' not in text
          relay = Path(
              '.github/workflows/devflow-relay-health.yml'
          ).read_text(encoding='utf-8')
          assert 'default: configuration_only' in relay
          assert 'github.run_attempt == 1' in relay
          print('ZERO_MODEL_AND_PAID_PROBE_BOUNDARY=PASS')
          PY
          echo "CODEX_CALLS=0" >> "$GITHUB_STEP_SUMMARY"
          echo "RESPONSES_PAID_PROBES=0" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect open pull request heads and audit historical branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr list --state open --limit 200 --json headRefName \
            > /tmp/open-pr-heads.json
          python scripts/devflow/legacy_codex_branch_audit.py \
            --repo . \
            --open-pr-heads-json /tmp/open-pr-heads.json \
            --canonical-action .github/actions/codex-thin-worker/action.yml \
            --control-sha "$(git rev-parse HEAD)" \
            --output /tmp/legacy-codex-rerun-audit.json

      - name: Run forced Devflow and upgrade gates
        run: |
          set -euo pipefail
          mv \
            .github/workflows/temporary-force-codex-trigger-surface-premerge.yml \
            /tmp/temporary-force-codex-trigger-surface-premerge.yml
          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_state.py \
            --all-active \
            --output /tmp/state-result.json
          python scripts/devflow/validate_codex_entrypoints.py \
            --output /tmp/codex-entrypoints.json
          python scripts/devflow/validate_workflows.py
          python scripts/devflow/validate_docs.py \
            --output /tmp/docs-result.json
          python scripts/devflow/upgrade_compatibility.py \
            --output /tmp/upgrade-result.json
          ruff check scripts/devflow tests/test_devflow*.py
          pytest -q tests/test_devflow*.py

      - name: Run forced complete product regression
        run: |
          set -o pipefail
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py \
            scripts/run_resilient_command.py --output-format=concise
          pytest --cov=ashare_f10 --cov-report=term-missing

      - name: Run forced real 688521 E2E with monitoring
        env:
          ASHARE_F10_TIMEOUT: "60"
          ASHARE_F10_RETRIES: "3"
          ASHARE_F10_MAX_WORKERS: "4"
          ASHARE_F10_PAGE_WORKERS: "3"
        run: |
          set -euo pipefail
          python scripts/run_resilient_fetch.py 688521 \
            --output /tmp/e2e-output \
            --workers 4 \
            --force \
            --max-attempts 3 \
            --backoff-seconds 8 \
            --heartbeat-seconds 15 \
            --report /tmp/e2e-output/resilient-fetch-report.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import duckdb
          import pandas as pd
          from fastapi.testclient import TestClient

          root = Path('/tmp/e2e-output')
          report = json.loads(
              (root / 'resilient-fetch-report.json').read_text(
                  encoding='utf-8'
              )
          )
          assert report['status'] == 'PASS', report
          artifacts = json.loads(
              (root / 'artifacts.json').read_text(encoding='utf-8')
          )
          resolved = {
              key: Path(value).resolve()
              for key, value in artifacts.items()
              if key in {'json', 'excel', 'parquet', 'duckdb'}
          }
          assert set(resolved) == {'json', 'excel', 'parquet', 'duckdb'}
          for path in resolved.values():
              assert path.is_file() and path.stat().st_size > 0, path
          payload = json.loads(
              resolved['json'].read_text(encoding='utf-8')
          )
          assert (
              payload.get('metadata', {})
              .get('security', {})
              .get('security_code')
              == '688521'
          )
          facts = pd.read_parquet(resolved['parquet'])
          assert len(facts) > 100
          con = duckdb.connect(str(resolved['duckdb']), read_only=True)
          try:
              assert (
                  con.execute('select count(*) from facts').fetchone()[0]
                  == len(facts)
              )
          finally:
              con.close()
          data_dir = Path('/tmp/api-data')
          stock_dir = data_dir / '688521'
          stock_dir.mkdir(parents=True, exist_ok=True)
          (stock_dir / 'latest.json').write_text(
              json.dumps(
                  {
                      'job_id': 'codex-trigger-surface-premerge',
                      'output_dir': str(root),
                      'artifacts': {
                          key: str(value)
                          for key, value in resolved.items()
                      },
                  },
                  ensure_ascii=False,
              ),
              encoding='utf-8',
          )
          os.environ['ASHARE_F10_DATA_DIR'] = str(data_dir)
          from ashare_f10.api.app import app

          client = TestClient(app)
          assert client.get('/api/health').status_code == 200
          assert client.get('/api/stocks/688521/latest').status_code == 200
          assert (
              client.get(
                  '/api/stocks/688521/search',
                  params={'q': '资产', 'limit': 5},
              ).status_code
              == 200
          )
          for kind in ('json', 'xlsx', 'parquet', 'duckdb'):
              response = client.get(
                  f'/api/stocks/688521/download/{kind}'
              )
              assert response.status_code == 200 and response.content
          print('FORCED_REAL_E2E=PASS')
          PY

      - name: Record W04 result and remove one-shot executor
        env:
          PREMERGE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          task_id = 'codex-trigger-surface-audit-v2'
          task_dir = Path('docs/implementation') / task_id
          run_id = int(os.environ['PREMERGE_RUN_ID'])
          state_path = task_dir / 'task_state.yaml'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          state['state_revision'] += 1
          state['status'] = 'VERIFYING'
          state['security_status'] = 'PASS'
          state['current_stage'] = 'W05'
          state['last_completed_stage'] = 'W04'
          state['last_successful_step'] = (
              'forced_zero_model_premerge_validation_pass'
          )
          state['next_action'] = 'merge_pr52_then_run_exact_main_closeout'
          state['gate_results']['W04_PRE_MERGE'] = f'PASS:{run_id}'
          state['updated_at_utc'] = datetime.now(UTC).strftime(
              '%Y-%m-%dT%H:%M:%SZ'
          )
          state_path.write_text(
              json.dumps(state, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          active_path = Path('docs/implementation/ACTIVE_TASKS.yaml')
          active = json.loads(active_path.read_text(encoding='utf-8'))
          for item in active.get('tasks', []):
              if item.get('task_id') == task_id:
                  item.update({
                      'status': 'VERIFYING',
                      'pull_request': 52,
                      'current_stage': 'W05',
                  })
          active_path.write_text(
              json.dumps(active, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          (task_dir / 'W04_result.md').write_text(
              '# W04 结果：合并前零模型完整验证\n\n'
              '```yaml\n'
              'status: PASS\n'
              f'premerge_run: {run_id}\n'
              'legacy_branch_audit: PASS:88\n'
              'codex_entrypoint_scan: PASS\n'
              'devflow_and_upgrade: PASS\n'
              'full_product_regression: PASS\n'
              'real_e2e_688521: PASS\n'
              'codex_calls: 0\n'
              'responses_paid_probes: 0\n'
              '```\n',
              encoding='utf-8',
          )
          (task_dir / 'STATUS.md').write_text(
              '# STATUS：codex-trigger-surface-audit-v2\n\n'
              '```yaml\nstatus: VERIFYING\n'
              'execution_status: RUNNING\n'
              'acceptance_domain: generic\n'
              'acceptance_status: PENDING\n'
              'security_status: PASS\n'
              'current_stage: W05\n'
              'last_completed_stage: W04\n'
              'branch: feature/codex-trigger-surface-audit-v2\n'
              'pull_request: 52\n'
              'next_action: merge_pr52_then_run_exact_main_closeout\n'
              'post_merge: PENDING\n'
              'human_intervention_required: false\n'
              'codex_calls: 0\n'
              'responses_paid_probes: 0\n```\n',
              encoding='utf-8',
          )
          PY
          git add -u \
            .github/workflows/temporary-force-codex-trigger-surface-premerge.yml
          git add docs/implementation
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m \
            "Record zero-model Codex trigger surface pre-merge validation"
          git push origin HEAD:feature/codex-trigger-surface-audit-v2
