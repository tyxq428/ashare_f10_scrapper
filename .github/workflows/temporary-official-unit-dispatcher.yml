name: Temporary Official Unit Dispatcher

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/temporary-official-unit-dispatcher.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-official-unit-dispatcher.yml"
      - ".github/official-unit-dispatch-trigger.txt"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/official-validation-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Preserve explicit official statement units
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ashare_f10/validation/documents/pdf_parser.py")
          text = path.read_text(encoding="utf-8")
          old = '''                unit = _unit_info(text)
                if unit[1] == 1.0 and previous_unit[1] != 1.0 and page_section:
                    unit = previous_unit
                elif unit[1] != 1.0 or page_section:
                    previous_unit = unit
'''
          new = '''                unit = _unit_info(text)
                explicit_unit = bool(
                    re.search(r"单位[：:](?:亿元|万元|千元|元)", _compact(text))
                )
                if (
                    not explicit_unit
                    and unit[1] == 1.0
                    and previous_unit[1] != 1.0
                    and page_section
                ):
                    unit = previous_unit
                elif explicit_unit or unit[1] != 1.0 or page_section:
                    previous_unit = unit
'''
          if new not in text:
              if old not in text:
                  raise SystemExit("Expected unit propagation block was not found")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          ruff format src/ashare_f10/validation/documents/pdf_parser.py
          ruff check src/ashare_f10/validation tests/test_official_validation.py
          pytest -q tests/test_official_validation.py
      - name: Commit unit detection fix to validation branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/validation/documents/pdf_parser.py
          if git diff --cached --quiet; then
            echo "Unit detection fix already present."
          else
            git commit -m "Preserve explicit official statement units"
            git push origin HEAD:feature/official-validation-v1
          fi

