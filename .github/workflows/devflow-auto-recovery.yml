name: Devflow Auto Recovery

on:
  workflow_run:
    workflows:
      - Codex Task
      - Devflow Relay Health
      - Devflow Secret Audit
      - Devflow State Consistency
    types:
      - completed

permissions:
  actions: write
  contents: write

concurrency:
  group: devflow-auto-recovery-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  recover:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Collect bounded source metadata and safe artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
          SOURCE_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/devflow-source-artifacts
          gh api \
            "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/jobs?filter=latest&per_page=100" \
            > /tmp/devflow-source-jobs.json
          gh run download "$SOURCE_RUN" \
            --repo "${{ github.repository }}" \
            --dir /tmp/devflow-source-artifacts \
            >/dev/null 2>&1 || true
          if [[ -n "$SOURCE_BRANCH" ]]; then
            git fetch --no-tags origin \
              "+refs/heads/${SOURCE_BRANCH}:refs/remotes/origin/${SOURCE_BRANCH}" \
              >/dev/null 2>&1 || true
            git show \
              "refs/remotes/origin/${SOURCE_BRANCH}:.agent/current_task.yaml" \
              > /tmp/devflow-source-task.yaml 2>/dev/null || true
          fi

      - name: Classify failure before any notification
        id: decision
        shell: bash
        env:
          SOURCE_NAME: ${{ github.event.workflow_run.name }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          # Never synthesize a generic Codex scope for State Consistency.
          # Without an immutable descriptor the classifier stops before model dispatch.
          args=(
            --source-workflow "$SOURCE_NAME"
            --source-run-id "$SOURCE_RUN"
            --conclusion "$SOURCE_CONCLUSION"
            --run-attempt "$SOURCE_ATTEMPT"
            --jobs-json /tmp/devflow-source-jobs.json
            --artifact-root /tmp/devflow-source-artifacts
            --output /tmp/devflow-recovery-decision.json
          )
          if [[ -s /tmp/devflow-source-task.yaml ]]; then
            args+=(--task-file /tmp/devflow-source-task.yaml)
            echo "task_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "task_available=false" >> "$GITHUB_OUTPUT"
          fi
          python scripts/devflow/recovery_policy.py "${args[@]}"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          value = json.loads(
              Path('/tmp/devflow-recovery-decision.json').read_text()
          )
          for key in (
              'action',
              'reason_code',
              'fingerprint',
              'notification_type',
          ):
              raw = value.get(key)
              print(f"{key}={'' if raw is None else raw}")
          PY

      - name: Retry only failed jobs for verified infrastructure failures
        if: steps.decision.outputs.action == 'RETRY'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/rerun-failed-jobs"
          echo "AUTO_RECOVERY=INFRASTRUCTURE_FAILED_JOBS_RERUN" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "SOURCE_RUN=${SOURCE_RUN}" >> "$GITHUB_STEP_SUMMARY"
          echo "No task-control notification was emitted." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Create one bounded Codex recovery generation
        if: steps.decision.outputs.action == 'CODEX_REPAIR' && steps.decision.outputs.task_available == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
          REASON_CODE: ${{ steps.decision.outputs.reason_code }}
        run: |
          set -euo pipefail
          MAIN_SHA="$(git rev-parse origin/main)"
          REASON="$(python - <<'PY'
          import json
          from pathlib import Path
          print(
              json.loads(
                  Path('/tmp/devflow-recovery-decision.json').read_text()
              )['reason']
          )
          PY
          )"
          python scripts/devflow/recovery_task.py \
            --original-task /tmp/devflow-source-task.yaml \
            --source-run-id "$SOURCE_RUN" \
            --reason-code "$REASON_CODE" \
            --reason "$REASON" \
            --expected-base-sha "$MAIN_SHA" \
            --output /tmp/devflow-recovery-task.yaml
          RECOVERY_TASK_ID="$(python -c 'import json; print(json.load(open("/tmp/devflow-recovery-task.yaml"))["task_id"])')"
          RECOVERY_BRANCH="task/codex-${RECOVERY_TASK_ID}"
          git switch -c "$RECOVERY_BRANCH" origin/main
          mkdir -p .agent
          cp /tmp/devflow-recovery-task.yaml .agent/current_task.yaml
          git add .agent/current_task.yaml
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m \
            "Create bounded Codex recovery task ${RECOVERY_TASK_ID}"
          git push origin "HEAD:refs/heads/${RECOVERY_BRANCH}"
          gh api --method POST \
            "repos/${{ github.repository }}/actions/workflows/codex-task.yml/dispatches" \
            -f ref=main \
            -f "inputs[task_branch]=${RECOVERY_BRANCH}"
          echo "AUTO_RECOVERY=CODEX_REPAIR_DISPATCHED" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "RECOVERY_TASK=${RECOVERY_TASK_ID}" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "No task-control notification was emitted." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Escalate only after automatic policy requires human attention
        if: >-
          steps.decision.outputs.action == 'HUMAN_REQUIRED' ||
          steps.decision.outputs.action == 'SECURITY_BLOCKED' ||
          steps.decision.outputs.action == 'INTERRUPTED' ||
          (steps.decision.outputs.action == 'CODEX_REPAIR' && steps.decision.outputs.task_available != 'true')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          value = json.loads(
              Path('/tmp/devflow-recovery-decision.json').read_text()
          )
          if value['action'] == 'CODEX_REPAIR':
              value.update({
                  'action': 'INTERRUPTED',
                  'notification_type': 'INTERRUPTED',
                  'reason_code': 'RECOVERY_TASK_CONTEXT_UNAVAILABLE',
                  'reason': (
                      'A bounded repair was eligible but the immutable '
                      'task descriptor was unavailable.'
                  ),
                  'minimum_action': (
                      'Review the failure bundle and create a new trusted '
                      'descriptor with the required safe scope.'
                  ),
              })
          payload = {
              'event_type': 'devflow_notify',
              'client_payload': value,
          }
          Path('/tmp/devflow-notify-payload.json').write_text(
              json.dumps(payload)
          )
          PY
          gh api --method POST \
            "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-notify-payload.json
          echo "AUTO_RECOVERY=ESCALATED_AFTER_POLICY" \
            >> "$GITHUB_STEP_SUMMARY"
