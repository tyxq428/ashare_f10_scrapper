name: Devflow Auto Recovery

on:
  workflow_run:
    workflows:
      - Devflow Relay Health
      - Devflow Secret Audit
      - Devflow State Consistency
      - Devflow Product Gate
      - Devflow Post Merge
    types:
      - completed

permissions:
  actions: write
  contents: write

concurrency:
  group: devflow-auto-recovery-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  recover:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Collect bounded source metadata and safe artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/devflow-source-artifacts
          gh api \
            "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/jobs?filter=latest&per_page=100" \
            > /tmp/devflow-source-jobs.json
          gh run download "$SOURCE_RUN" --repo "${{ github.repository }}" \
            --dir /tmp/devflow-source-artifacts >/dev/null 2>&1 || true

      - name: Classify before retry or notification
        id: decision
        shell: bash
        env:
          SOURCE_NAME: ${{ github.event.workflow_run.name }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          python scripts/devflow/recovery_policy.py \
            --source-workflow "$SOURCE_NAME" \
            --source-run-id "$SOURCE_RUN" \
            --conclusion "$SOURCE_CONCLUSION" \
            --run-attempt "$SOURCE_ATTEMPT" \
            --jobs-json /tmp/devflow-source-jobs.json \
            --artifact-root /tmp/devflow-source-artifacts \
            --output /tmp/devflow-recovery-decision.json
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          value = json.loads(
              Path('/tmp/devflow-recovery-decision.json').read_text(
                  encoding='utf-8'
              )
          )
          for key in ('action', 'reason_code', 'fingerprint', 'notification_type'):
              raw = value.get(key)
              print(f"{key}={'' if raw is None else raw}")
          PY

      - name: Retry only verified pre-model infrastructure failures
        if: steps.decision.outputs.action == 'RETRY'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN}/rerun-failed-jobs"
          echo "AUTO_RECOVERY=INFRASTRUCTURE_ONLY" >> "$GITHUB_STEP_SUMMARY"
          echo "No Codex task was created, observed or retried." \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Escalate terminal, security and Web-repair decisions
        if: >-
          steps.decision.outputs.action == 'HUMAN_REQUIRED' ||
          steps.decision.outputs.action == 'SECURITY_BLOCKED' ||
          steps.decision.outputs.action == 'INTERRUPTED'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          value = json.loads(
              Path('/tmp/devflow-recovery-decision.json').read_text(
                  encoding='utf-8'
              )
          )
          payload = {
              'event_type': 'devflow_notify',
              'client_payload': value,
          }
          Path('/tmp/devflow-notify-payload.json').write_text(
              json.dumps(payload), encoding='utf-8'
          )
          PY
          gh api --method POST \
            "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-notify-payload.json
          echo "AUTO_RECOVERY=ESCALATED_AFTER_ZERO_MODEL_POLICY" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Prove automatic Codex paths are absent
        run: |
          set -euo pipefail
          ! grep -Fq 'codex-task.yml/dispatches' \
            .github/workflows/devflow-auto-recovery.yml
          ! grep -Fq 'RETRY_CODEX' \
            .github/workflows/devflow-auto-recovery.yml
          ! grep -Fq 'recovery_task.py' \
            .github/workflows/devflow-auto-recovery.yml
          echo "AUTOMATIC_CODEX_PATHS=0" >> "$GITHUB_STEP_SUMMARY"
