name: Temporary Research Pack Main Sync

# Triggered after PR #20 merged and PR #21 was retargeted to main.
on:
  push:
    branches:
      - feature/f10-research-mapping-evidence-pack-v1
    paths:
      - ".github/workflows/temporary-research-pack-main-sync.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/f10-research-mapping-evidence-pack-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Merge latest main without discarding feature contracts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff --no-commit -X ours origin/main
          python scripts/prepare_research_pack_main_sync.py
      - name: Validate merged result
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-pack.js
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest -q
      - name: Commit and publish verified main sync
        run: |
          git rm .github/workflows/temporary-research-pack-main-sync.yml
          git rm scripts/prepare_research_pack_main_sync.py
          git add .
          git commit -m "Merge latest main into Research Pack implementation"
          git push origin HEAD:feature/f10-research-mapping-evidence-pack-v1
