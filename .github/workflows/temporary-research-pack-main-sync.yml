name: Temporary Research Pack Main Sync

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: temporary-research-pack-main-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'feature/f10-research-mapping-evidence-pack-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/f10-research-mapping-evidence-pack-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply semantic main-sync patch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff --no-commit -X ours origin/main || true
          python scripts/prepare_research_pack_main_sync.py
      - name: Validate synchronized working tree
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-pack.js
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest -q
      - name: Publish verified non-workflow code changes
        run: |
          set -euo pipefail
          git add \
            src/ashare_f10/api/app_with_raw_pack.py \
            src/ashare_f10/cross_validation/runner.py \
            src/ashare_f10/cross_validation/comparator.py \
            src/ashare_f10/cross_validation/models.py \
            src/ashare_f10/web/index.html \
            tests/test_comparison_policy.py
          if git diff --cached --quiet; then
            echo "No semantic code changes to publish"
          else
            git commit -m "Apply verified semantic main sync for Research Pack"
            git push origin HEAD:feature/f10-research-mapping-evidence-pack-v1
          fi
