name: Temporary Prune Conflicting Devflow Orchestration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-prune-conflicting-devflow-orchestration.yml

permissions:
  contents: write
  actions: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Cancel conflicting runs best-effort
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for workflow in \
            "Temporary After Codex Merge PR-B" \
            "Temporary Merge Devflow PR-B" \
            "Temporary Codex Recovery Controller" \
            "Temporary Dispatch Codex Control" \
            "Temporary Dispatch Codex Control Secure"; do
            gh run list --repo "${{ github.repository }}" --workflow "$workflow" --limit 20 \
              --json databaseId,status \
              --jq '.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending") | .databaseId' \
              2>/dev/null > /tmp/cancel.txt || true
            while read -r run_id; do
              [[ -z "$run_id" ]] && continue
              gh run cancel "$run_id" --repo "${{ github.repository }}" || true
            done < /tmp/cancel.txt
          done
      - name: Remove conflicting and invalid orchestration files
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          rm -f .github/workflows/temporary-after-codex-merge-pr-b.yml
          rm -f .github/workflows/temporary-merge-devflow-pr-b.yml
          rm -f .github/workflows/temporary-codex-recovery-controller.yml
          rm -f .github/workflows/temporary-dispatch-codex-control.yml
          rm -f .github/workflows/temporary-dispatch-codex-control-secure.yml
          rm -f .github/workflows/temporary-replace-codex-dispatcher.yml
          rm -f .github/workflows/temporary-cancel-obsolete-dispatcher-v2.yml
          rm -f .github/workflows/temporary-prune-conflicting-devflow-orchestration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Prune conflicting devflow orchestration"
            git push origin HEAD:main
          fi
