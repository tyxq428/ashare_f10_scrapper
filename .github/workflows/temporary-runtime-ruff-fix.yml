name: Temporary Runtime Ruff Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-runtime-ruff-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply and verify import sorting
        run: |
          ruff check --select I --fix src/ashare_f10/api/visual_jobs_runtime.py
          ruff check src/ashare_f10/api/visual_jobs_runtime.py tests/test_visual_artifact_manifest.py
          pytest -q tests/test_visual_artifact_manifest.py
          git diff --check
      - name: Commit exact fix
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/api/visual_jobs_runtime.py
          git commit -m "Fix visual runtime import ordering"
          git push origin HEAD:${{ github.head_ref }}
