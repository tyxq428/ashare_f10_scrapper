name: Temporary Patch Codex Result Handoff

on:
  push:
    branches:
      - fix/codex-bot-authorization-and-output
    paths:
      - .github/workflows/temporary-patch-codex-result-handoff.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: fix/codex-bot-authorization-and-output
          fetch-depth: 0
      - name: Replace absolute output-file with structured action-output handoff
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/codex-task.yml')
          text = path.read_text(encoding='utf-8')
          old = '''          prompt-file: ${{ needs.read-task.outputs.task_file }}
          output-file: /tmp/codex-result.json

      - name: Stop private forwarder
'''
          new = '''          prompt-file: ${{ needs.read-task.outputs.task_file }}

      - name: Persist structured Codex final message outside the repository
        id: result
        if: steps.codex.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get('CODEX_FINAL_MESSAGE', '')
          if not raw.strip():
              raise SystemExit('CODEX_FINAL_MESSAGE_MISSING')
          value = json.loads(raw)
          Path('/tmp/codex-result.json').write_text(
              json.dumps(value, ensure_ascii=False, indent=2) + '\\n',
              encoding='utf-8',
          )
          print('CODEX_STRUCTURED_RESULT=READY')
          PY

      - name: Stop private forwarder
'''
          if old not in text:
              raise SystemExit('target Codex output block not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              "if: steps.codex.outcome == 'success'\n        continue-on-error: true\n        run: |\n          mkdir -p /tmp/codex-artifact\n          python scripts/devflow/verify_changed_paths.py",
              "if: steps.codex.outcome == 'success' && steps.result.outcome == 'success'\n        continue-on-error: true\n        run: |\n          mkdir -p /tmp/codex-artifact\n          python scripts/devflow/verify_changed_paths.py",
              1,
          )
          text = text.replace(
              "if: steps.codex.outcome == 'success'\n        continue-on-error: true\n        run: |\n          mkdir -p /tmp/codex-artifact\n          python scripts/devflow/run_gate_profile.py",
              "if: steps.codex.outcome == 'success' && steps.result.outcome == 'success'\n        continue-on-error: true\n        run: |\n          mkdir -p /tmp/codex-artifact\n          python scripts/devflow/run_gate_profile.py",
              1,
          )
          enforce = '          test "${{ steps.codex.outcome }}" = "success"\n'
          if enforce not in text:
              raise SystemExit('Codex enforcement marker not found')
          text = text.replace(
              enforce,
              enforce + '          test "${{ steps.result.outcome }}" = "success"\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit deterministic patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/codex-task.yml
          git commit -m "Capture structured Codex output outside the workspace"
          git push origin HEAD:fix/codex-bot-authorization-and-output
