name: Temporary Patch Product Gate Identity

on:
  push:
    branches:
      - fix/product-gate-merge-identity
    paths:
      - .github/workflows/temporary-patch-product-gate-identity.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: fix/product-gate-merge-identity
          fetch-depth: 0
      - name: Configure Bot identity and centralize merge-boundary failure
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/devflow-product-gate.yml')
          text = path.read_text(encoding='utf-8')
          marker = '''        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          CURRENT_MAIN="$(git rev-parse origin/main)"
'''
          replacement = '''        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          CURRENT_MAIN="$(git rev-parse origin/main)"
'''
          if marker not in text:
              raise SystemExit('merge identity insertion marker not found')
          text = text.replace(marker, replacement, 1)

          old = '''      - name: Notify only when automatic merge is genuinely blocked
        if: >-
          steps.full_gate.outcome == 'success' &&
          steps.task.outputs.auto_merge == 'true' &&
          steps.merge.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          payload = {
              'event_type': 'devflow_notify',
              'client_payload': {
                  'action': 'HUMAN_REQUIRED',
                  'notification_type': 'HUMAN_REQUIRED',
                  'reason_code': 'AUTO_MERGE_BLOCKED',
                  'reason': 'The low-risk candidate passed all gates but could not be safely merged because of a conflict, permission or branch-protection boundary.',
                  'minimum_action': 'Review the merge boundary; no additional code repair is requested.',
                  'fingerprint': 'auto-merge-blocked-${{ steps.task.outputs.task_id }}',
                  'source_workflow': 'Devflow Product Gate',
                  'source_run_id': int('${{ github.run_id }}'),
                  'failure_steps': ['Reconcile latest main, re-run gate if needed, and merge low-risk candidate'],
              },
          }
          Path('/tmp/devflow-notify.json').write_text(json.dumps(payload))
          PY
          gh api --method POST "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-notify.json
'''
          new = '''      - name: Fail closed when automatic merge boundary is blocked
        if: >-
          steps.full_gate.outcome == 'success' &&
          steps.task.outputs.auto_merge == 'true' &&
          steps.merge.outcome != 'success'
        run: |
          echo "AUTO_MERGE_BOUNDARY=BLOCKED"
          exit 1
'''
          if old not in text:
              raise SystemExit('direct merge notification block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit deterministic patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/devflow-product-gate.yml
          git commit -m "Configure Product Gate Bot identity and centralized merge recovery"
          git push origin HEAD:fix/product-gate-merge-identity
