name: Devflow Product Gate

on:
  repository_dispatch:
    types:
      - devflow_product_gate

permissions:
  contents: write
  actions: write

concurrency:
  group: devflow-product-gate-${{ github.event.client_payload.task_id }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  gate-and-continue:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Load and validate immutable task descriptor
        id: task
        shell: bash
        env:
          TASK_ID: ${{ github.event.client_payload.task_id }}
          TASK_BRANCH: ${{ github.event.client_payload.task_branch }}
          PUBLISH_BRANCH: ${{ github.event.client_payload.publish_branch }}
        run: |
          set -euo pipefail
          [[ "$TASK_BRANCH" == task/codex-* ]]
          [[ "$PUBLISH_BRANCH" == codex/* ]]
          git fetch --no-tags origin \
            "+refs/heads/${TASK_BRANCH}:refs/remotes/origin/${TASK_BRANCH}" \
            "+refs/heads/${PUBLISH_BRANCH}:refs/remotes/origin/${PUBLISH_BRANCH}"
          git show "refs/remotes/origin/${TASK_BRANCH}:.agent/current_task.yaml" \
            > /tmp/devflow-task.yaml
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, 'scripts/devflow')
          from task_descriptor import TaskDescriptor

          raw = json.loads(Path('/tmp/devflow-task.yaml').read_text(encoding='utf-8'))
          task = TaskDescriptor.from_mapping(raw)
          if task.task_id != os.environ['TASK_ID']:
              raise SystemExit('task_id payload mismatch')
          if task.publish_branch != os.environ['PUBLISH_BRANCH']:
              raise SystemExit('publish_branch payload mismatch')
          values = {
              'task_id': task.task_id,
              'publish_branch': task.publish_branch,
              'gate_profile': task.gate_profile,
              'full_gate_profile': task.full_gate_profile,
              'post_merge_profile': task.post_merge_profile,
              'expected_base_sha': task.expected_base_sha,
              'auto_merge': str(task.auto_merge).lower(),
              'notify_completion': str(task.notify_completion).lower(),
              'risk_class': task.risk_class,
          }
          for key, value in values.items():
              print(f'{key}={value}')
          PY

      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check out candidate and enforce merge-base changed-path scope
        id: scope
        continue-on-error: true
        shell: bash
        env:
          PUBLISH_BRANCH: ${{ steps.task.outputs.publish_branch }}
          EXPECTED_BASE_SHA: ${{ steps.task.outputs.expected_base_sha }}
        run: |
          set -euo pipefail
          git switch -C devflow-product-candidate \
            "refs/remotes/origin/${PUBLISH_BRANCH}"
          git merge-base --is-ancestor "$EXPECTED_BASE_SHA" HEAD
          MERGE_BASE="$(git merge-base origin/main HEAD)"
          [[ "$MERGE_BASE" =~ ^[0-9a-f]{40}$ ]]
          echo "PRODUCT_SCOPE_MERGE_BASE=${MERGE_BASE}" >> "$GITHUB_STEP_SUMMARY"
          python scripts/devflow/verify_changed_paths.py \
            --task-file /tmp/devflow-task.yaml \
            --base "$MERGE_BASE" \
            --head HEAD \
            --output /tmp/product-scope-result.json

      - name: Upload bounded changed-path scope diagnostics
        if: steps.scope.outcome != 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: product-scope-failure-${{ github.run_id }}
          path: /tmp/product-scope-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Fail closed on changed-path scope violation
        if: steps.scope.outcome != 'success'
        run: |
          echo "PRODUCT_SCOPE=SECURITY_BLOCKED"
          exit 1

      - name: Run full product gate
        id: full_gate
        continue-on-error: true
        run: |
          python scripts/devflow/run_gate_profile.py \
            "${{ steps.task.outputs.full_gate_profile }}" \
            --output /tmp/product-gate-result.json

      - name: Stop and route failed full gate to ChatGPT Web
        if: steps.full_gate.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              'event_type': 'devflow_notify',
              'client_payload': {
                  'action': 'INTERRUPTED',
                  'notification_type': 'INTERRUPTED',
                  'reason_code': 'PRODUCT_GATE_WEB_REPAIR_REQUIRED',
                  'reason': (
                      'The deterministic full product gate failed. Automatic '
                      'Codex recovery and failed-job model reruns are forbidden.'
                  ),
                  'minimum_action': (
                      'Inspect the bounded gate result in ChatGPT Web, identify '
                      'the real failing files, and repair deterministically.'
                  ),
                  'fingerprint': (
                      'product-gate-web-repair-'
                      '${{ steps.task.outputs.task_id }}'
                  ),
                  'source_workflow': 'Devflow Product Gate',
                  'source_run_id': int('${{ github.run_id }}'),
                  'failure_steps': ['Run full product gate'],
              },
          }
          Path('/tmp/devflow-notify.json').write_text(
              json.dumps(payload), encoding='utf-8'
          )
          PY
          gh api --method POST \
            "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-notify.json
          echo "PRODUCT_GATE=WEB_REPAIR_REQUIRED" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Notify when a task is not approved for automatic merge
        if: >-
          steps.full_gate.outcome == 'success' &&
          steps.task.outputs.auto_merge != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              'event_type': 'devflow_notify',
              'client_payload': {
                  'action': 'HUMAN_REQUIRED',
                  'notification_type': 'HUMAN_REQUIRED',
                  'reason_code': 'AUTO_MERGE_NOT_APPROVED',
                  'reason': (
                      'All automatic gates passed, but this task descriptor '
                      'does not authorize automatic merge.'
                  ),
                  'minimum_action': (
                      'Review the candidate branch and approve or merge it.'
                  ),
                  'fingerprint': (
                      'auto-merge-not-approved-'
                      '${{ steps.task.outputs.task_id }}'
                  ),
                  'source_workflow': 'Devflow Product Gate',
                  'source_run_id': int('${{ github.run_id }}'),
                  'failure_steps': [],
              },
          }
          Path('/tmp/devflow-notify.json').write_text(
              json.dumps(payload), encoding='utf-8'
          )
          PY
          gh api --method POST \
            "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-notify.json

      - name: Reconcile latest main, re-run gate if needed, and merge low-risk candidate
        id: merge
        if: >-
          steps.full_gate.outcome == 'success' &&
          steps.task.outputs.auto_merge == 'true' &&
          steps.task.outputs.risk_class == 'low'
        continue-on-error: true
        shell: bash
        env:
          PUBLISH_BRANCH: ${{ steps.task.outputs.publish_branch }}
          EXPECTED_BASE_SHA: ${{ steps.task.outputs.expected_base_sha }}
          FULL_GATE_PROFILE: ${{ steps.task.outputs.full_gate_profile }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          CURRENT_MAIN="$(git rev-parse origin/main)"
          git switch -C devflow-product-candidate \
            "refs/remotes/origin/${PUBLISH_BRANCH}"
          if [[ "$CURRENT_MAIN" != "$EXPECTED_BASE_SHA" ]]; then
            git rebase origin/main
            python scripts/devflow/verify_changed_paths.py \
              --task-file /tmp/devflow-task.yaml \
              --base origin/main \
              --head HEAD \
              --output /tmp/rebased-product-scope-result.json
            python scripts/devflow/run_gate_profile.py "$FULL_GATE_PROFILE" \
              --output /tmp/rebased-product-gate-result.json
          fi
          git switch -C main origin/main
          git merge --no-ff --no-edit devflow-product-candidate
          MERGE_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "AUTO_MERGED_SHA=${MERGE_SHA}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail closed when automatic merge boundary is blocked
        if: >-
          steps.full_gate.outcome == 'success' &&
          steps.task.outputs.auto_merge == 'true' &&
          steps.merge.outcome != 'success'
        run: |
          echo "AUTO_MERGE_BOUNDARY=BLOCKED"
          exit 1

      - name: Explicitly dispatch independent exact-main post-merge verification
        if: steps.merge.outcome == 'success' && steps.merge.outputs.merge_sha != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              'event_type': 'devflow_post_merge',
              'client_payload': {
                  'task_id': '${{ steps.task.outputs.task_id }}',
                  'task_branch': '${{ github.event.client_payload.task_branch }}',
                  'publish_branch': '${{ steps.task.outputs.publish_branch }}',
                  'merge_sha': '${{ steps.merge.outputs.merge_sha }}',
                  'post_merge_profile': (
                      '${{ steps.task.outputs.post_merge_profile }}'
                  ),
                  'product_gate_run_id': int('${{ github.run_id }}'),
                  'notify_completion': (
                      '${{ steps.task.outputs.notify_completion }}'
                  ),
              },
          }
          Path('/tmp/devflow-post-merge.json').write_text(
              json.dumps(payload), encoding='utf-8'
          )
          PY
          gh api --method POST \
            "repos/${{ github.repository }}/dispatches" \
            --input /tmp/devflow-post-merge.json
