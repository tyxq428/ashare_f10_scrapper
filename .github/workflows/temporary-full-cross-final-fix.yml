name: Temporary Full Cross Final Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/full-cross-validation-dispatch-trigger.txt"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  fix-test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/full-cross-validation-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Add cash-flow supplement extraction and strict statement matching
        run: |
          python - <<'PY'
          from pathlib import Path

          parser_path = Path("src/ashare_f10/validation/documents/pdf_parser.py")
          text = parser_path.read_text(encoding="utf-8")
          if '("cash_flow", "FINANCE_EXPENSE")' not in text:
              marker = '''            if identity == ("income_statement", "OTHER_COMPRE_INCOME"):
                              aliases = tuple(dict.fromkeys(("其他综合收益的税后净额", *aliases)))
              '''
              replacement = marker + '''            if identity == ("cash_flow", "FINANCE_EXPENSE"):
                              aliases = tuple(
                                  dict.fromkeys(("财务费用（收益以“－”号填列）", *aliases))
                              )
              '''
              if marker not in text:
                  raise SystemExit("Parser alias marker was not found")
              text = text.replace(marker, replacement, 1)
          if "is_cashflow_supplement" not in text:
              old = '''                    allowed_text = target.statement_type == "summary" or (
                                  page_section == target.statement_type and page_scope != "parent"
                              )
              '''
              new = '''                    is_cashflow_supplement = (
                                  target.statement_type == "cash_flow"
                                  and target.field_key == "FINANCE_EXPENSE"
                                  and any(_compact(alias) in compact_text for alias in target.aliases)
                              )
                              allowed_text = (
                                  target.statement_type == "summary"
                                  or (page_section == target.statement_type and page_scope != "parent")
                                  or is_cashflow_supplement
                              )
              '''
              if old not in text:
                  raise SystemExit("Parser allowed-text marker was not found")
              text = text.replace(old, new, 1)
          if "normalized_line = _normalized_label(line)" not in text:
              old = '''            alias = next((name for name in target.aliases if _label_matches(line, name)), None)
              '''
              new = '''            normalized_line = _normalized_label(line)
                          alias = next(
                              (
                                  name
                                  for name in target.aliases
                                  if _label_matches(line, name)
                                  or (
                                      target.statement_type == "cash_flow"
                                      and target.field_key == "FINANCE_EXPENSE"
                                      and normalized_line.startswith(_normalized_label(name))
                                  )
                              ),
                              None,
                          )
              '''
              if old not in text:
                  raise SystemExit("Parser text alias marker was not found")
              text = text.replace(old, new, 1)
          parser_path.write_text(text, encoding="utf-8")

          comparator_path = Path("src/ashare_f10/cross_validation/comparator.py")
          text = comparator_path.read_text(encoding="utf-8")
          if "primary_statement_families" not in text:
              marker = "        same_period_key = [\n"
              guard = '''        primary_statement_families = {
                          "RPT_F10_FINANCE_GBALANCE",
                          "RPT_F10_FINANCE_GINCOME",
                          "RPT_F10_FINANCE_GCASHFLOW",
                      }
                      family = str(eastmoney.get("family") or "")
                      if family in primary_statement_families and entry.validation_mode == "OFFICIAL_DIRECT":
                          return None, None

              '''
              if marker not in text:
                  raise SystemExit("Comparator fallback marker was not found")
              text = text.replace(marker, guard + marker, 1)
          comparator_path.write_text(text, encoding="utf-8")

          test_path = Path("tests/test_cross_validation_statement_identity.py")
          text = test_path.read_text(encoding="utf-8")
          if "CrossSourceComparator" not in text:
              text = text.replace(
                  "from ashare_f10.cross_validation.adapters import load_eastmoney_facts\n",
                  "from ashare_f10.cross_validation.adapters import load_eastmoney_facts\n"
                  "from ashare_f10.cross_validation.comparator import CrossSourceComparator\n"
                  "from ashare_f10.cross_validation.models import RegistryEntry\n",
                  1,
              )
          if "cashflow = PdfStatementParser" not in text:
              text = text.replace(
                  '    assert "其他综合收益的税后净额" in income.aliases\n',
                  '    assert "其他综合收益的税后净额" in income.aliases\n'
                  '    cashflow = PdfStatementParser(\n'
                  '        (\n'
                  '            TargetField(\n'
                  '                "FINANCE_EXPENSE", "财务费用", "cash_flow",\n'
                  '                ("财务费用",), ("FINANCE_EXPENSE",),\n'
                  '                ("RPT_F10_FINANCE_GCASHFLOW",),\n'
                  '            ),\n'
                  '        )\n'
                  '    ).targets[0]\n'
                  '    assert "财务费用（收益以“－”号填列）" in cashflow.aliases\n',
                  1,
              )
          if "test_primary_statement_does_not_fallback_across_statement_types" not in text:
              text += '''\n\ndef test_primary_statement_does_not_fallback_across_statement_types() -> None:\n    official_index = {\n        ("688521", "2025-12-31", "FY", "income_statement", "FINANCE_EXPENSE"): [\n            {\n                "security_code": "688521",\n                "report_date": "2025-12-31",\n                "period_type": "FY",\n                "statement_type": "income_statement",\n                "scope": "consolidated",\n                "field_key": "FINANCE_EXPENSE",\n                "value_num": 52_927_208.41,\n            }\n        ]\n    }\n    eastmoney = {\n        "security_code": "688521",\n        "report_date": "2025-12-31",\n        "period_type": "FY",\n        "family": "RPT_F10_FINANCE_GCASHFLOW",\n        "field_key": "FINANCE_EXPENSE",\n    }\n    entry = RegistryEntry(\n        theme="财务报表与指标", family="RPT_F10_FINANCE_GCASHFLOW",\n        dataset="现金流量表", field_key="FINANCE_EXPENSE",\n        field_name_cn="财务费用", validation_mode="OFFICIAL_DIRECT",\n        statement_type="cash_flow", scope="consolidated",\n    )\n    row, diagnostic = CrossSourceComparator._find_official(official_index, eastmoney, entry)\n    assert row is None\n    assert diagnostic is None\n'''
          test_path.write_text(text, encoding="utf-8")
          PY
      - name: Format, lint and test
        run: |
          set -euo pipefail
          ruff format src/ashare_f10/validation/documents/pdf_parser.py src/ashare_f10/cross_validation/comparator.py tests/test_cross_validation_statement_identity.py
          ruff check --fix --unsafe-fixes src/ashare_f10/validation/documents/pdf_parser.py src/ashare_f10/cross_validation/comparator.py tests/test_cross_validation_statement_identity.py
          ruff check src tests scripts/verify_full_cross_validation.py
          python -m compileall -q src
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/cross-validation.js
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Commit final semantic fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/validation/documents/pdf_parser.py
          git add src/ashare_f10/cross_validation/comparator.py
          git add tests/test_cross_validation_statement_identity.py
          if git diff --cached --quiet; then
            echo "Final semantic fixes already present."
          else
            git commit -m "Validate cash-flow supplements without cross-statement fallback"
            git push origin HEAD:feature/full-cross-validation-v1
          fi
      - name: Real 688521 one-input dual-source E2E
        run: |
          set -o pipefail
          ashare-f10 run-and-validate 688521 --output full-cross-validation-run --workers 8 --max-periods 2 2>&1 | tee full-cross-validation.log
          python scripts/verify_full_cross_validation.py full-cross-validation-run
      - name: Upload final full cross-validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-cross-validation-688521-${{ github.run_id }}
          path: |
            full-cross-validation-run/
            full-cross-validation.log
          if-no-files-found: warn
          retention-days: 30
