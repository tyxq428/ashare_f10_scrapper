name: Temporary Full Cross Final Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/full-cross-validation-dispatch-trigger.txt"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  fix-test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/full-cross-validation-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Apply final deterministic finance-expense rules
        run: |
          python - <<'PY'
          from pathlib import Path

          parser_path = Path("src/ashare_f10/validation/documents/pdf_parser.py")
          text = parser_path.read_text(encoding="utf-8")
          old = "and any(_compact(alias) in compact_text for alias in target.aliases)"
          new = 'and _compact("财务费用（收益以“－”号填列）") in compact_text'
          if old not in text and new not in text:
              raise SystemExit("Cash-flow supplement page detector was not found")
          text = text.replace(old, new, 1)
          old = "and normalized_line.startswith(_normalized_label(name))"
          new = (
              'and name == "财务费用（收益以“－”号填列）"\n'
              "                                and normalized_line.startswith(_normalized_label(name))"
          )
          if old not in text and 'name == "财务费用（收益以“－”号填列）"' not in text:
              raise SystemExit("Cash-flow supplement row detector was not found")
          text = text.replace(old, new, 1)
          parser_path.write_text(text, encoding="utf-8")

          comparator_path = Path("src/ashare_f10/cross_validation/comparator.py")
          text = comparator_path.read_text(encoding="utf-8")
          if "income_candidates" not in text:
              marker = "        if same_period_key:\n"
              if marker not in text:
                  raise SystemExit("Same-period official fallback block was not found")
              preference = (
                  "        if (\n"
                  '            field_key == "FINANCE_EXPENSE"\n'
                  '            and entry.validation_mode == "OFFICIAL_DERIVED"\n'
                  "            and same_period_key\n"
                  "        ):\n"
                  "            income_candidates = [\n"
                  "                row\n"
                  "                for row in same_period_key\n"
                  '                if str(row.get("statement_type") or "") == "income_statement"\n'
                  "            ]\n"
                  "            if income_candidates:\n"
                  "                preferred = [\n"
                  "                    row\n"
                  "                    for row in income_candidates\n"
                  '                    if str(row.get("scope") or "") != "parent"\n'
                  "                ]\n"
                  "                return (preferred or income_candidates)[0], None\n\n"
              )
              text = text.replace(marker, preference + marker, 1)
          comparator_path.write_text(text, encoding="utf-8")

          test_path = Path("tests/test_cross_validation_finance_expense.py")
          test_path.write_text(
              '''from __future__ import annotations

          from ashare_f10.cross_validation.comparator import CrossSourceComparator
          from ashare_f10.cross_validation.models import RegistryEntry
          from ashare_f10.validation.documents.pdf_parser import PdfStatementParser
          from ashare_f10.validation.models import TargetField


          def test_cashflow_finance_expense_has_exact_supplement_alias() -> None:
              target = TargetField(
                  "FINANCE_EXPENSE",
                  "财务费用",
                  "cash_flow",
                  ("财务费用",),
                  ("FINANCE_EXPENSE",),
                  ("RPT_F10_FINANCE_GCASHFLOW",),
              )
              parsed = PdfStatementParser((target,)).targets[0]
              assert parsed.aliases[0] == "财务费用（收益以“－”号填列）"


          def test_derived_finance_expense_prefers_income_statement() -> None:
              official_index = {
                  ("688521", "2025-12-31", "FY", "cash_flow", "FINANCE_EXPENSE"): [
                      {
                          "statement_type": "cash_flow",
                          "scope": "consolidated",
                          "value_num": 50_084_519.03,
                      }
                  ],
                  ("688521", "2025-12-31", "FY", "income_statement", "FINANCE_EXPENSE"): [
                      {
                          "statement_type": "income_statement",
                          "scope": "consolidated",
                          "value_num": 52_927_208.41,
                      }
                  ],
              }
              eastmoney = {
                  "security_code": "688521",
                  "report_date": "2025-12-31",
                  "period_type": "FY",
                  "family": "RPT_F10_FINANCE_GRATIO",
                  "field_key": "FINANCE_EXPENSE",
              }
              entry = RegistryEntry(
                  theme="财务报表与指标",
                  family="RPT_F10_FINANCE_GRATIO",
                  dataset="财务比率",
                  field_key="FINANCE_EXPENSE",
                  field_name_cn="财务费用",
                  validation_mode="OFFICIAL_DERIVED",
                  statement_type="financial_ratio",
                  scope="consolidated",
              )
              row, diagnostic = CrossSourceComparator._find_official(
                  official_index, eastmoney, entry
              )
              assert diagnostic is None
              assert row is not None
              assert row["statement_type"] == "income_statement"
              assert row["value_num"] == 52_927_208.41
          '''.replace("\n          ", "\n").lstrip(),
              encoding="utf-8",
          )
          PY
      - name: Format, lint and test with diagnostics
        run: |
          set -o pipefail
          {
            ruff format src/ashare_f10/validation/documents/pdf_parser.py src/ashare_f10/cross_validation/comparator.py tests/test_cross_validation_finance_expense.py
            ruff check --fix --unsafe-fixes src/ashare_f10/validation/documents/pdf_parser.py src/ashare_f10/cross_validation/comparator.py tests/test_cross_validation_finance_expense.py
            ruff check src tests scripts/verify_full_cross_validation.py
            python -m compileall -q src
            node --check src/ashare_f10/web/app.js
            node --check src/ashare_f10/web/cross-validation.js
            pytest --cov=ashare_f10 --cov-report=term-missing
          } 2>&1 | tee final-fix-diagnostics.log
      - name: Commit final deterministic rules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/validation/documents/pdf_parser.py
          git add src/ashare_f10/cross_validation/comparator.py
          git add tests/test_cross_validation_finance_expense.py
          if git diff --cached --quiet; then
            echo "Final deterministic rules already present."
          else
            git commit -m "Resolve finance expense official-source ambiguity"
            git push origin HEAD:feature/full-cross-validation-v1
          fi
      - name: Real 688521 one-input dual-source E2E
        run: |
          set -o pipefail
          ashare-f10 run-and-validate 688521 --output full-cross-validation-run --workers 8 --max-periods 2 2>&1 | tee full-cross-validation.log
          python scripts/verify_full_cross_validation.py full-cross-validation-run
      - name: Upload final full cross-validation evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-cross-validation-688521-${{ github.run_id }}
          path: |
            final-fix-diagnostics.log
            full-cross-validation-run/
            full-cross-validation.log
          if-no-files-found: warn
          retention-days: 30
