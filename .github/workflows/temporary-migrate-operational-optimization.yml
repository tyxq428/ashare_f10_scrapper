# One-shot deterministic migration; contains no Codex invocation.
name: Temporary Migrate Operational Optimization

on:
  push:
    branches:
      - feature/devflow-operational-optimization-v2-clean
    paths:
      - scripts/devflow/temporary_migrate_operational_optimization.py
      - .github/workflows/temporary-migrate-operational-optimization.yml

permissions:
  contents: write

concurrency:
  group: temporary-migrate-operational-optimization
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/devflow-operational-optimization-v2-clean
          fetch-depth: 0
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Migrate selected implementation without Codex
        run: |
          set -euo pipefail
          python scripts/devflow/temporary_migrate_operational_optimization.py
          ruff format scripts/devflow tests/test_devflow*.py
          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_docs.py
          python scripts/devflow/upgrade_compatibility.py --output /tmp/upgrade-compatibility.json
          python scripts/devflow/validate_state.py --all-active --allow-checkout-branch --output /tmp/state-validation.json
          python scripts/devflow/validate_workflows.py
          ruff check scripts/devflow tests/test_devflow*.py
          pytest -q tests/test_devflow*.py
      - name: Commit migrated clean baseline
        run: |
          set -euo pipefail
          git rm scripts/devflow/temporary_migrate_operational_optimization.py
          git rm .github/workflows/temporary-migrate-operational-optimization.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md .devflow .github docs scripts/devflow tests
          git commit -m "Rebuild Devflow optimization on frozen main without Codex"
          git push origin HEAD:feature/devflow-operational-optimization-v2-clean
