name: Devflow Post Merge

on:
  push:
    branches:
      - main
    paths:
      - ".devflow/finalize/chatgpt-web-codex-devflow-v1.json"

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  final-exact-main-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Validate finalization marker and product ancestry
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path
          path = Path('.devflow/finalize/chatgpt-web-codex-devflow-v1.json')
          value = json.loads(path.read_text(encoding='utf-8'))
          if value.get('task_id') != 'chatgpt-web-codex-devflow-v1':
              raise SystemExit('unexpected finalization task id')
          product_sha = value.get('product_sha')
          if not isinstance(product_sha, str) or len(product_sha) != 40:
              raise SystemExit('invalid product_sha')
          result = subprocess.run(['git', 'merge-base', '--is-ancestor', product_sha, 'HEAD'])
          if result.returncode != 0:
              raise SystemExit('final product SHA is not an ancestor of exact main')
          print('FINALIZATION_MARKER=PASS')
          PY
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run devflow and thin-slice targeted gates
        run: |
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --no-git \
            --output final-state-result.json
          python scripts/devflow/validate_workflows.py
          pytest -q tests/test_devflow.py
          ruff check scripts/run_resilient_command.py tests/test_resilient_fetch.py
          pytest -q tests/test_resilient_fetch.py
      - name: Run exact-main full repository regression
        run: |
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest --cov=ashare_f10 --cov-report=term-missing
      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: final-post-merge-failure-${{ github.run_id }}
          path: |
            final-state-result.json
            devflow-workflow-validation.json
          if-no-files-found: warn
          retention-days: 7
