name: Temporary Apply Codex Freeze

on:
  push:
    branches:
      - fix/codex-manual-freeze-v1
    paths:
      - scripts/devflow/temporary_apply_codex_freeze.py
      - .github/workflows/temporary-apply-codex-freeze.yml

permissions:
  contents: write

concurrency:
  group: temporary-apply-codex-freeze
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: fix/codex-manual-freeze-v1
          fetch-depth: 0
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deterministic development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply freeze and validate without Codex
        run: |
          set -euo pipefail
          python scripts/devflow/temporary_apply_codex_freeze.py
          ruff format scripts/devflow/validate_workflows.py tests/test_devflow_codex_environment.py
          ruff check scripts/devflow/validate_workflows.py tests/test_devflow_codex_environment.py
          python scripts/devflow/validate_workflows.py
          pytest -q tests/test_devflow.py tests/test_devflow_codex_environment.py
      - name: Commit verified freeze and remove temporary executor
        run: |
          set -euo pipefail
          git rm scripts/devflow/temporary_apply_codex_freeze.py
          git rm .github/workflows/temporary-apply-codex-freeze.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .devflow .github scripts/devflow tests docs
          git commit -m "Freeze Codex model invocation during Devflow optimization"
          git push origin HEAD:fix/codex-manual-freeze-v1
