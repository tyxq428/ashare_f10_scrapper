# Direct trigger after the temporary workflow already exists; zero Codex.
name: Temporary Reorder Recovery Policy

on:
  push:
    branches:
      - feature/codex-entrypoint-hardening-v1
    paths:
      - .github/workflows/temporary-reorder-recovery-policy.yml

permissions:
  contents: write

concurrency:
  group: temporary-reorder-recovery-policy
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/codex-entrypoint-hardening-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Verify zero-Codex policy and reorder classification
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          policy = json.loads(
              Path('.devflow/codex-policy.yaml').read_text(encoding='utf-8')
          )
          assert policy['mode'] == 'disabled'
          PY
          python scripts/devflow/temporary_reorder_recovery_policy.py
          python -m pip install ruff
          ruff format scripts/devflow/recovery_policy.py
          ruff check scripts/devflow/recovery_policy.py tests/test_devflow.py
          pytest -q tests/test_devflow.py \
            -k 'pre_model_infrastructure or codex_checkout_failure or codex_failure_never'

      - name: Commit patch and remove temporary files
        run: |
          set -euo pipefail
          git rm scripts/devflow/temporary_reorder_recovery_policy.py
          git rm .github/workflows/temporary-reorder-recovery-policy.yml
          git add scripts/devflow/recovery_policy.py
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Retry infrastructure only before framework routing"
          git push origin HEAD:feature/codex-entrypoint-hardening-v1
