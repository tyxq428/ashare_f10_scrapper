name: Apply Official Validation Fix

on:
  push:
    branches: [feature/official-validation-v1]
    paths:
      - ".github/workflows/apply-official-validation-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/official-validation-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Correct SSE report types and format validation code
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ashare_f10/validation/sources/sse.py")
          text = path.read_text(encoding="utf-8")
          marker = 'SSE_HOME = "https://www.sse.com.cn/"\n'
          if "REPORT_TYPE_CODES" not in text:
              text = text.replace(
                  marker,
                  marker + 'REPORT_TYPE_CODES = ("YEARLY", "QUATER1", "QUATER2", "QUATER3")\n',
                  1,
              )

          old = '''        params = {
              "isPagination": "true",
              "productId": security_code,
              "keyWord": "",
              "securityType": "0101,120100,020100,020200,120200",
              "reportType2": "DQBG",
              "reportType": "ALL",
              "beginDate": begin_date,
              "endDate": end_date,
              "pageHelp.pageSize": "100",
              "pageHelp.pageCount": "50",
              "pageHelp.pageNo": "1",
              "pageHelp.beginPage": "1",
              "pageHelp.cacheSize": "1",
              "pageHelp.endPage": "5",
          }
          payload = self._get_json(params)
          documents: list[OfficialDocument] = []
          seen: set[tuple[str, str]] = set()
          for item in _iter_dicts(payload):
          '''
          new = '''        base_params = {
              "isPagination": "false",
              "productId": security_code,
              "keyWord": "",
              "securityType": "0101,120100,020100,020200,120200",
              "reportType2": "DQBG",
              "beginDate": begin_date,
              "endDate": end_date,
              "pageHelp.pageSize": "100",
              "pageHelp.pageCount": "50",
              "pageHelp.pageNo": "1",
              "pageHelp.beginPage": "1",
              "pageHelp.cacheSize": "1",
              "pageHelp.endPage": "5",
          }
          payloads: list[dict[str, Any]] = []
          for report_type in REPORT_TYPE_CODES:
              params = {**base_params, "reportType": report_type}
              payloads.append(self._get_json(params))

          documents: list[OfficialDocument] = []
          seen: set[tuple[str, str]] = set()
          for payload in payloads:
              for item in _iter_dicts(payload):
          '''
          if old in text:
              text = text.replace(old, new, 1)
              start = text.index("            title_value = _first(", text.index("        for payload in payloads:"))
              end = text.index("        documents.sort(", start)
              block = text[start:end]
              block = "".join(("    " + line if line.strip() else line) for line in block.splitlines(True))
              text = text[:start] + block + text[end:]
          elif '"reportType": "ALL"' in text:
              raise SystemExit("Expected SSE query block was not found")
          path.write_text(text, encoding="utf-8")
          PY
          ruff format src/ashare_f10/validation tests/test_official_validation.py
          ruff check --fix src/ashare_f10/validation tests/test_official_validation.py
      - name: Run official validation unit tests
        run: pytest -q tests/test_official_validation.py
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/validation tests/test_official_validation.py
          if git diff --cached --quiet; then
            echo "No fixes were needed."
          else
            git commit -m "Fix official report discovery and lint"
            git push origin HEAD:feature/official-validation-v1
          fi
