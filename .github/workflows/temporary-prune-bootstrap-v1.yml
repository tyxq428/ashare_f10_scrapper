name: Temporary Prune Bootstrap V1

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-prune-bootstrap-v1.yml

permissions:
  contents: write
  actions: write

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Cancel old bootstrap runs best-effort
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo "${{ github.repository }}" --workflow "Temporary Bootstrap Devflow W05-W06" \
            --limit 20 --json databaseId,status \
            --jq '.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending") | .databaseId' \
            2>/dev/null > /tmp/cancel.txt || true
          while read -r run_id; do
            [[ -z "$run_id" ]] && continue
            gh run cancel "$run_id" --repo "${{ github.repository }}" || true
          done < /tmp/cancel.txt
      - name: Remove v1 bootstrap and self
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          rm -f .github/workflows/temporary-bootstrap-devflow-w05-w06.yml
          rm -f .github/workflows/temporary-prune-bootstrap-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Keep only idempotent devflow bootstrap"
            git push origin HEAD:main
          fi
