name: Temporary XLSX Export Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/xlsx-export-fix-trigger.txt"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  implement-test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/xlsx-tabular-export-and-windows-scripts
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Apply deterministic XLSX export fix
        run: |
          set -euo pipefail
          python scripts/apply_xlsx_export_fix.py
          rm scripts/apply_xlsx_export_fix.py .github/xlsx-export-fix-trigger.txt
      - name: Format, lint and unit tests
        run: |
          set -o pipefail
          {
            ruff format src tests scripts
            ruff check --fix --unsafe-fixes src tests scripts
            ruff check src tests scripts
            python -m compileall -q src
            node --check src/ashare_f10/web/app.js
            node --check src/ashare_f10/web/cross-validation.js
            pytest --cov=ashare_f10 --cov-report=term-missing
          } 2>&1 | tee xlsx-fix-tests.log
      - name: Commit implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows
          if git diff --cached --quiet; then
            echo "XLSX export fix already materialized."
          else
            git commit -m "Fix multi-column XLSX exports and add Windows runner scripts"
            git push origin HEAD:fix/xlsx-tabular-export-and-windows-scripts
          fi
      - name: Real 688521 dual-source XLSX E2E
        run: |
          set -euo pipefail
          ashare-f10 run-and-validate 688521 --output xlsx-fix-run --workers 8 --max-periods 2 2>&1 | tee xlsx-fix-e2e.log
          python scripts/verify_full_cross_validation.py xlsx-fix-run
      - name: Verify workbook matrix layout
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from openpyxl import load_workbook

          summary = json.loads(Path("xlsx-fix-run/cross_validation/cross_validation_summary.json").read_text(encoding="utf-8"))
          for key in ("official_excel", "comparison_excel"):
              path = Path(summary["artifacts"][key])
              workbook = load_workbook(path, read_only=True, data_only=True)
              try:
                  checked = 0
                  for sheet in workbook.worksheets:
                      if sheet.max_row <= 1 or sheet.max_column <= 1:
                          continue
                      header = next(sheet.iter_rows(min_row=1, max_row=1, values_only=True), ())
                      if sum(value not in (None, "") for value in header) < 2:
                          continue
                      rows = list(sheet.iter_rows(min_row=2, max_row=min(sheet.max_row, 250), values_only=True))
                      if not rows:
                          continue
                      if any(sum(value not in (None, "") for value in row) >= 2 for row in rows):
                          checked += 1
                      else:
                          raise AssertionError(f"{path.name}/{sheet.title}: multi-column data collapsed into column A")
                  assert checked > 0, path
              finally:
                  workbook.close()
          print(json.dumps({
              "status": "PASS",
              "official_fact_count": summary["official_fact_count"],
              "matched_count": summary["matched_count"],
              "comparison_excel": summary["artifacts"]["comparison_excel"],
              "official_excel": summary["artifacts"]["official_excel"],
          }, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xlsx-export-fix-688521-${{ github.run_id }}
          path: |
            xlsx-fix-run/
            xlsx-fix-tests.log
            xlsx-fix-e2e.log
          if-no-files-found: warn
          retention-days: 30
