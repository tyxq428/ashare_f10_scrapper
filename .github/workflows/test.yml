name: Test

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m compileall -q src scripts
      - name: Validate browser JavaScript and static search worker
        run: |
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node tests/static-search-worker-smoke.cjs
      - name: Run Ruff
        run: |
          set -o pipefail
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py --output-format=concise 2>&1 | tee ruff-output.txt
      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics-${{ github.run_id }}
          path: ruff-output.txt
          if-no-files-found: warn
          retention-days: 7
      - run: pytest --cov=ashare_f10 --cov-report=term-missing

  sync-pr21:
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[sync-pr21]')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/f10-research-mapping-evidence-pack-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Merge latest main and apply semantic conflict resolution
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff --no-commit -X ours origin/main
          python scripts/prepare_research_pack_main_sync.py
      - name: Validate synchronized branch
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-pack.js
          ruff check src tests scripts/run_resilient_fetch.py scripts/run_resilient_command.py
          pytest -q
      - name: Remove temporary sync machinery and publish
        run: |
          set -euo pipefail
          git rm -f .github/workflows/temporary-research-pack-main-sync.yml
          git rm -f .github/workflows/temporary-pr21-main-sync.yml
          git rm -f scripts/prepare_research_pack_main_sync.py
          git add .
          git commit -m "Merge latest main into Research Pack implementation"
          git push origin HEAD:feature/f10-research-mapping-evidence-pack-v1
