name: Test

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      force_full:
        description: Run the complete product regression regardless of diff impact
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed-path impact
        id: impact
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          FORCE_FULL: ${{ inputs.force_full }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$FORCE_FULL" == "true" ]]; then
            printf '%s\n' 'src/__forced_full_regression__' > /tmp/devflow-changed-paths.txt
            python scripts/devflow/change_impact.py \
              --paths-file /tmp/devflow-changed-paths.txt \
              --output change-impact.json \
              --github-output "$GITHUB_OUTPUT"
          else
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              BASE_SHA="$PR_BASE_SHA"
            elif [[ "$REF_NAME" == "$DEFAULT_BRANCH" &&
                    "$PUSH_BEFORE_SHA" =~ ^[0-9a-f]{40}$ &&
                    "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$PUSH_BEFORE_SHA"
            else
              git fetch --no-tags origin "$DEFAULT_BRANCH"
              BASE_SHA="$(git merge-base "origin/${DEFAULT_BRANCH}" HEAD)"
            fi
            python scripts/devflow/change_impact.py \
              --base "$BASE_SHA" \
              --head HEAD \
              --output change-impact.json \
              --github-output "$GITHUB_OUTPUT"
          fi
          {
            echo "## Change impact"
            echo '```json'
            cat change-impact.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate documentation, state JSON and relative links
        run: |
          python scripts/devflow/validate_docs.py \
            --output docs-validation.json

      - name: Set up Python with dependency cache
        if: steps.impact.outputs.impact != 'docs_only'
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        if: steps.impact.outputs.impact != 'docs_only'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run bounded Devflow contract gate
        if: steps.impact.outputs.impact == 'devflow_only'
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q scripts/devflow
          python scripts/devflow/validate_workflows.py \
            2>&1 | tee devflow-workflow-validation.log
          ruff check scripts/devflow tests/test_devflow*.py \
            --output-format=concise 2>&1 | tee ruff-output.txt
          pytest -q tests/test_devflow*.py \
            2>&1 | tee pytest-output.txt

      - name: Run complete product regression
        if: steps.impact.outputs.impact == 'product'
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q src scripts
          node --check src/ashare_f10/web/research-grid.js
          node --check src/ashare_f10/web/static-search-worker.js
          node --check src/ashare_f10/web/app.js
          node --check src/ashare_f10/web/job-center-v2.js
          node --check src/ashare_f10/web/raw-pack.js
          node --check src/ashare_f10/web/run.js
          node --check src/ashare_f10/web/research-pack.js
          node tests/static-search-worker-smoke.cjs
          ruff check src tests scripts/run_resilient_fetch.py \
            scripts/run_resilient_command.py --output-format=concise \
            2>&1 | tee ruff-output.txt
          pytest --cov=ashare_f10 --cov-report=term-missing \
            2>&1 | tee pytest-output.txt

      - name: Record intentional docs-only pass
        if: steps.impact.outputs.impact == 'docs_only'
        run: |
          echo "TEST_GATE=DOCS_ONLY_PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "No product test result was cached or reused." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-diagnostics-${{ github.run_id }}
          path: |
            change-impact.json
            docs-validation.json
            devflow-workflow-validation.json
            devflow-workflow-validation.log
            ruff-output.txt
            pytest-output.txt
          if-no-files-found: warn
          retention-days: 7
