name: Devflow Infrastructure Incident

on:
  workflow_run:
    workflows:
      - Devflow Infrastructure Post Merge
    types:
      - completed

permissions:
  issues: write
  contents: read

jobs:
  notify-failure-only:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Update the single task control issue
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_URL: ${{ github.event.workflow_run.html_url }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_RUN: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open \
            --search "${TITLE} in:title" --json number,title \
            --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][INTERRUPTED]

- Stage: PR-A independent post-merge verification
- Conclusion: \`${CONCLUSION}\`
- Run: ${SOURCE_URL}
- Minimum action: inspect the failed exact-main gate and resume from \`docs/implementation/chatgpt-web-codex-devflow-v1/HANDOFF.md\`.

<!-- devflow-event:${SOURCE_RUN}:INFRA_POST_MERGE_FAILURE -->"
