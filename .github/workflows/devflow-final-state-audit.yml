name: Devflow Final State Audit

on:
  workflow_run:
    workflows:
      - Devflow Finalize State
    types:
      - completed

permissions:
  contents: read
  issues: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  audit:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Validate final canonical state and deliverables
        id: state
        continue-on-error: true
        run: |
          python scripts/devflow/validate_state.py \
            --task-dir docs/implementation/chatgpt-web-codex-devflow-v1 \
            --output final-done-state-result.json
          test -s docs/implementation/chatgpt-web-codex-devflow-v1/W08_result.md
          test -s docs/implementation/chatgpt-web-codex-devflow-v1/FINAL_REPORT.md
      - name: Notify only if final state is inconsistent
        if: steps.state.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[TASK CONTROL] chatgpt-web-codex-devflow-v1"
          NUMBER="$(gh issue list --repo "${{ github.repository }}" --state open --search "${TITLE} in:title" \
            --json number,title --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n 1)"
          if [[ -z "$NUMBER" ]]; then
            URL="$(gh issue create --repo "${{ github.repository }}" --title "$TITLE" \
              --body "Single valuable-notification channel for the devflow migration." --assignee tyxq428)"
            NUMBER="${URL##*/}"
          fi
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "@tyxq428

[TASK][INTERRUPTED]

The final canonical DONE state or deliverables are inconsistent. Review ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          exit 1
