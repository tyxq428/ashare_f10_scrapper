name: Apply Quote Batch Identity Fix

on:
  push:
    branches: [feature/f10-research-platform-v1]
    paths:
      - ".github/workflows/apply-quote-batch-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/f10-research-platform-v1
          fetch-depth: 0
      - name: Keep identity fields in every fallback quote batch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ashare_f10/fetch/client_v2.py")
          text = path.read_text(encoding="utf-8")
          old = '''        for start in range(0, len(remaining), 10):
            batch = remaining[start : start + 10]
            if batch:
                batches.append(batch)
'''
          new = '''        for start in range(0, len(remaining), 10):
            extra_fields = remaining[start : start + 10]
            if extra_fields:
                batch = list(dict.fromkeys(["f57", "f58", *extra_fields]))
                batches.append(batch)
'''
          if new not in text:
              if old not in text:
                  raise SystemExit("Expected quote batch block was not found")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit quote batch fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ashare_f10/fetch/client_v2.py
          if git diff --cached --quiet; then
            echo "Quote batch identity fields were already fixed."
          else
            git commit -m "Keep quote identity fields in fallback batches"
            git push origin HEAD:feature/f10-research-platform-v1
          fi
