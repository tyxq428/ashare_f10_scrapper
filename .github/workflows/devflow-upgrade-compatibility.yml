name: Devflow Upgrade Compatibility

on:
  push:
    branches:
      - main
      - "feature/devflow-*"
    paths:
      - "scripts/devflow/**"
      - "tests/test_devflow*.py"
      - "tests/fixtures/devflow/**"
      - "docs/process/templates/**"
      - ".github/workflows/devflow-upgrade-compatibility.yml"
  pull_request:
    paths:
      - "scripts/devflow/**"
      - "tests/test_devflow*.py"
      - "tests/fixtures/devflow/**"
      - "docs/process/templates/**"
      - ".github/workflows/devflow-upgrade-compatibility.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: false

      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run versioned state and descriptor compatibility matrix
        run: |
          python scripts/devflow/upgrade_compatibility.py \
            --output devflow-upgrade-compatibility.json
          pytest -q tests/test_devflow_upgrade_compatibility.py

      - name: Upload bounded diagnostics only on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: devflow-upgrade-compatibility-${{ github.run_id }}
          path: devflow-upgrade-compatibility.json
          if-no-files-found: warn
          retention-days: 7
