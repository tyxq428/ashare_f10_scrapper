name: Runtime Diagnose Product Gate Merge

on:
  push:
    branches:
      - runtime/devflow-observer
    paths:
      - .github/workflows/runtime-observe-devflow.yml

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: runtime/devflow-observer
          fetch-depth: 0
      - name: Extract only bounded non-secret merge error lines
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: "29998952457"
          JOB_ID: "89179272998"
        run: |
          set -euo pipefail
          gh api --method GET \
            -H 'Accept: application/vnd.github+json' \
            "repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs" \
            > /tmp/product-gate.log
          python - <<'PY'
          import json
          import re
          from datetime import UTC, datetime
          from pathlib import Path

          patterns = re.compile(
              r'(##\[error\]|fatal:|error:|conflict|rebase|merge|identity|permission|protected|non-fast-forward|failed)',
              re.IGNORECASE,
          )
          safe = []
          for raw in Path('/tmp/product-gate.log').read_text(encoding='utf-8', errors='replace').splitlines():
              if not patterns.search(raw):
                  continue
              line = re.sub(r'^[0-9TZ:.-]+\s+', '', raw)
              line = re.sub(r'https?://\S+', '[URL]', line)
              line = re.sub(r'(?i)(authorization|token|secret|key)\s*[:=]\s*\S+', r'\1=[MASKED]', line)
              safe.append(line[:500])
          result = {
              'observed_at_utc': datetime.now(UTC).isoformat(),
              'run_id': 29998952457,
              'job_id': 89179272998,
              'matched_lines': safe[-80:],
          }
          Path('/tmp/product-gate-diagnostic.json').write_text(
              json.dumps(result, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
      - name: Publish diagnostic to isolated orphan branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan runtime-devflow-status
          git rm -rf . >/dev/null 2>&1 || true
          mkdir -p runtime
          cp /tmp/product-gate-diagnostic.json runtime/product-gate-diagnostic.json
          git add runtime/product-gate-diagnostic.json
          git commit -m "Publish bounded Product Gate diagnostic"
          git push --force origin HEAD:refs/heads/runtime/devflow-status
