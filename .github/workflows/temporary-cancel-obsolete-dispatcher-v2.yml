name: Temporary Cancel Obsolete Dispatcher V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temporary-cancel-obsolete-dispatcher-v2.yml

permissions:
  actions: write
  contents: write

jobs:
  cancel-and-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          fetch-depth: 0
      - name: Cancel obsolete dispatcher runs best-effort
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "${{ github.repository }}" \
            --workflow "Temporary Dispatch Codex Control" --limit 20 \
            --json databaseId,status \
            --jq '.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending") | .databaseId' \
            > /tmp/obsolete-runs.txt 2>/dev/null || true
          while read -r run_id; do
            [[ -z "$run_id" ]] && continue
            gh run cancel "$run_id" --repo "${{ github.repository }}" || true
          done < /tmp/obsolete-runs.txt
      - name: Remove obsolete and invalid dispatcher files
        run: |
          set -euo pipefail
          git pull --ff-only origin main
          rm -f .github/workflows/temporary-dispatch-codex-control.yml
          rm -f .github/workflows/temporary-replace-codex-dispatcher.yml
          rm -f .github/workflows/temporary-cancel-obsolete-dispatcher-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove obsolete Codex dispatcher workflows"
          git push origin HEAD:main
