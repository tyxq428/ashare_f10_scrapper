name: Temporary SSE Summary Scope Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/sse-summary-scope-trigger.txt"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  implement-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sse-prelisting-period-coverage
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Materialize summary-only and pending-period fixes
        run: |
          set -o pipefail
          {
            python scripts/patch_sse_summary_materializer.py
            python scripts/apply_sse_summary_scope_fix.py
          } 2>&1 | tee sse-summary-materialize.log
          rm scripts/patch_sse_summary_materializer.py scripts/apply_sse_summary_scope_fix.py
      - name: Format, lint, compile and unit tests
        run: |
          set -o pipefail
          {
            ruff format src tests
            ruff check --fix --unsafe-fixes src tests
            ruff check src tests scripts/verify_full_cross_validation.py
            python -m compileall -q src
            node --check src/ashare_f10/web/cross-validation.js
            pytest --cov=ashare_f10 --cov-report=term-missing
          } 2>&1 | tee sse-summary-tests.log
      - name: Commit implementation to feature branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows .coverage sse-summary-tests.log sse-summary-materialize.log
          if git diff --cached --quiet; then
            echo "Summary-scope implementation already present."
          else
            git commit -m "Classify old SSE quarter summaries and pending reports"
            git push origin HEAD:fix/sse-prelisting-period-coverage
          fi
      - name: Run real 688521 complete-history validation
        run: |
          set -o pipefail
          set +e
          ashare-f10 run-and-validate 688521 \
            --output sse-history-summary-fixed-run \
            --workers 8 2>&1 | tee sse-history-summary-fixed-run.log
          echo "CLI_EXIT_CODE=$?" >> "$GITHUB_ENV"
          set -e
      - name: Verify lifecycle classifications and the one preserved conflict
        run: |
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          import duckdb
          import pandas as pd
          from openpyxl import load_workbook

          root = Path("sse-history-summary-fixed-run/cross_validation")
          summary = json.loads((root / "cross_validation_summary.json").read_text(encoding="utf-8"))
          status = summary["official_source_status"]
          lifecycle = status["security_lifecycle"]
          expected_prelisting = {
              "2016-12-31", "2017-12-31", "2018-12-31",
              "2019-03-31", "2019-06-30", "2019-09-30", "2019-12-31",
              "2020-03-31", "2020-06-30",
          }
          assert lifecycle["listing_date"] == "2020-08-18", lifecycle
          assert lifecycle["listing_date_source"] == "SSE_COMPANY_PROFILE", lifecycle
          assert set(status["pre_listing_report_dates"]) == expected_prelisting, status
          assert status["post_listing_missing_report_dates"] == [], status
          assert status["missing_report_dates"] == [], status
          assert set(status["summary_only_report_dates"]) == {"2020-09-30", "2021-03-31"}, status
          assert status["discovered_but_zero_extraction_dates"] == [], status
          assert set(status["not_yet_disclosed_report_dates"]) == {"2026-06-30"}, status
          assert status["extraction_by_report_date"]["2020-09-30"] > 0, status
          assert status["extraction_by_report_date"]["2021-03-31"] > 0, status

          comparison = pd.read_parquet(summary["artifacts"]["comparison_parquet"])
          conflict_statuses = {
              "MISMATCH", "VERSION_CONFLICT", "SCOPE_CONFLICT",
              "PERIOD_CONFLICT", "UNIT_CONFLICT",
          }
          conflicts = comparison[comparison["status"].isin(conflict_statuses)]
          assert not set(conflicts["field_key"]) & {
              "FINANCE_EXPENSE", "ASSET_DISPOSAL_INCOME", "BEGIN_CCE", "END_CCE"
          }, conflicts.to_dict("records")
          assert len(conflicts) == 1, conflicts.to_dict("records")
          row = conflicts.iloc[0]
          assert row["field_key"] == "INVEST_PAY_CASH", row.to_dict()
          assert str(row["report_date"])[:10] == "2020-12-31", row.to_dict()
          assert float(row["eastmoney_value_num"]) == 0.0, row.to_dict()
          assert float(row["official_value_num"]) == 53_000_000.0, row.to_dict()
          assert "明确返回0" in str(row["notes"]), row.to_dict()

          assert (comparison["status"] == "PRE_LISTING_OFFICIAL_SOURCE_NOT_LOADED").any()
          assert (comparison["status"] == "OFFICIAL_REPORT_SUMMARY_SCOPE_GAP").any()
          pending = comparison[comparison["status"] == "OFFICIAL_REPORT_NOT_YET_DISCLOSED"]
          assert len(pending) == 7, pending.to_dict("records")
          assert set(pending["report_date"].astype(str).str[:10]) == {"2026-06-30"}
          assert not (comparison["status"] == "OFFICIAL_DOCUMENT_EXTRACTION_FAILED").any()
          assert summary["true_conflict_count"] == 1
          assert summary["acceptance_status"] == "FAIL_SOURCE_CONFLICT"
          assert summary["classification_coverage"] == 1
          assert summary["paid_sources_used"] is False
          assert (summary.get("logic_check_counts") or {}).get("FAIL", 0) == 0
          assert (summary.get("ttm_check_counts") or {}).get("FAIL", 0) == 0

          connection = duckdb.connect(summary["artifacts"]["comparison_duckdb"], read_only=True)
          try:
              tables = {record[0] for record in connection.execute("show tables").fetchall()}
              assert "report_period_lifecycle" in tables, tables
              lifecycle_counts = dict(
                  connection.execute(
                      "select coverage_status, count(*) from report_period_lifecycle group by 1"
                  ).fetchall()
              )
              assert lifecycle_counts["PRE_LISTING_OFFICIAL_SOURCE_NOT_LOADED"] == 9
              assert lifecycle_counts["OFFICIAL_REPORT_SUMMARY_SCOPE_GAP"] == 2
              assert lifecycle_counts["OFFICIAL_REPORT_NOT_YET_DISCLOSED"] == 1
          finally:
              connection.close()

          for key in ("official_excel", "comparison_excel"):
              workbook = load_workbook(summary["artifacts"][key], read_only=True, data_only=True)
              try:
                  assert any(sheet.max_column > 1 and sheet.max_row > 1 for sheet in workbook.worksheets)
              finally:
                  workbook.close()
              with zipfile.ZipFile(summary["artifacts"][key]) as archive:
                  assert archive.testzip() is None

          Path("sse-history-summary-fixed-summary.json").write_text(
              json.dumps(summary, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          print(json.dumps({
              "listing_date": lifecycle["listing_date"],
              "pre_listing_period_count": len(expected_prelisting),
              "summary_only_dates": status["summary_only_report_dates"],
              "pending_report_dates": status["not_yet_disclosed_report_dates"],
              "post_listing_missing_report_count": len(status["post_listing_missing_report_dates"]),
              "remaining_true_conflicts": len(conflicts),
              "remaining_conflict_fields": conflicts["field_key"].tolist(),
              "acceptance_status": summary["acceptance_status"],
          }, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sse-summary-scope-fixed-688521-${{ github.run_id }}
          path: |
            sse-summary-materialize.log
            sse-summary-tests.log
            sse-history-summary-fixed-run.log
            sse-history-summary-fixed-summary.json
            sse-history-summary-fixed-run/cross_validation/
          if-no-files-found: warn
          retention-days: 30
