name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task_branch:
        description: Trusted control branch containing .agent/current_task.yaml
        required: true
        type: string
      approval_file:
        description: Task-bound ChatGPT Web approval JSON
        required: false
        type: string
        default: .devflow/codex-approvals/approval.json
      reproduction_file:
        description: Deterministic pre-model reproduction JSON
        required: false
        type: string
        default: .agent/reproduction.json

permissions:
  contents: read

concurrency:
  group: codex-task-${{ inputs.task_branch }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  policy:
    name: zero-token-policy-and-eligibility
    if: github.actor == 'tyxq428'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ inputs.task_branch }}
          persist-credentials: false
      - name: Validate manual actor, policy and immutable task descriptor
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          TASK_BRANCH: ${{ inputs.task_branch }}
          APPROVAL_FILE: ${{ inputs.approval_file }}
          REPRODUCTION_FILE: ${{ inputs.reproduction_file }}
        run: |
          set -euo pipefail
          [[ "$ACTOR" == "tyxq428" ]]
          [[ "$TASK_BRANCH" == task/codex-* ]]
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, 'scripts/devflow')
          from task_descriptor import load_task_descriptor

          policy = json.loads(Path('.devflow/codex-policy.yaml').read_text(encoding='utf-8'))
          _raw, task = load_task_descriptor(Path('.agent/current_task.yaml'))
          if policy.get('mode') != 'enabled':
              print('CODEX_POLICY_DISABLED=PASS')
              raise SystemExit(0)

          from codex_eligibility import evaluate

          result = evaluate(
              task_file=Path('.agent/current_task.yaml'),
              approval_file=Path(os.environ['APPROVAL_FILE']),
              reproduction_file=Path(os.environ['REPRODUCTION_FILE']),
              actor=os.environ['ACTOR'],
              ledger_file=Path('docs/implementation/CODEX_USAGE_LEDGER.json'),
              repo=Path('.'),
          )
          print(json.dumps(result, ensure_ascii=False, sort_keys=True))
          if result.get('decision') != 'CODEX_ELIGIBLE':
              raise SystemExit('CODEX_NOT_ELIGIBLE')
          print(f"CODEX_CANDIDATE_REQUIRES_REVIEWED_WORKFLOW_ENABLEMENT={task.task_id}")
          PY
      - name: Record hard-disabled execution boundary
        run: |
          echo "CODEX_MODEL_INVOCATION=DISABLED" >> "$GITHUB_STEP_SUMMARY"
          echo "No Environment Secret, localhost forwarder or model session was started." >> "$GITHUB_STEP_SUMMARY"
          echo "A separate reviewed PR and explicit user request are required before any model-bearing job can exist." >> "$GITHUB_STEP_SUMMARY"
