name: Codex Task

on:
  workflow_dispatch:
    inputs:
      task_branch:
        description: Data-only task/codex-* branch containing the descriptor
        required: true
        type: string
      task_commit_sha:
        description: Exact task branch commit SHA reviewed by ChatGPT Web
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: codex-candidate-review-${{ inputs.task_commit_sha }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  review-only:
    name: zero-token-trusted-control-candidate-review
    if: github.actor == 'tyxq428' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out trusted control plane from exact main ref
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: main
          path: control
          fetch-depth: 1
          persist-credentials: false

      - name: Check out task branch as data-only workspace
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ inputs.task_branch }}
          path: workspace
          fetch-depth: 1
          persist-credentials: false

      - name: Validate exact refs and run zero-token candidate review
        shell: bash
        env:
          TASK_BRANCH: ${{ inputs.task_branch }}
          EXPECTED_TASK_SHA: ${{ inputs.task_commit_sha }}
          CONTROL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$TASK_BRANCH" == task/codex-* ]]
          [[ "$EXPECTED_TASK_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$(git -C control rev-parse HEAD)" == "$CONTROL_SHA" ]]
          [[ "$(git -C workspace rev-parse HEAD)" == "$EXPECTED_TASK_SHA" ]]
          test -f workspace/.agent/current_task.yaml
          python control/scripts/devflow/codex_candidate_review.py \
            --control-root control \
            --workspace-root workspace \
            --task-file workspace/.agent/current_task.yaml \
            --control-commit-sha "$CONTROL_SHA" \
            --task-commit-sha "$EXPECTED_TASK_SHA" \
            --output /tmp/codex-candidate-review.json

      - name: Record hard-disabled execution boundary
        run: |
          echo "CODEX_MODEL_INVOCATION=DISABLED" >> "$GITHUB_STEP_SUMMARY"
          echo "Task branches are data-only; control code came from exact main." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "No Environment Secret, forwarder or model session was started." \
            >> "$GITHUB_STEP_SUMMARY"
          echo "A separate reviewed one-time Activation PR and new user approval are required." \
            >> "$GITHUB_STEP_SUMMARY"
