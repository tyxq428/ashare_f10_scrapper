name: Temporary Trigger Codex Trigger Surface Pre-Merge

on:
  push:
    branches:
      - feature/codex-trigger-surface-audit-v2
    paths:
      - .github/workflows/temporary-trigger-codex-trigger-premerge.yml

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: feature/codex-trigger-surface-audit-v2
          fetch-depth: 0
          persist-credentials: true

      - name: Touch reviewed zero-model executor and remove this trigger
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path(
              '.github/workflows/'
              'temporary-force-codex-trigger-surface-premerge.yml'
          )
          text = path.read_text(encoding='utf-8')
          marker = '# Direct trigger after reviewed executor exists; zero model.\n'
          if not text.startswith(marker):
              path.write_text(marker + text, encoding='utf-8')
          PY
          git rm \
            .github/workflows/temporary-trigger-codex-trigger-premerge.yml
          git add \
            .github/workflows/temporary-force-codex-trigger-surface-premerge.yml
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Trigger zero-model Codex trigger surface pre-merge validation"
          git push origin HEAD:feature/codex-trigger-surface-audit-v2
