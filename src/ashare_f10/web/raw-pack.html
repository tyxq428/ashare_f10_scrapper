<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raw Pack 官方证据中心</title>
  <style>
    :root{font-family:Inter,"Microsoft YaHei",sans-serif;color:#172033;background:#f5f7fb}body{margin:0}.top{background:#17365d;color:white;padding:22px 28px}.top a{color:#fff}.top-links{display:flex;gap:14px}.tabs{display:flex;gap:8px;padding:12px 24px;background:white;border-bottom:1px solid #dde3ed;position:sticky;top:0}.tabs button{border:0;background:#eaf0f8;padding:9px 14px;border-radius:7px;cursor:pointer}.tabs button.active{background:#1f4e78;color:white}main{padding:22px;max-width:1500px;margin:auto}.panel{background:white;border:1px solid #dfe5ef;border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px #1d365514}.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end}label{display:flex;flex-direction:column;gap:5px;font-size:13px}input,select,button,textarea{font:inherit;padding:9px;border:1px solid #bdc7d6;border-radius:6px}button.primary,.visual-link{background:#1f4e78;color:white;border-color:#1f4e78;padding:9px 14px;border-radius:6px;text-decoration:none;display:inline-block}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.metric{padding:14px;border-radius:8px;background:#eaf3f8}.metric b{display:block;font-size:24px}.hidden{display:none}.table{overflow:auto}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:8px;border-bottom:1px solid #e2e7ef;text-align:left;vertical-align:top}th{background:#17365d;color:white;position:sticky;top:0}.tag{padding:3px 7px;border-radius:12px;background:#e7edf5;white-space:nowrap}.FACT_DIRECT{background:#dff0d8}.PERMISSION_BLOCKED{background:#f4cccc}.NO_MATCH{background:#fce4d6}.COMPANY_CLAIM,.PRIMARY_NONSTATUTORY{background:#fff2cc}pre{white-space:pre-wrap;max-height:520px;overflow:auto;background:#0f172a;color:#dbeafe;padding:15px;border-radius:8px}.muted{color:#64748b}.row-actions{display:flex;gap:8px}.visual-callout{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:14px;background:#edf5fb;border-radius:8px;margin-bottom:16px}@media(max-width:760px){.visual-callout{display:block}.visual-link{margin-top:10px}}
  </style>
</head>
<body>
<header class="top"><h1>Raw Pack 官方证据中心</h1><p>法定披露 · 公司官网 · 实体风险 · 权限阻塞 · 可溯源文件</p><div class="top-links"><a href="./">返回F10平台</a><a href="./run.html">可视化执行中心</a></div></header>
<nav class="tabs"><button class="active" data-tab="jobs">Raw Pack任务</button><button data-tab="evidence">证据浏览器</button><button data-tab="document">文档详情</button><button data-tab="blocked">权限阻塞</button></nav>
<main>
<section id="jobs" class="panel tab"><div class="visual-callout"><div><strong>推荐：在可视化执行中心一次完成F10、Raw Pack和官方验证</strong><div class="muted">所有参数在网页配置，并自动重试失败子任务。</div></div><a class="visual-link" href="./run.html">打开可视化执行中心</a></div><h2>仅补跑Raw Pack（已有完整F10）</h2><div class="controls"><label>股票代码<input id="jobCode" value="688521" maxlength="6"></label><label>资料包<select id="jobPacks"><option value="default">默认核心包</option><option value="all">全部已实现来源</option><option value="P0_STATUTORY_CORE">仅法定披露</option><option value="P1_IP_PRODUCT_TECH">仅官网/IP/IR</option><option value="P1_ENTITY_RISK_CORE">仅实体风险</option></select></label><label>最多文档<input id="jobMax" type="number" value="30" min="1" max="5000"></label><button id="start" class="primary">开始补跑Raw Pack</button><button id="refreshJobs">刷新</button></div><p class="muted">此区域要求该股票已经存在完整F10版本。权限阻塞来源不会使任务整体失败。</p><div id="jobList"></div></section>
<section id="evidence" class="panel tab hidden"><h2>证据浏览器</h2><div class="controls"><label>股票代码<input id="evCode" value="688521"></label><label>关键词<input id="evQ" placeholder="公告、官网、sha256、来源机构"></label><label>状态<select id="evStatus"><option value="">全部</option><option>FACT_DIRECT</option><option>COMPANY_CLAIM</option><option>PRIMARY_NONSTATUTORY</option><option>NO_MATCH</option><option>PERMISSION_BLOCKED</option><option>UNRESOLVED</option></select></label><button id="search" class="primary">搜索</button></div><div id="metrics" class="metrics"></div><div id="results" class="table"></div></section>
<section id="document" class="panel tab hidden"><h2>文档详情</h2><div class="controls"><label>股票代码<input id="docCode" value="688521"></label><label style="flex:1">Document ID<input id="docId"></label><button id="loadDoc" class="primary">加载</button></div><div id="docMeta"></div><pre id="docText">等待加载</pre></section>
<section id="blocked" class="panel tab hidden"><h2>权限阻塞</h2><div class="controls"><label>股票代码<input id="blockedCode" value="688521"></label><button id="loadBlocked" class="primary">加载</button></div><p class="muted">每个来源每轮只尝试一次。这里显示最小人工动作与影响范围。</p><div id="blockedList" class="table"></div></section>
</main><script src="./raw-pack.js"></script></body></html>
