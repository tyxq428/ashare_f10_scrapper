{
  "schema_version": 1,
  "policy_mode": "disabled",
  "allowed_entrypoints": [
    {
      "id": "manual_one_time_executor",
      "workflow": ".github/workflows/codex-task.yml",
      "current_mode": "eligibility_only",
      "model_invocation": false,
      "allowed_actor": "tyxq428"
    }
  ],
  "allowed_agent_runtime_workflows": [
    ".github/workflows/devflow-relay-health.yml",
    ".github/workflows/devflow-secret-audit.yml"
  ],
  "forbidden_automatic_model_patterns": [
    "actions/workflows/codex-task.yml/dispatches",
    "steps.decision.outputs.action == 'RETRY_CODEX'",
    "python scripts/devflow/recovery_task.py",
    "openai/codex-action@"
  ],
  "trusted_control": {
    "control_ref": "exact_default_branch_sha",
    "control_checkout_path": "control",
    "task_checkout_path": "workspace",
    "task_branch_execution_code": false,
    "task_branch_data_only": true
  },
  "activation": {
    "mode": "one_time_reviewed_pr",
    "persistent_model_job": false,
    "grant_required": true,
    "grant_ttl_minutes_max": 60,
    "calls_per_task": 1,
    "calls_per_fingerprint": 1,
    "automatic_recovery_generations": 0,
    "automatic_second_session": 0
  },
  "historical_rerun_quarantine": {
    "branch_pattern": "task/codex-*",
    "descriptor_must_be_absent": true,
    "disabled_action_required": true,
    "model_reference_forbidden": true,
    "open_pull_request_branches_are_never_modified": true,
    "audit_workflow": ".github/workflows/devflow-legacy-codex-rerun-audit.yml"
  },
  "paid_probe_policy": {
    "workflow": ".github/workflows/devflow-relay-health.yml",
    "default_mode": "configuration_only",
    "paid_confirmation": "I_ACCEPT_ONE_PAID_RESPONSES_PROBE",
    "automatic_retry": false,
    "github_rerun_paid_request": false,
    "paid_request_requires_run_attempt": 1,
    "maximum_requests_per_dispatch": 1
  },
  "secret_audit_policy": {
    "workflow": ".github/workflows/devflow-secret-audit.yml",
    "automatic_trigger": false,
    "source_workflow": "Codex One-Time Activation",
    "source_marker_required": true,
    "environment_bound_after_source_validation": true
  }
}
